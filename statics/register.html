<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课堂互动教学评测系统 - 教师注册</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/all.min.css">
    <style>
        :root {
            --primary-color: #3498db;
            --secondary-color: #2980b9;
            --success-color: #2ecc71;
            --warning-color: #f39c12;
            --danger-color: #e74c3c;
            --light-color: #f8f9fa;
            --dark-color: #343a40;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            padding: 20px 0;
        }
        
        .container {
            max-width: 500px;
        }
        
        .card {
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            border: none;
            overflow: hidden;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
        }
        
        .card-header {
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            padding: 1.5rem;
            text-align: center;
        }
        
        .card-header h4 {
            margin: 0;
            font-weight: 600;
        }
        
        .card-body {
            padding: 2rem;
        }
        
        .btn-primary {
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            border: none;
            padding: 12px 20px;
            font-weight: 500;
            border-radius: 50px;
            transition: all 0.3s;
            width: 100%;
        }
        
        .btn-primary:hover {
            background: linear-gradient(to right, var(--secondary-color), var(--primary-color));
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .btn-outline-primary {
            color: var(--primary-color);
            border-color: var(--primary-color);
            border-radius: 50px;
        }
        
        .btn-outline-primary:hover {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
        }
        
        .form-control, .form-select {
            border-radius: 50px;
            padding: 12px 20px;
            border: 1px solid #dee2e6;
            transition: all 0.3s;
        }
        
        .form-control:focus, .form-select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.25rem rgba(52, 152, 219, 0.25);
        }
        
        .sms-code-container {
            display: flex;
            gap: 10px;
        }
        
        .sms-code-container input {
            flex: 1;
        }
        
        .sms-code-container button {
            flex-shrink: 0;
            white-space: nowrap;
        }
        
        .countdown-timer {
            color: var(--danger-color);
            font-weight: bold;
            font-size: 0.9rem;
        }
        
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1050;
        }
        
        .toast {
            min-width: 300px;
            border-radius: 10px;
        }
        
        .login-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .login-link a {
            color: var(--primary-color);
            text-decoration: none;
        }
        
        .login-link a:hover {
            text-decoration: underline;
        }
        
        .form-text {
            margin-top: 5px;
            font-size: 0.85rem;
        }
        
        .alert {
            border-radius: 50px;
            padding: 10px 20px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <h4><i class="fas fa-user-plus me-2"></i>教师注册</h4>
                <p class="mb-0 small">已有账号？<a href="login.html" class="text-white fw-bold">立即登录</a></p>
            </div>
            <div class="card-body">
                <form id="register-form">
                    <div class="mb-3">
                        <label for="phone" class="form-label">
                            <i class="fas fa-mobile-alt me-1"></i> 手机号码 <span class="text-danger">*</span>
                        </label>
                        <div class="sms-code-container">
                            <input type="tel" class="form-control" id="phone" placeholder="请输入手机号码" 
                                   maxlength="11" required>
                            <button type="button" class="btn btn-outline-primary" id="send-code-btn">
                                发送验证码
                            </button>
                        </div>
                        <div class="form-text">
                            <span id="countdown" class="countdown-timer"></span>
                            验证码将发送至该手机，有效期为5分钟
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="code" class="form-label">
                            <i class="fas fa-key me-1"></i> 短信验证码 <span class="text-danger">*</span>
                        </label>
                        <input type="text" class="form-control" id="code" placeholder="6位验证码" maxlength="6" required>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">
                            <i class="fas fa-lock me-1"></i> 密码 <span class="text-danger">*</span>
                        </label>
                        <input type="password" class="form-control" id="password" placeholder="至少6位" 
                               minlength="6" required>
                    </div>

                    <div class="mb-3">
                        <label for="confirm-password" class="form-label">
                            <i class="fas fa-lock me-1"></i> 确认密码 <span class="text-danger">*</span>
                        </label>
                        <input type="password" class="form-control" id="confirm-password" placeholder="再次输入密码" 
                               minlength="6" required>
                    </div>

                    <div class="mb-3">
                        <label for="organization" class="form-label">
                            <i class="fas fa-school me-1"></i> 学校/机构 <span class="text-danger">*</span>
                        </label>
                        <input type="text" class="form-control" id="organization" 
                               placeholder="例如：南菁高级中学" required>
                    </div>

                    <div class="mb-3">
                        <label for="name" class="form-label">
                            <i class="fas fa-user me-1"></i> 姓名 <span class="text-danger">*</span>
                        </label>
                        <input type="text" class="form-control" id="name" placeholder="请输入真实姓名" required>
                    </div>

                    <div class="mb-4">
                        <label for="username" class="form-label">
                            <i class="fas fa-id-card me-1"></i> 用户名 (可选)
                        </label>
                        <input type="text" class="form-control" id="username" 
                               placeholder="留空则使用手机号作为用户名">
                        <div class="form-text">用户名只能包含字母、数字和下划线，3-20个字符</div>
                    </div>

                    <button type="submit" class="btn btn-primary" id="register-btn">
                        <i class="fas fa-check-circle me-1"></i> 立即注册
                    </button>

                    <div class="login-link">
                        <span>已有账号？</span>
                        <a href="login.html"><i class="fas fa-sign-in-alt me-1"></i>返回登录</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE = window.location.origin + '/api';
        let smsTimer = null;
        let countdownSeconds = 0;

        function showToast(type, message) {
            const toastContainer = document.getElementById('toast-container');
            const toastId = 'toast-' + Date.now();
            const toast = document.createElement('div');
            toast.className = `toast show`;
            toast.setAttribute('role', 'alert');
            const bgColor = type === 'success' ? 'success' : type === 'error' ? 'danger' : 'warning';
            const icon = type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle';
            toast.innerHTML = `
                <div class="toast-header bg-${bgColor} text-white">
                    <i class="fas fa-${icon} me-2"></i>
                    <strong class="me-auto">${type === 'success' ? '成功' : type === 'error' ? '错误' : '提示'}</strong>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast"></button>
                </div>
                <div class="toast-body">
                    ${message}
                </div>
            `;
            toastContainer.appendChild(toast);
            setTimeout(() => {
                if (toast.parentNode) toast.remove();
            }, 5000);
        }

        function isValidPhone(phone) {
            return /^1[3-9]\d{9}$/.test(phone);
        }

        function isValidUsername(username) {
            if (!username) return true;
            return /^[a-zA-Z0-9_]{3,20}$/.test(username);
        }

        async function apiCall(endpoint, options = {}) {
            try {
                const response = await fetch(`${API_BASE}${endpoint}`, {
                    headers: { 'Content-Type': 'application/json', ...options.headers },
                    ...options
                });
                if (!response.ok) {
                    let errorMsg = `HTTP错误 ${response.status}`;
                    try {
                        const errorData = await response.json();
                        errorMsg = errorData.message || errorMsg;
                    } catch (e) {}
                    throw new Error(errorMsg);
                }
                return await response.json();
            } catch (error) {
                console.error('API调用失败:', error);
                showToast('error', error.message);
                throw error;
            }
        }

        async function sendVerificationCode() {
            const phone = document.getElementById('phone').value.trim();
            if (!phone) {
                showToast('error', '请输入手机号码');
                return;
            }
            if (!isValidPhone(phone)) {
                showToast('error', '手机号格式不正确');
                return;
            }
            const sendBtn = document.getElementById('send-code-btn');
            const originalText = sendBtn.innerHTML;
            sendBtn.disabled = true;
            sendBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 发送中...';
            try {
                const result = await apiCall('/register/send-code', {
                    method: 'POST',
                    body: JSON.stringify({ phone })
                });
                if (result.success) {
                    showToast('success', result.message || '验证码已发送');
                    if (result.simulation && result.code) {
                        showToast('info', `测试模式：验证码为 ${result.code}`);
                    }
                    startCountdown(300);
                } else {
                    showToast('error', result.message || '发送失败');
                }
            } catch (error) {
                showToast('error', '发送失败，请稍后重试');
            } finally {
                sendBtn.disabled = false;
                sendBtn.innerHTML = originalText;
            }
        }

        function startCountdown(seconds) {
            const sendBtn = document.getElementById('send-code-btn');
            const countdownEl = document.getElementById('countdown');
            sendBtn.disabled = true;
            countdownSeconds = seconds;
            function updateCountdown() {
                const minutes = Math.floor(countdownSeconds / 60);
                const secs = countdownSeconds % 60;
                countdownEl.textContent = `${minutes.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                if (countdownSeconds <= 0) {
                    clearInterval(smsTimer);
                    sendBtn.disabled = false;
                    sendBtn.innerHTML = '重新发送';
                    countdownEl.textContent = '';
                } else {
                    countdownSeconds--;
                }
            }
            updateCountdown();
            smsTimer = setInterval(updateCountdown, 1000);
        }

        async function handleRegister(e) {
            e.preventDefault();
            const phone = document.getElementById('phone').value.trim();
            const code = document.getElementById('code').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const organization = document.getElementById('organization').value.trim();
            const name = document.getElementById('name').value.trim();
            let username = document.getElementById('username').value.trim();

            if (!phone || !code || !password || !confirmPassword || !organization || !name) {
                showToast('error', '请填写所有必填项');
                return;
            }
            if (!isValidPhone(phone)) {
                showToast('error', '手机号格式不正确');
                return;
            }
            if (code.length !== 6) {
                showToast('error', '验证码必须为6位');
                return;
            }
            if (password.length < 6) {
                showToast('error', '密码长度至少为6位');
                return;
            }
            if (password !== confirmPassword) {
                showToast('error', '两次输入的密码不一致');
                return;
            }
            if (username && !isValidUsername(username)) {
                showToast('error', '用户名只能包含字母、数字和下划线，长度3-20');
                return;
            }
            if (!username) username = '';

            const registerBtn = document.getElementById('register-btn');
            const originalText = registerBtn.innerHTML;
            registerBtn.disabled = true;
            registerBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-1"></i> 注册中...';

            try {
                const result = await apiCall('/register', {
                    method: 'POST',
                    body: JSON.stringify({ phone, code, password, organization, name, username })
                });
                if (result.success) {
                    showToast('success', result.message || '注册成功！即将跳转到登录页...');
                    document.getElementById('register-form').reset();
                    if (smsTimer) clearInterval(smsTimer);
                    document.getElementById('send-code-btn').disabled = false;
                    document.getElementById('send-code-btn').innerHTML = '发送验证码';
                    document.getElementById('countdown').textContent = '';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 3000);
                } else {
                    showToast('error', result.message || '注册失败');
                }
            } catch (error) {
                showToast('error', '注册失败，请稍后重试');
            } finally {
                registerBtn.disabled = false;
                registerBtn.innerHTML = originalText;
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('register-form').addEventListener('submit', handleRegister);
            document.getElementById('send-code-btn').addEventListener('click', sendVerificationCode);
        });
    </script>
</body>
</html>
