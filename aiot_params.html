<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>参数配置 - AIoT 智慧校园</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --success: #2ecc71;
            --warning: #f39c12;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .card {
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            border: none;
            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.95);
            margin-bottom: 20px;
        }
        .card-header {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 1.5rem;
            border-radius: 20px 20px 0 0 !important;
        }
        .top-nav { margin-bottom: 20px; }
        .top-nav .btn { margin-right: 10px; }
        .nav-tabs {
            border-bottom: 2px solid #dee2e6;
            margin-bottom: 20px;
        }
        .nav-tabs .nav-link {
            border: none;
            color: #6c757d;
            font-weight: 600;
            padding: 1rem 2rem;
            transition: all 0.3s;
        }
        .nav-tabs .nav-link.active {
            color: var(--primary);
            background: transparent;
            border-bottom: 3px solid var(--primary);
        }
        .nav-tabs .nav-link:hover {
            color: var(--primary);
            background: rgba(102,126,234,0.1);
        }
        .table-container {
            max-height: 500px;
            overflow-y: auto;
        }
        .table thead {
            position: sticky;
            top: 0;
            background: #f8f9fa;
            z-index: 1;
        }
        .btn-action {
            padding: 0.25rem 0.5rem;
            font-size: 0.875rem;
            margin: 0 2px;
        }
        .import-export-bar {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }
        .file-input-wrapper input[type=file] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }
        .iot-badge {
            font-size: 0.75rem;
            margin: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 顶部导航 -->
        <div class="top-nav">
            <a href="index.html" class="btn btn-light"><i class="fas fa-home me-1"></i> 首页</a>
            <a href="aiot_index.html" class="btn btn-light"><i class="fas fa-th-large me-1"></i> 管理首页</a>
            <a href="aiot_config.html" class="btn btn-primary"><i class="fas fa-tasks me-1"></i> 任务配置</a>
            <a href="aiot_log.html" class="btn btn-info"><i class="fas fa-file-alt me-1"></i> 日志查看</a>
            <a href="aiot_chat.html" class="btn btn-warning"><i class="fas fa-comments me-1"></i> AI 对话</a>
            <a href="aiot_admin.html" class="btn btn-danger"><i class="fas fa-cog me-1"></i> 调试管理</a>
            <a href="aiot_params.html" class="btn btn-success"><i class="fas fa-database me-1"></i> 参数配置</a>
            <button id="logoutBtn" class="btn btn-secondary" style="float: right;"><i class="fas fa-sign-out-alt me-1"></i> 退出</button>
        </div>

        <!-- 主卡片 -->
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0"><i class="fas fa-database me-2"></i>参数配置管理</h4>
            </div>
            <div class="card-body">
                <!-- 导入导出栏 -->
                <div class="import-export-bar">
                    <div class="row align-items-center">
                        <div class="col-md-8">
                            <h5 class="mb-0"><i class="fas fa-file-import me-2"></i>数据导入导出</h5>
                            <small class="text-muted">支持 JSON 和 Excel 格式</small>
                        </div>
                        <div class="col-md-4 text-end">
                            <div class="file-input-wrapper">
                                <button class="btn btn-outline-primary me-2">
                                    <i class="fas fa-upload me-1"></i> 导入
                                </button>
                                <input type="file" id="importFile" accept=".json,.xlsx,.xls" onchange="importData(this)">
                            </div>
                            <button class="btn btn-outline-success me-2" onclick="exportData('json')">
                                <i class="fas fa-download me-1"></i> 导出 JSON
                            </button>
                            <button class="btn btn-outline-success" onclick="exportData('excel')">
                                <i class="fas fa-file-excel me-1"></i> 导出 Excel
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 选项卡导航 -->
                <ul class="nav nav-tabs" id="paramTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="classroom-tab" data-bs-toggle="tab" data-bs-target="#classroom" type="button">
                            <i class="fas fa-building me-2"></i>教室管理
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="teacher-tab" data-bs-toggle="tab" data-bs-target="#teacher" type="button">
                            <i class="fas fa-chalkboard-teacher me-2"></i>班主任管理
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="camera-tab" data-bs-toggle="tab" data-bs-target="#camera" type="button">
                            <i class="fas fa-video me-2"></i>摄像头管理
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="mapping-tab" data-bs-toggle="tab" data-bs-target="#mapping" type="button">
                            <i class="fas fa-link me-2"></i>关联关系
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="iot-tab" data-bs-toggle="tab" data-bs-target="#iot" type="button">
                            <i class="fas fa-plug me-2"></i>物联网开关
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <a class="nav-link" href="aiot_model_config.html" style="color:#667eea;font-weight:600;">
                            <i class="fas fa-robot me-2"></i>🤖 模型参数配置
                        </a>
                    </li>
                </ul>

                <!-- 选项卡内容 -->
                <div class="tab-content" id="paramTabsContent">
                    <!-- 教室管理 -->
                    <div class="tab-pane fade show active" id="classroom" role="tabpanel">
                        <div class="d-flex justify-content-between mb-3">
                            <div class="btn-group">
                                <button class="btn btn-sm btn-primary" onclick="showAddModal('classroom')">
                                    <i class="fas fa-plus me-1"></i> 新增教室
                                </button>
                                <button class="btn btn-sm btn-danger" onclick="deleteSelected('classroom')">
                                    <i class="fas fa-trash me-1"></i> 删除选中
                                </button>
                            </div>
                            <div class="search-box">
                                <input type="text" class="form-control form-control-sm" placeholder="搜索教室..." onkeyup="searchTable('classroom', this.value)">
                            </div>
                        </div>
                        <div class="table-container">
                            <table class="table table-hover" id="classroomTable">
                                <thead>
                                    <tr>
                                        <th width="40"><input type="checkbox" onchange="toggleSelectAll('classroom', this)"></th>
                                        <th>教室编号</th>
                                        <th>教室名称</th>
                                        <th>位置描述</th>
                                        <th>摄像头 URL</th>
                                        <th>照明 ID</th>
                                        <th>空调 ID</th>
                                        <th>插座 ID</th>
                                        <th>班主任</th>
                                        <th>手机</th>
                                        <th>启用</th>
                                        <th width="150">操作</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    </div>

                    <!-- 班主任管理 -->
                    <div class="tab-pane fade" id="teacher" role="tabpanel">
                        <div class="d-flex justify-content-between mb-3">
                            <div class="btn-group">
                                <button class="btn btn-sm btn-primary" onclick="showAddModal('teacher')">
                                    <i class="fas fa-plus me-1"></i> 新增班主任
                                </button>
                                <button class="btn btn-sm btn-danger" onclick="deleteSelected('teacher')">
                                    <i class="fas fa-trash me-1"></i> 删除选中
                                </button>
                            </div>
                            <div class="search-box">
                                <input type="text" class="form-control form-control-sm" placeholder="搜索班主任..." onkeyup="searchTable('teacher', this.value)">
                            </div>
                        </div>
                        <div class="table-container">
                            <table class="table table-hover" id="teacherTable">
                                <thead>
                                    <tr>
                                        <th width="40"><input type="checkbox" onchange="toggleSelectAll('teacher', this)"></th>
                                        <th>姓名</th>
                                        <th>手机号</th>
                                        <th>管理班级</th>
                                        <th>启用</th>
                                        <th width="150">操作</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    </div>

                    <!-- 摄像头管理 -->
                    <div class="tab-pane fade" id="camera" role="tabpanel">
                        <div class="d-flex justify-content-between mb-3">
                            <div class="btn-group">
                                <button class="btn btn-sm btn-primary" onclick="showAddModal('camera')">
                                    <i class="fas fa-plus me-1"></i> 新增摄像头
                                </button>
                                <button class="btn btn-sm btn-danger" onclick="deleteSelected('camera')">
                                    <i class="fas fa-trash me-1"></i> 删除选中
                                </button>
                            </div>
                            <div class="search-box">
                                <input type="text" class="form-control form-control-sm" placeholder="搜索摄像头..." onkeyup="searchTable('camera', this.value)">
                            </div>
                        </div>
                        <div class="table-container">
                            <table class="table table-hover" id="cameraTable">
                                <thead>
                                    <tr>
                                        <th width="40"><input type="checkbox" onchange="toggleSelectAll('camera', this)"></th>
                                        <th>设备 ID</th>
                                        <th>摄像头名称</th>
                                        <th>RTSP 地址</th>
                                        <th>监控区域</th>
                                        <th>启用</th>
                                        <th width="150">操作</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    </div>

                    <!-- 关联关系 -->
                    <div class="tab-pane fade" id="mapping" role="tabpanel">
                        <div class="d-flex justify-content-between mb-3">
                            <div class="btn-group">
                                <button class="btn btn-sm btn-primary" onclick="showAddModal('mapping')">
                                    <i class="fas fa-plus me-1"></i> 新增关联
                                </button>
                                <button class="btn btn-sm btn-danger" onclick="deleteSelected('mapping')">
                                    <i class="fas fa-trash me-1"></i> 删除选中
                                </button>
                            </div>
                        </div>
                        <div class="table-container">
                            <table class="table table-hover" id="mappingTable">
                                <thead>
                                    <tr>
                                        <th width="40"><input type="checkbox" onchange="toggleSelectAll('mapping', this)"></th>
                                        <th>关联 ID</th>
                                        <th>摄像头</th>
                                        <th>教室</th>
                                        <th>班主任</th>
                                        <th>优先级</th>
                                        <th width="150">操作</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    </div>

                    <!-- 物联网开关 -->
                    <div class="tab-pane fade" id="iot" role="tabpanel">
                        <div class="alert alert-info">
                            <i class="fas fa-info-circle me-2"></i>
                            物联网开关 ID 用于控制教室的照明、空调、插座等设备。目前所有开关 ID 相同，可在下方编辑修改。
                        </div>
                        <div class="d-flex justify-content-between mb-3">
                            <div class="btn-group">
                                <button class="btn btn-sm btn-primary" onclick="showAddModal('iot')">
                                    <i class="fas fa-plus me-1"></i> 新增开关
                                </button>
                                <button class="btn btn-sm btn-danger" onclick="deleteSelected('iot')">
                                    <i class="fas fa-trash me-1"></i> 删除选中
                                </button>
                            </div>
                            <div class="search-box">
                                <input type="text" class="form-control form-control-sm" placeholder="搜索开关..." onkeyup="searchTable('iot', this.value)">
                            </div>
                        </div>
                        <div class="table-container">
                            <table class="table table-hover" id="iotTable">
                                <thead>
                                    <tr>
                                        <th width="40"><input type="checkbox" onchange="toggleSelectAll('iot', this)"></th>
                                        <th>教室名称</th>
                                        <th>照明开关 ID</th>
                                        <th>空调开关 ID</th>
                                        <th>插座开关 ID</th>
                                        <th>启用</th>
                                        <th width="150">操作</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 新增/编辑模态框 -->
    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">新增</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="editForm"></form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveData()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE = window.location.origin;
        let currentType = '';
        let editId = null;
        let currentData = {};

        // 真实数据（从 API 加载）
        let mockData = {
            classroom: [],
            teacher: [],
            camera: [],
            mapping: [],
            iot: []
        };

        // 从 API 加载配置数据
        async function loadConfigData() {
            try {
                const response = await fetch(`${API_BASE}/api/aiot/params`);
                const data = await response.json();
                
                if (data.success) {
                    // 转换教室数据（支持三个 Device ID）
                    mockData.classroom = (data.global?.class || []).map((item, index) => ({
                        id: (index + 1).toString(),
                        classroom: item.classroom || '',
                        classname: item.classname || '',
                        camera_url: item.camera_url || '',
                        lighting_id: item.lighting_id || item.DEVICE_ID || '',
                        ac_id: item.ac_id || item.DEVICE_ID || '',
                        socket_id: item.socket_id || item.DEVICE_ID || '',
                        teacher: item.teacher || '',
                        phone: item.phone || '',
                        enabled: true
                    }));
                    
                    // 生成教师数据（去重）
                    const teacherMap = new Map();
                    (data.global?.class || []).forEach(item => {
                        if (item.teacher && item.phone) {
                            teacherMap.set(item.teacher, {
                                id: item.phone,
                                name: item.teacher,
                                phone: item.phone,
                                classes: item.classroom,
                                enabled: true
                            });
                        }
                    });
                    mockData.teacher = Array.from(teacherMap.values());
                    
                    // 生成摄像头数据
                    mockData.camera = mockData.classroom
                        .filter(cls => typeof cls.camera_url === 'string' && cls.camera_url.startsWith('rtsp://'))
                        .map(cls => ({
                            id: cls.id,
                            deviceId: cls.DEVICE_ID,
                            name: `${cls.classroom}摄像头`,
                            rtsp: cls.camera_url,
                            area: cls.classname,
                            enabled: true
                        }));
                    
                    // 生成关联关系
                    mockData.mapping = mockData.classroom.map(cls => ({
                        id: cls.id,
                        camera: `${cls.classroom}摄像头`,
                        classroom: cls.classroom,
                        teacher: cls.teacher,
                        priority: 1
                    }));
                    
                    // 生成物联网开关数据
                    const defaultDeviceId = "6c6c9826fbef91e252rakj";
                    mockData.iot = mockData.classroom.map(cls => ({
                        id: cls.id,
                        classroom: cls.classroom,
                        lighting_id: cls.DEVICE_ID || defaultDeviceId,
                        ac_id: cls.DEVICE_ID || defaultDeviceId,
                        socket_id: cls.DEVICE_ID || defaultDeviceId,
                        enabled: true
                    }));
                    
                    loadAllData();
                }
            } catch (error) {
                console.error('加载配置数据失败:', error);
                alert('加载配置数据失败，请检查网络连接');
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadConfigData();
            
            // 绑定退出按钮事件
            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', function() {
                    if (confirm('确定要退出参数配置页面吗？')) {
                        window.location.href = 'aiot_index.html';
                    }
                });
            }
        });

        // 加载所有数据
        function loadAllData() {
            renderTable('classroom', mockData.classroom);
            renderTable('teacher', mockData.teacher);
            renderTable('camera', mockData.camera);
            renderTable('mapping', mockData.mapping);
            renderTable('iot', mockData.iot);
        }

        // 渲染表格
        function renderTable(type, data) {
            const tbody = document.querySelector(`#${type}Table tbody`);
            let html = '';
            
            data.forEach((item, index) => {
                html += `<tr data-id="${item.id}">`;
                html += `<td><input type="checkbox" class="row-checkbox" data-type="${type}"></td>`;
                
                if (type === 'classroom') {
                    html += `<td>${item.classroom}</td>`;
                    html += `<td>${item.classname}</td>`;
                    html += `<td>${item.classname}</td>`;
                    html += `<td><small>${typeof item.camera_url === 'string' ? item.camera_url.substring(0, 30) + '...' : item.camera_url}</small></td>`;
                    html += `<td><span class="badge bg-warning iot-badge" title="照明">${item.lighting_id || '-'}</span></td>`;
                    html += `<td><span class="badge bg-info iot-badge" title="空调">${item.ac_id || '-'}</span></td>`;
                    html += `<td><span class="badge bg-primary iot-badge" title="插座">${item.socket_id || '-'}</span></td>`;
                    html += `<td>${item.teacher || '-'}</td>`;
                    html += `<td>${item.phone || '-'}</td>`;
                    html += `<td><span class="badge ${item.enabled ? 'bg-success' : 'bg-secondary'}">${item.enabled ? '启用' : '禁用'}</span></td>`;
                } else if (type === 'teacher') {
                    html += `<td>${item.name}</td><td>${item.phone}</td><td>${item.classes}</td>`;
                    html += `<td><span class="badge ${item.enabled ? 'bg-success' : 'bg-secondary'}">${item.enabled ? '启用' : '禁用'}</span></td>`;
                } else if (type === 'camera') {
                    html += `<td>${item.deviceId}</td><td>${item.name}</td><td><small>${item.rtsp}</small></td><td>${item.area}</td>`;
                    html += `<td><span class="badge ${item.enabled ? 'bg-success' : 'bg-secondary'}">${item.enabled ? '启用' : '禁用'}</span></td>`;
                } else if (type === 'mapping') {
                    html += `<td>${item.id}</td><td>${item.camera}</td><td>${item.classroom}</td><td>${item.teacher}</td><td>${item.priority}</td>`;
                } else if (type === 'iot') {
                    html += `<td>${item.classroom}</td>`;
                    html += `<td><span class="badge bg-warning iot-badge">${item.lighting_id}</span></td>`;
                    html += `<td><span class="badge bg-info iot-badge">${item.ac_id}</span></td>`;
                    html += `<td><span class="badge bg-primary iot-badge">${item.socket_id}</span></td>`;
                    html += `<td><span class="badge ${item.enabled ? 'bg-success' : 'bg-secondary'}">${item.enabled ? '启用' : '禁用'}</span></td>`;
                }
                
                html += `<td>
                    <button class="btn btn-sm btn-outline-primary btn-action" onclick="editItem('${type}', '${item.id}')">
                        <i class="fas fa-edit"></i>
                    </button>
                    <button class="btn btn-sm btn-outline-danger btn-action" onclick="deleteItem('${type}', '${item.id}')">
                        <i class="fas fa-trash"></i>
                    </button>
                </td>`;
                html += `</tr>`;
            });
            
            tbody.innerHTML = html;
        }

        // 显示新增/编辑模态框
        function showAddModal(type) {
            currentType = type;
            editId = null;
            document.getElementById('modalTitle').textContent = '新增';
            
            const form = document.getElementById('editForm');
            let html = '';
            
            if (type === 'classroom') {
                html = `
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">教室名称</label>
                            <input type="text" class="form-control" id="formClassroom" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">位置描述</label>
                            <input type="text" class="form-control" id="formClassname">
                        </div>
                        <div class="col-12">
                            <label class="form-label">摄像头 URL</label>
                            <input type="text" class="form-control" id="formCameraUrl">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">照明 Device ID</label>
                            <input type="text" class="form-control" id="formLightingDeviceId" placeholder="6c6c9826fbef91e2XXrakj">
                            <small class="text-muted">涂鸦照明开关</small>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">空调 Device ID</label>
                            <input type="text" class="form-control" id="formAcDeviceId" placeholder="6c6c9826fbef91e2XXrakj">
                            <small class="text-muted">涂鸦空调开关</small>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">插座 Device ID</label>
                            <input type="text" class="form-control" id="formSocketDeviceId" placeholder="6c6c9826fbef91e2XXrakj">
                            <small class="text-muted">涂鸦插座开关</small>
                        </div>
                        <div class="col-md-6">

        // 保存数据
        async function saveData() {
            if (!currentType) {
                alert('请先选择要保存的类型');
                return;
            }
            
            // 根据类型收集表单数据
            let data = {};
            
            if (currentType === 'classroom') {
                data = {
                    classroom: document.getElementById('formClassroom').value,
                    classname: document.getElementById('formClassname').value,
                    camera_url: document.getElementById('formCameraUrl').value,
                    lighting_id: document.getElementById('formLightingDeviceId').value,
                    ac_id: document.getElementById('formAcDeviceId').value,
                    socket_id: document.getElementById('formSocketDeviceId').value,
                    teacher: document.getElementById('formTeacher').value,
                    phone: document.getElementById('formPhone').value,
                    enabled: document.getElementById('formEnabled').checked
                };
            } else if (currentType === 'teacher') {
                data = {
                    name: document.getElementById('formTeacherName').value,
                    phone: document.getElementById('formTeacherPhone').value,
                    classes: document.getElementById('formTeacherClasses').value,
                    enabled: document.getElementById('formTeacherEnabled').checked
                };
            } else if (currentType === 'camera') {
                data = {
                    name: document.getElementById('formCameraName').value,
                    deviceId: document.getElementById('formCameraDeviceId').value,
                    rtsp: document.getElementById('formCameraRtsp').value,
                    area: document.getElementById('formCameraArea').value,
                    enabled: document.getElementById('formCameraEnabled').checked
                };
            } else if (currentType === 'mapping') {
                data = {
                    camera: document.getElementById('formMappingCamera').value,
                    classroom: document.getElementById('formMappingClassroom').value,
                    teacher: document.getElementById('formMappingTeacher').value,
                    priority: parseInt(document.getElementById('formMappingPriority').value)
                };
            } else if (currentType === 'iot') {
                data = {
                    classroom: document.getElementById('formIotClassroom').value,
                    lighting_id: document.getElementById('formLightingId').value,
                    ac_id: document.getElementById('formAcId').value,
                    socket_id: document.getElementById('formSocketId').value,
                    enabled: document.getElementById('formIotEnabled').checked
                };
            }
            
            // 如果是编辑模式，添加 ID
            if (editId) {
                data.id = editId;
            }
            
            try {
                // 调用 API 保存数据
                const response = await fetch(`${API_BASE}/api/aiot/params`, {
                    method: editId ? 'PUT' : 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        type: currentType,
                        data: data
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert('✅ 保存成功！');
                    bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
                    loadConfigData(); // 重新加载数据
                } else {
                    alert('❌ 保存失败：' + result.message);
                }
            } catch (error) {
                // 如果没有后端 API，使用本地模拟保存
                if (currentType === 'classroom') {
                    if (editId) {
                        const item = mockData.classroom.find(i => i.id === editId);
                        if (item) {
                            item.classroom = data.classroom;
                            item.classname = data.classname;
                            item.camera_url = data.camera_url;
                            item.DEVICE_ID = data.DEVICE_ID;
                            item.enabled = data.enabled;
                        }
                    } else {
                        data.id = (mockData.classroom.length + 1).toString();
                        mockData.classroom.push(data);
                    }
                    renderTable('classroom', mockData.classroom);
                    alert('✅ 保存成功！（本地模式）');
                    bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
                } else {
                    alert('⚠️ 该类型的保存功能开发中...');
                    bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
                }
            }
        }

        // 填充关联关系下拉选项

            const cameraSelect = document.getElementById('formMappingCamera');

        function deleteItem(type, id) {
            if (confirm('确定要删除吗？')) {
                mockData[type] = mockData[type].filter(item => item.id !== id);

        // 全选/取消全选
        function toggleSelectAll(type, checkbox) {
            document.querySelectorAll(`.row-checkbox[data-type="${type}"]`).forEach(cb => {
                cb.checked = checkbox.checked;
            });
        }

        // 搜索表格
        function searchTable(type, keyword) {
            const rows = document.querySelectorAll(`#${type}Table tbody tr`);
            rows.forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(keyword.toLowerCase()) ? '' : 'none';
            });
        }

        // 导入数据
        function importData(input) {
            const file = input.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    alert('导入成功！');
                    loadAllData();
                } catch (error) {
                    alert('导入失败：' + error.message);
                }
            };
            reader.readAsText(file);
        }

        // 导出数据
        function exportData(format) {
            const dataStr = JSON.stringify(mockData, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `aiot_params_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
