<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灯截图橱窗</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background-color: #f3f4f6;
            margin: 0;
            padding: 20px;
        }
        .header {
            max-width: 1200px;
            margin: 0 auto 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .header h1 {
            font-size: 2rem;
            color: #1f2937;
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0;
        }
        .header h1 i {
            color: #3B82F6;
        }
        .info-bar {
            background-color: #e5e7eb;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.9rem;
            color: #374151;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .info-bar i {
            color: #3B82F6;
        }
        .gallery {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }
        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
        }
        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background-color: #e5e7eb;
            display: block;
        }
        .card-info {
            padding: 16px;
        }
        .student-id {
            font-weight: 600;
            font-size: 1.1rem;
            color: #111827;
            margin-bottom: 8px;
            word-break: break-all;
        }
        .timestamp {
            font-size: 0.85rem;
            color: #6b7280;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .timestamp i {
            font-size: 0.9rem;
        }
        .empty, .error-message {
            text-align: center;
            padding: 60px 20px;
            color: #9ca3af;
            font-size: 1.2rem;
        }
        .error-message {
            color: #ef4444;
            background: #fee2e2;
            border-radius: 8px;
            max-width: 600px;
            margin: 40px auto;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #3B82F6;
        }
        .no-image {
            background: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: #9ca3af;
            font-size: 0.9rem;
        }
        /* 加载更多按钮 */
        .load-more-container {
            text-align: center;
            margin: 40px 0;
        }
        #loadMoreBtn {
            background-color: #3B82F6;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        #loadMoreBtn:hover:not(:disabled) {
            background-color: #2563eb;
        }
        #loadMoreBtn:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }
        /* 模态框样式 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            max-width: 90%;
            max-height: 90%;
        }
        .modal-content img {
            width: 100%;
            height: auto;
            border-radius: 4px;
        }
        .close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .close:hover {
            color: #bbb;
        }
        .modal-info {
            color: white;
            text-align: center;
            margin-top: 10px;
            font-size: 1rem;
        }
    </style>
</head>

<!-- QUICKFORGE FIX -->
<input type="hidden" id="qf_teacher" value="{{teacher}}">
<input type="hidden" id="qf_activity_id" value="{{task}}">
<input type="hidden" id="qf_student_id" name="student_id" value="">
<!-- END FIX -->

<body>
    <div class="header">
        <h1><i class="fa fa-picture-o"></i> 台灯组装截图展</h1>
        <div class="info-bar" id="infoBar">
            <i class="fa fa-info-circle"></i>
            <span id="teacherActivityDisplay">正在确定教师与活动...</span>
        </div>
        <a href="/" style="color:#3B82F6; text-decoration: none;"><i class="fa fa-arrow-left"></i> 返回游戏</a>
    </div>

    <!-- 画廊容器 -->
    <div id="gallery" class="gallery">
        <div class="loading"><i class="fa fa-spinner fa-spin fa-2x"></i> 加载中...</div>
    </div>

    <!-- 加载更多按钮容器 -->
    <div class="load-more-container">
        <button id="loadMoreBtn" style="display: none;">加载更多</button>
    </div>

    <!-- 放大查看模态框 -->
    <div id="imageModal" class="modal">
        <span class="close">&times;</span>
        <div class="modal-content">
            <img id="modalImg" src="" alt="大图预览">
            <div id="modalCaption" class="modal-info"></div>
        </div>
    </div>

    <script>
        // 模态框元素
        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalImg');
        const modalCaption = document.getElementById('modalCaption');
        const closeBtn = document.querySelector('.close');

        closeBtn.onclick = () => modal.style.display = 'none';
        window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };

        // ==================== 新增：从隐藏字段或URL获取教师和活动ID ====================
        function getTeacherAndActivity() {
            let teacher = null;
            let activityId = null;

            const qfTeacher = document.getElementById('qf_teacher')?.value;
            const qfActivity = document.getElementById('qf_activity_id')?.value;

            if (qfTeacher && !qfTeacher.includes('{{') && qfTeacher.trim() !== '') {
                teacher = qfTeacher.trim();
            }
            if (qfActivity && !qfActivity.includes('{{') && qfActivity.trim() !== '') {
                activityId = qfActivity.trim();
            }

            if (!teacher || !activityId) {
                const pathParts = window.location.pathname.split('/');
                // URL格式: /templates/教师名/.../任务文件夹/文件名.html
                if (pathParts.length >= 4) {
                    if (!teacher) {
                        teacher = decodeURIComponent(pathParts[2]);
                    }
                    if (!activityId) {
                        activityId = decodeURIComponent(pathParts[pathParts.length - 2]);
                    }
                }
            }

            return { teacher, activityId };
        }

        // ==================== 分页状态 ====================
        let currentOffset = 0;
        const limit = 20;               // 每页加载20条
        let total = 0;                   // 总记录数
        let loading = false;              // 防止重复请求
        let hasMore = true;                // 是否还有更多数据

        const galleryEl = document.getElementById('gallery');
        const loadMoreBtn = document.getElementById('loadMoreBtn');
        const infoDisplay = document.getElementById('teacherActivityDisplay');
        const infoBar = document.getElementById('infoBar');

        // 获取教师和活动ID
        const { teacher, activityId } = getTeacherAndActivity();
        if (!teacher || !activityId) {
            infoDisplay.innerText = '无法确定教师或活动';
            galleryEl.innerHTML = '<div class="error-message"><i class="fa fa-exclamation-triangle fa-2x"></i><br />无法获取教师或活动信息，请检查页面路径或隐藏字段。</div>';
            loadMoreBtn.style.display = 'none';
            // 停止后续加载
            throw new Error('Missing teacher or activityId');
        } else {
            infoDisplay.innerText = `${teacher} 老师 - 活动：${activityId}`;
        }

        // ==================== 加载数据函数 ====================
        async function loadSubmissions(offset = 0) {
            if (loading) return;
            loading = true;

            // 首次加载时显示加载中；非首次隐藏加载更多按钮并显示文本
            if (offset === 0) {
                galleryEl.innerHTML = '<div class="loading"><i class="fa fa-spinner fa-spin fa-2x"></i> 加载中...</div>';
                loadMoreBtn.style.display = 'none';
            } else {
                loadMoreBtn.disabled = true;
                loadMoreBtn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> 加载中...';
            }

            try {
                // 构建URL，必须包含 teacher 和 activity_id
                const url = `/api/submissions?teacher=${encodeURIComponent(teacher)}&activity_id=${encodeURIComponent(activityId)}&limit=${limit}&offset=${offset}`;
                const res = await fetch(url);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);

                const data = await res.json();
                const submissions = data.submissions || [];
                total = data.total || 0;   // 假设接口返回 total 字段

                // 移除首次加载的 loading 提示
                if (offset === 0) galleryEl.innerHTML = '';

                if (submissions.length === 0 && offset === 0) {
                    galleryEl.innerHTML = '<div class="empty"><i class="fa fa-meh-o fa-3x"></i><br />暂无截图</div>';
                    loadMoreBtn.style.display = 'none';
                    hasMore = false;
                    return;
                }

                // 生成卡片 HTML
                let cardsHtml = '';
                for (const sub of submissions) {
                    const studentId = sub.student_id || '未知学号';
                    const timestamp = sub._server_timestamp || sub._server_received || null;
                    let timeStr = '时间未知';
                    if (timestamp) {
                        const date = new Date(timestamp);
                        timeStr = date.toLocaleString('zh-CN', { hour12: false });
                    }

                    // 处理图片URL：优先使用 _files 中的 url 字段，否则根据 teacher 和 saved_name 拼接
                    let imageUrl = '';
                    let originalFilename = '';
                    if (sub._files && Array.isArray(sub._files) && sub._files.length > 0) {
                        const screenshotFile = sub._files.find(f => 
                            f.original_name && f.original_name.toLowerCase().endsWith('.png')
                        ) || sub._files[0];
                        if (screenshotFile) {
                            if (screenshotFile.url) {
                                imageUrl = screenshotFile.url;
                            } else if (screenshotFile.saved_name) {
                                imageUrl = `/templates/${teacher}/uploads/${screenshotFile.saved_name}`;
                            }
                            originalFilename = screenshotFile.original_name || screenshotFile.saved_name;
                        }
                    }

                    cardsHtml += `
                        <div class="card" data-img="${imageUrl}" data-student="${studentId}" data-time="${timeStr}" data-original="${originalFilename}">
                            ${imageUrl ? 
                                `<img src="${imageUrl}" alt="截图" loading="lazy" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\'no-image\'><i class=\'fa fa-image\'></i> 图片加载失败</div>';">` : 
                                `<div class="no-image"><i class="fa fa-image"></i> 无截图</div>`
                            }
                            <div class="card-info">
                                <div class="student-id"><i class="fa fa-id-card" style="color:#3B82F6;"></i> ${studentId}</div>
                                <div class="timestamp"><i class="fa fa-clock-o"></i> ${timeStr}</div>
                            </div>
                        </div>
                    `;
                }

                // 追加新卡片
                if (offset === 0) {
                    galleryEl.innerHTML = cardsHtml;
                } else {
                    galleryEl.insertAdjacentHTML('beforeend', cardsHtml);
                }

                // 重新绑定卡片点击事件（新追加的卡片）
                document.querySelectorAll('.card').forEach(card => {
                    card.addEventListener('click', function(e) {
                        const imgUrl = this.dataset.img;
                        if (!imgUrl) return;
                        modalImg.src = imgUrl;
                        modalCaption.innerHTML = `${this.dataset.student} - ${this.dataset.time}${this.dataset.original ? ' (' + this.dataset.original + ')' : ''}`;
                        modal.style.display = 'flex';
                    });
                });

                // 判断是否还有更多
                const loadedCount = offset + submissions.length;
                hasMore = loadedCount < total;
                if (hasMore) {
                    loadMoreBtn.style.display = 'inline-block';
                    loadMoreBtn.disabled = false;
                    loadMoreBtn.innerHTML = '加载更多';
                } else {
                    loadMoreBtn.style.display = 'none';
                }

            } catch (err) {
                console.error(err);
                if (offset === 0) {
                    galleryEl.innerHTML = `<div class="error-message"><i class="fa fa-exclamation-triangle fa-2x"></i><br />加载失败：${err.message}</div>`;
                } else {
                    alert('加载更多失败，请重试');
                }
                loadMoreBtn.style.display = 'none';
            } finally {
                loading = false;
            }
        }

        // 初始加载
        loadSubmissions(0);

        // 加载更多按钮点击
        loadMoreBtn.addEventListener('click', () => {
            if (!hasMore || loading) return;
            currentOffset += limit;
            loadSubmissions(currentOffset);
        });
    </script>
</body>
</html>
