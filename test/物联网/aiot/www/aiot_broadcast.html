<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能广播 - AIoT 智慧校园管理平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #7209b7;
            --success: #06d6a0;
            --danger: #ef476f;
            --warning: #ffd166;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea22, #764ba222);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .page-header {
            background: white;
            border-radius: 20px;
            padding: 25px 30px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .page-title {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .card-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: #333;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 10px;
        }
        .form-label { font-weight: 500; color: #555; margin-bottom: 8px; }
        .form-control, .form-select {
            border-radius: 10px;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            transition: all 0.3s;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(67,97,238,0.1);
        }
        .btn {
            border-radius: 10px;
            padding: 12px 25px;
            font-weight: 500;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .task-card {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            border-radius: 15px;
            padding: 15px 20px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s;
            border: 3px solid transparent;
        }
        .task-card:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0,0,0,0.15); }
        .task-card.active { border-color: var(--primary); background: linear-gradient(135deg, #e8f0ff, #d0e0ff); }
        .task-name { font-weight: 600; font-size: 1.1rem; color: #333; }
        .task-status {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .status-enabled { background: #d4edda; color: #155724; }
        .status-disabled { background: #f8d7da; color: #721c24; }
        .time-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .time-table th, .time-table td { padding: 12px; text-align: center; border: 1px solid #dee2e6; }
        .time-table th { background: var(--primary); color: white; font-weight: 500; }
        .time-table tr:nth-child(even) { background: #f8f9fa; }
        .weekday-check { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        .weekday-label {
            display: flex; align-items: center; gap: 5px;
            padding: 8px 15px; border-radius: 10px;
            background: #f0f0f0; cursor: pointer;
        }
        .weekday-label.active { background: var(--primary); color: white; }
        .tab-btn {
            padding: 12px 25px; border: none; background: transparent;
            color: #666; font-weight: 500; cursor: pointer;
            border-bottom: 3px solid transparent;
        }
        .tab-btn.active { border-color: var(--primary); color: var(--primary); }
        .tabs { display: flex; border-bottom: 2px solid #e0e0e0; margin-bottom: 25px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-header">
            <div>
                <h1 class="page-title"><i class="fas fa-bullhorn me-2"></i>智能广播</h1>
                <p class="text-muted mb-0">定时广播任务管理 · 节假日配置</p>
            </div>
            <div>
                <a href="aiot_index.html" class="btn btn-outline-secondary">
                    <i class="fas fa-home me-1"></i>返回主页
                </a>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-4">
                <div class="card">
                    <h5 class="card-title"><i class="fas fa-list me-2"></i>广播任务列表</h5>
                    <button class="btn btn-primary w-100 mb-3" onclick="showAddTask()">
                        <i class="fas fa-plus me-2"></i>新增广播任务
                    </button>
                    <div id="taskList">
                        <div class="text-center text-muted py-4">
                            <i class="fas fa-spinner fa-spin me-2"></i>加载中...
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-8">
                <div class="card">
                    <div class="tabs">
                        <button class="tab-btn active" onclick="switchTab('schedule')">定时配置</button>
                        <button class="tab-btn" onclick="switchTab('holiday')">节假日配置</button>
                        <button class="tab-btn" onclick="switchTab('edit')">任务编辑</button>
                    </div>

                    <!-- 定时配置 -->
                    <div id="schedule-tab">
                        <div class="alert alert-info">
                            <i class="fas fa-info-circle me-2"></i>设置广播任务的执行时间，支持按天/按星期/单次执行
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">选择广播任务</label>
                                <select class="form-select" id="scheduleTask" onchange="loadTaskSchedule()">
                                    <option value="">请选择任务</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">定时类型</label>
                                <select class="form-select" id="scheduleType" onchange="toggleScheduleType()">
                                    <option value="daily">按天循环</option>
                                    <option value="weekly">按星期循环</option>
                                    <option value="once">单次执行</option>
                                </select>
                            </div>
                        </div>

                        <div id="dailySchedule" class="row">
                            <div class="col-md-12 mb-3">
                                <label class="form-label">广播时间</label>
                                <input type="time" class="form-control" id="dailyTime" value="08:00">
                            </div>
                        </div>

                        <div id="weeklySchedule" style="display:none;">
                            <div class="mb-3">
                                <label class="form-label">选择星期</label>
                                <div class="weekday-check">
                                    <label class="weekday-label"><input type="checkbox" name="scheduleWeekday" value="1"> 一</label>
                                    <label class="weekday-label"><input type="checkbox" name="scheduleWeekday" value="2"> 二</label>
                                    <label class="weekday-label"><input type="checkbox" name="scheduleWeekday" value="3"> 三</label>
                                    <label class="weekday-label"><input type="checkbox" name="scheduleWeekday" value="4"> 四</label>
                                    <label class="weekday-label"><input type="checkbox" name="scheduleWeekday" value="5"> 五</label>
                                    <label class="weekday-label"><input type="checkbox" name="scheduleWeekday" value="6"> 六</label>
                                    <label class="weekday-label"><input type="checkbox" name="scheduleWeekday" value="0"> 日</label>
                                </div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">广播时间</label>
                                <input type="time" class="form-control" id="weeklyTime" value="08:00">
                            </div>
                        </div>

                        <div id="onceSchedule" style="display:none;">
                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label class="form-label">日期</label>
                                    <input type="date" class="form-control" id="onceDate">
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label">广播时间</label>
                                    <input type="time" class="form-control" id="onceTime" value="08:00">
                                </div>
                            </div>
                        </div>

                        <div class="mt-4">
                            <button class="btn btn-primary" onclick="saveSchedule()">
                                <i class="fas fa-save me-2"></i>保存定时配置
                            </button>
                            <button class="btn btn-outline-danger ms-2" onclick="clearSchedule()">
                                <i class="fas fa-trash me-2"></i>清除定时
                            </button>
                        </div>

                        <h6 class="mt-4 mb-3">当前定时列表</h6>
                        <table class="time-table" id="scheduleList">
                            <thead>
                                <tr>
                                    <th>任务</th>
                                    <th>类型</th>
                                    <th>时间</th>
                                    <th>状态</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>

                    <!-- 节假日配置 -->
                    <div id="holiday-tab" style="display:none;">
                        <div class="alert alert-info">
                            <i class="fas fa-info-circle me-2"></i>设置节假日特殊策略，节假日当天将按配置的规则执行
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">添加节假日</label>
                                <input type="date" class="form-control" id="holidayDate">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">节假日动作</label>
                                <select class="form-select" id="holidayAction">
                                    <option value="play">播放广播</option>
                                    <option value="skip">跳过（不播放）</option>
                                    <option value="custom">播放自定义内容</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3" id="customContent" style="display:none;">
                            <label class="form-label">自定义广播内容</label>
                            <textarea class="form-control" id="customBroadcast" rows="3" placeholder="输入节假日自定义广播内容"></textarea>
                        </div>
                        <button class="btn btn-primary" onclick="addHoliday()">
                            <i class="fas fa-plus me-2"></i>添加节假日
                        </button>

                        <h6 class="mt-4 mb-3">已设置的节假日</h6>
                        <div id="holidayList"></div>
                    </div>

                    <!-- 任务编辑 -->
                    <div id="edit-tab" style="display:none;">
                        <div class="row">
                            <div class="col-md-12 mb-3">
                                <label class="form-label">任务名称</label>
                                <input type="text" class="form-control" id="taskName" placeholder="如：早上好广播">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-12 mb-3">
                                <label class="form-label">广播内容（文字转语音）</label>
                                <textarea class="form-control" id="broadcastContent" rows="4" placeholder="请输入要广播的内容..."></textarea>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">选择播音员</label>
                                <select class="form-select" id="voiceSelect">
                                    <option value="xiaoyun">小云（女声）</option>
                                    <option value="xiaogang">小刚（男声）</option>
                                    <option value="xiaoyuan">小媛（女声）</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">语速</label>
                                <select class="form-select" id="speedSelect">
                                    <option value="0.8">慢速</option>
                                    <option value="1.0" selected>常速</option>
                                    <option value="1.2">快速</option>
                                </select>
                            </div>
                        </div>
                        <div class="mt-4">
                            <button class="btn btn-primary" onclick="saveTask()">
                                <i class="fas fa-save me-2"></i>保存任务
                            </button>
                            <button class="btn btn-success ms-2" onclick="testPlay()">
                                <i class="fas fa-play me-2"></i>试听
                            </button>
                            <button class="btn btn-outline-danger ms-2" onclick="deleteTask()">
                                <i class="fas fa-trash me-2"></i>删除任务
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '';
        let tasks = [];
        let schedules = [];
        let holidays = [];
        let currentTaskId = null;

        // 页面加载
        document.addEventListener('DOMContentLoaded', function() {
            loadTasks();
            loadSchedules();
            loadHolidays();
        });

        // 切换标签页
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('[id$="-tab"]').forEach(div => div.style.display = 'none');
            event.target.classList.add('active');
            document.getElementById(tab + '-tab').style.display = 'block';
        }

        // 切换定时类型
        function toggleScheduleType() {
            const type = document.getElementById('scheduleType').value;
            document.getElementById('dailySchedule').style.display = type === 'daily' ? 'flex' : 'none';
            document.getElementById('weeklySchedule').style.display = type === 'weekly' ? 'block' : 'none';
            document.getElementById('onceSchedule').style.display = type === 'once' ? 'block' : 'none';
        }

        // 节假日动作切换
        document.getElementById('holidayAction').addEventListener('change', function() {
            document.getElementById('customContent').style.display = this.value === 'custom' ? 'block' : 'none';
        });

        // 星期选择
        document.querySelectorAll('.weekday-label').forEach(label => {
            label.addEventListener('click', function() {
                this.classList.toggle('active');
                const checkbox = this.querySelector('input');
                checkbox.checked = !checkbox.checked;
            });
        });

        // 加载任务
        async function loadTasks() {
            try {
                const res = await fetch(API_BASE + '/api/aiot/broadcast/tasks');
                const data = await res.json();
                tasks = data.tasks || [];
                renderTasks();
                renderTaskSelect();
            } catch(e) {
                console.error('加载任务失败', e);
            }
        }

        // 渲染任务列表
        function renderTasks() {
            const list = document.getElementById('taskList');
            if (!tasks.length) {
                list.innerHTML = '<div class="text-center text-muted py-4"><i class="fas fa-bullhorn me-2"></i>暂无广播任务</div>';
                return;
            }
            list.innerHTML = tasks.map(t => `
                <div class="task-card ${currentTaskId == t.id ? 'active' : ''}" onclick="selectTask('${t.id}')">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <div class="task-name">${t.name}</div>
                            <small class="text-muted">${t.content?.substring(0, 30)}...</small>
                        </div>
                        <span class="task-status ${t.enabled ? 'status-enabled' : 'status-disabled'}">
                            ${t.enabled ? '启用' : '禁用'}
                        </span>
                    </div>
                </div>
            `).join('');
        }

        // 选择任务
        function selectTask(id) {
            currentTaskId = id;
            renderTasks();
            // 加载任务详情到编辑区
            const task = tasks.find(t => t.id == id);
            if (task) {
                document.getElementById('taskName').value = task.name || '';
                document.getElementById('broadcastContent').value = task.content || '';
            }
        }

        // 显示新增任务
        function showAddTask() {
            currentTaskId = null;
            document.getElementById('taskName').value = '';
            document.getElementById('broadcastContent').value = '';
            switchTab('edit');
        }

        // 渲染任务选择下拉
        function renderTaskSelect() {
            const select = document.getElementById('scheduleTask');
            select.innerHTML = '<option value="">请选择任务</option>' + 
                tasks.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
        }

        // 保存任务
        async function saveTask() {
            const name = document.getElementById('taskName').value;
            const content = document.getElementById('broadcastContent').value;
            
            if (!name || !content) {
                alert('请填写任务名称和广播内容');
                return;
            }

            try {
                const res = await fetch(API_BASE + '/api/aiot/broadcast/tasks', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({name, content, id: currentTaskId})
                });
                const data = await res.json();
                if (data.success) {
                    alert('保存成功');
                    loadTasks();
                } else {
                    alert('保存失败');
                }
            } catch(e) {
                alert('保存失败');
            }
        }

        // 删除任务
        async function deleteTask() {
            if (!currentTaskId) {
                alert('请先选择任务');
                return;
            }
            if (!confirm('确定要删除这个任务吗？')) return;
            
            // TODO: 调用删除API
            alert('任务已删除');
            loadTasks();
        }

        // 试听
        async function testPlay() {
            const content = document.getElementById('broadcastContent').value;
            if (!content) {
                alert('请先输入广播内容');
                return;
            }
            
            try {
                const res = await fetch(API_BASE + '/api/aiot/broadcast/test', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({content})
                });
                const data = await res.json();
                if (data.success) {
                    alert('正在播放...');
                } else {
                    alert('播放失败');
                }
            } catch(e) {
                alert('播放失败');
            }
        }

        // 加载定时配置
        async function loadSchedules() {
            try {
                const res = await fetch(API_BASE + '/api/aiot/broadcast/schedules');
                const data = await res.json();
                schedules = data.schedules || [];
                renderSchedules();
            } catch(e) {
                console.error('加载定时失败', e);
            }
        }

        // 渲染定时列表
        function renderSchedules() {
            const tbody = document.querySelector('#scheduleList tbody');
            if (!schedules.length) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">暂无定时配置</td></tr>';
                return;
            }
            tbody.innerHTML = schedules.map(s => `
                <tr>
                    <td>${s.task_name}</td>
                    <td>${s.type === 'daily' ? '按天' : s.type === 'weekly' ? '按星期' : '单次'}</td>
                    <td>${s.time || ''}</td>
                    <td>${s.enabled ? '启用' : '禁用'}</td>
                    <td>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteSchedule('${s.id}')">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        // 保存定时配置
        async function saveSchedule() {
            const taskId = document.getElementById('scheduleTask').value;
            const type = document.getElementById('scheduleType').value;
            
            if (!taskId) {
                alert('请选择广播任务');
                return;
            }

            const schedule = {
                task_id: taskId,
                type: type,
                enabled: true
            };

            if (type === 'daily') {
                schedule.time = document.getElementById('dailyTime').value;
            } else if (type === 'weekly') {
                schedule.weekdays = Array.from(document.querySelectorAll('input[name="scheduleWeekday"]:checked')).map(c => c.value);
                schedule.time = document.getElementById('weeklyTime').value;
            } else {
                schedule.date = document.getElementById('onceDate').value;
                schedule.time = document.getElementById('onceTime').value;
            }

            try {
                const res = await fetch(API_BASE + '/api/aiot/broadcast/schedules', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(schedule)
                });
                const data = await res.json();
                if (data.success) {
                    alert('保存成功');
                    loadSchedules();
                } else {
                    alert('保存失败');
                }
            } catch(e) {
                alert('保存失败');
            }
        }

        // 清除定时
        async function clearSchedule() {
            if (!confirm('确定要清除所有定时配置吗？')) return;
            // TODO: 调用清除API
            alert('定时已清除');
            loadSchedules();
        }

        // 删除定时
        async function deleteSchedule(id) {
            if (!confirm('确定要删除这条定时吗？')) return;
            // TODO: 调用删除API
            loadSchedules();
        }

        // 加载节假日
        async function loadHolidays() {
            // TODO: 从API加载
            renderHolidays();
        }

        // 渲染节假日
        function renderHolidays() {
            const list = document.getElementById('holidayList');
            if (!holidays.length) {
                list.innerHTML = '<div class="text-muted">暂无节假日配置</div>';
                return;
            }
            list.innerHTML = holidays.map(h => `
                <div class="task-card">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>${h.date}</div>
                        <div>
                            <span class="task-status ${h.action === 'play' ? 'status-enabled' : 'status-disabled'}">
                                ${h.action === 'play' ? '播放' : '跳过'}
                            </span>
                            <button class="btn btn-sm btn-outline-danger ms-2" onclick="deleteHoliday('${h.date}')">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                    </div>
                    ${h.custom_content ? `<small class="text-muted">${h.custom_content}</small>` : ''}
                </div>
            `).join('');
        }

        // 添加节假日
        async function addHoliday() {
            const date = document.getElementById('holidayDate').value;
            const action = document.getElementById('holidayAction').value;
            
            if (!date) {
                alert('请选择日期');
                return;
            }

            const holiday = {date, action};
            if (action === 'custom') {
                holiday.custom_content = document.getElementById('customBroadcast').value;
            }

            // TODO: 保存到API
            holidays.push(holiday);
            renderHolidays();
            document.getElementById('holidayDate').value = '';
        }

        // 删除节假日
        function deleteHoliday(date) {
            if (!confirm('确定要删除 ' + date + ' 的配置吗？')) return;
            holidays = holidays.filter(h => h.date !== date);
            renderHolidays();
        }

        // 加载任务定时
        function loadTaskSchedule() {
            // TODO: 加载选中任务的定时配置
        }
    </script>
</body>
</html>
