<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI模型配置管理</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/all.min.css">
    <style>
        body {
            background: #f4f6f9;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .card {
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            border: none;
        }
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px 15px 0 0 !important;
            padding: 15px 20px;
        }
        .section-title {
            font-size: 1.2rem;
            margin-bottom: 15px;
            padding-bottom: 5px;
            border-bottom: 2px solid #e9ecef;
        }
        .key-mask {
            font-family: monospace;
            background: #f8f9fa;
            padding: 2px 5px;
            border-radius: 4px;
        }
        .btn-save {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
        }
        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .model-badge {
            background: #28a745;
            color: white;
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-left: 5px;
        }
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1050;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="text-center mb-4" style="color: #333;">AI模型配置管理</h2>
        
        <!-- 主密钥配置 -->
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0"><i class="fas fa-key me-2"></i>主密钥配置</h5>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label">主密钥 (Master Key)</label>
                    <input type="text" class="form-control" id="master-key" placeholder="留空则使用教师个人临时密钥">
                    <div class="form-text">如果设置了主密钥，所有AI调用将优先使用此密钥，不消耗教师个人剩余次数。</div>
                </div>
            </div>
        </div>

        <!-- 文本模型配置 -->
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0"><i class="fas fa-comment-dots me-2"></i>文本生成模型</h5>
            </div>
            <div class="card-body">
                <div class="section-title">API 设置</div>
                <div class="mb-3">
                    <label class="form-label">API密钥</label>
                    <input type="password" class="form-control" id="text-api-key" placeholder="请输入API密钥">
                    <div class="form-text">密钥将加密存储，页面显示时会部分隐藏。</div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Base URL</label>
                    <input type="text" class="form-control" id="text-base-url" placeholder="例如 https://dashscope.aliyuncs.com/compatible-mode/v1">
                </div>
                <div class="mb-3">
                    <label class="form-label">当前模型</label>
                    <select class="form-select" id="text-model">
                        <option value="">请选择模型</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">可用模型列表（逗号分隔）</label>
                    <input type="text" class="form-control" id="text-available-models" placeholder="例如 Qwen3.5-Flash, Qwen3.5-Plus, ...">
                </div>
            </div>
        </div>

        <!-- 图像模型配置 -->
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0"><i class="fas fa-image me-2"></i>图像生成模型</h5>
            </div>
            <div class="card-body">
                <div class="section-title">API 设置</div>
                <div class="mb-3">
                    <label class="form-label">API密钥</label>
                    <input type="password" class="form-control" id="image-api-key" placeholder="请输入API密钥">
                </div>
                <div class="mb-3">
                    <label class="form-label">Base URL</label>
                    <input type="text" class="form-control" id="image-base-url" placeholder="例如 https://dashscope.aliyuncs.com/api/v1/services/aigc/multimodal-generation/generation">
                </div>
                <div class="mb-3">
                    <label class="form-label">当前模型</label>
                    <select class="form-select" id="image-model">
                        <option value="">请选择模型</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">可用模型列表（逗号分隔）</label>
                    <input type="text" class="form-control" id="image-available-models" placeholder="例如 Qwen-Image-Plus">
                </div>
            </div>
        </div>

        <div class="text-center mt-4">
            <button class="btn btn-save" id="save-config"><i class="fas fa-save me-2"></i>保存配置</button>
            <button class="btn btn-outline-secondary ms-3" id="back-btn"><i class="fas fa-arrow-left me-2"></i>返回</button>
        </div>
    </div>

    <!-- 消息提示 -->
    <div class="toast-container">
        <div id="message-toast" class="toast align-items-center text-white bg-success border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body" id="toast-message">操作成功</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE = window.location.origin + '/api';

        function showMessage(type, message) {
            const toast = document.getElementById('message-toast');
            const toastMessage = document.getElementById('toast-message');
            toast.className = `toast align-items-center text-white bg-${type} border-0`;
            toastMessage.textContent = message;
            const bsToast = new bootstrap.Toast(toast);
            bsToast.show();
        }

        // 加载配置
        async function loadConfig() {
            try {
                const response = await fetch(API_BASE + '/ai/config');
                const data = await response.json();
                if (!data.success) throw new Error(data.message);

                const cfg = data.config;
                // 主密钥
                document.getElementById('master-key').value = cfg.master_key || '';

                // 文本模型
                document.getElementById('text-api-key').value = cfg.text_model.api_key || '';
                document.getElementById('text-base-url').value = cfg.text_model.base_url || '';
                document.getElementById('text-available-models').value = (cfg.text_model.available_models || []).join(', ');

                // 填充模型下拉框
                const textModelSelect = document.getElementById('text-model');
                textModelSelect.innerHTML = '';
                (cfg.text_model.available_models || []).forEach(m => {
                    const option = document.createElement('option');
                    option.value = m;
                    option.textContent = m;
                    if (m === cfg.text_model.model) option.selected = true;
                    textModelSelect.appendChild(option);
                });

                // 图像模型
                document.getElementById('image-api-key').value = cfg.image_model.api_key || '';
                document.getElementById('image-base-url').value = cfg.image_model.base_url || '';
                document.getElementById('image-available-models').value = (cfg.image_model.available_models || []).join(', ');

                const imageModelSelect = document.getElementById('image-model');
                imageModelSelect.innerHTML = '';
                (cfg.image_model.available_models || []).forEach(m => {
                    const option = document.createElement('option');
                    option.value = m;
                    option.textContent = m;
                    if (m === cfg.image_model.model) option.selected = true;
                    imageModelSelect.appendChild(option);
                });

            } catch (e) {
                showMessage('danger', '加载配置失败：' + e.message);
            }
        }

        // 保存配置
        async function saveConfig() {
            const config = {
                master_key: document.getElementById('master-key').value.trim(),
                text_model: {
                    api_key: document.getElementById('text-api-key').value,
                    base_url: document.getElementById('text-base-url').value.trim(),
                    model: document.getElementById('text-model').value,
                    available_models: document.getElementById('text-available-models').value.split(',').map(s => s.trim()).filter(s => s)
                },
                image_model: {
                    api_key: document.getElementById('image-api-key').value,
                    base_url: document.getElementById('image-base-url').value.trim(),
                    model: document.getElementById('image-model').value,
                    available_models: document.getElementById('image-available-models').value.split(',').map(s => s.trim()).filter(s => s)
                }
            };

            // 验证
            if (!config.text_model.api_key) {
                showMessage('warning', '文本模型API密钥不能为空');
                return;
            }
            if (!config.text_model.base_url) {
                showMessage('warning', '文本模型Base URL不能为空');
                return;
            }
            if (!config.text_model.model) {
                showMessage('warning', '请选择文本模型');
                return;
            }
            if (!config.image_model.api_key) {
                showMessage('warning', '图像模型API密钥不能为空');
                return;
            }
            if (!config.image_model.base_url) {
                showMessage('warning', '图像模型Base URL不能为空');
                return;
            }
            if (!config.image_model.model) {
                showMessage('warning', '请选择图像模型');
                return;
            }

            try {
                const response = await fetch(API_BASE + '/ai/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(config)
                });
                const data = await response.json();
                if (data.success) {
                    showMessage('success', '配置已更新');
                    // 重新加载以显示掩码后的密钥
                    setTimeout(loadConfig, 1000);
                } else {
                    showMessage('danger', data.message || '保存失败');
                }
            } catch (e) {
                showMessage('danger', '网络错误：' + e.message);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadConfig();

            document.getElementById('save-config').addEventListener('click', saveConfig);
            document.getElementById('back-btn').addEventListener('click', () => {
                history.back(); // 返回上一页
            });
        });
    </script>
</body>
</html>
