<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MQTT通信机制模拟 - 实时数据分析大屏</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background-color: #f5f7fa;
            min-height: 100vh;
            padding: 20px;
        }
        
        .dashboard-container {
            max-width: 1600px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid #3498db;
        }
        
        .header h1 {
            color: #2c3e50;
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .header-info {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        
        .info-item {
            font-size: 15px;
            color: #7f8c8d;
        }
        
        .info-item strong {
            color: #34495e;
        }
        
        .refresh-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 8px 25px;
            border-radius: 4px;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .refresh-btn:hover {
            background: #2980b9;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #e8f4fc 0%, #d6eaf8 100%);
            padding: 18px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-2px);
        }
        
        .stat-card h3 {
            color: #34495e;
            font-size: 13px;
            margin-bottom: 6px;
        }
        
        .stat-card .value {
            color: #2c3e50;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 3px;
        }
        
        .stat-card .trend {
            color: #3498db;
            font-size: 11px;
        }
        
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .chart-card {
            background: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .chart-card.full-width {
            grid-column: 1 / -1;
        }
        
        .chart-card h3 {
            color: #2c3e50;
            font-size: 16px;
            margin-bottom: 15px;
            text-align: center;
            padding-bottom: 12px;
            border-bottom: 2px solid #ecf0f1;
        }
        
        .chart-container {
            position: relative;
            height: 280px;
        }
        
        .chart-container.large {
            height: 350px;
        }
        
        .submissions-table {
            background: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            overflow-x: auto;
        }
        
        .submissions-table h3 {
            color: #2c3e50;
            font-size: 16px;
            margin-bottom: 15px;
            text-align: center;
            padding-bottom: 12px;
            border-bottom: 2px solid #ecf0f1;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        
        th {
            background: #3498db;
            color: white;
            padding: 10px;
            text-align: left;
            font-weight: 600;
            white-space: nowrap;
        }
        
        td {
            padding: 8px 10px;
            border-bottom: 1px solid #ecf0f1;
            color: #34495e;
        }
        
        tr:hover {
            background-color: #f8f9fa;
        }
        
        .status-badge {
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 600;
        }
        
        .status-success {
            background: #d5f4e6;
            color: #27ae60;
        }
        
        .status-warning {
            background: #fef5e7;
            color: #f39c12;
        }
        
        .status-danger {
            background: #fadbd8;
            color: #e74c3c;
        }
        
        .loading {
            text-align: center;
            padding: 30px;
            color: #7f8c8d;
            font-size: 15px;
        }
        
        .last-update {
            text-align: center;
            color: #95a5a6;
            font-size: 12px;
            margin-top: 15px;
        }

        .section-title {
            color: #3498db;
            font-size: 18px;
            margin: 25px 0 15px 0;
            padding-left: 10px;
            border-left: 4px solid #3498db;
        }
        
        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
            .header-info {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <h1>MQTT通信机制模拟 - 实时数据分析大屏</h1>
            <div class="header-info">
                <div class="info-item">
                    <strong>活动ID:</strong> mqtt_simulation
                </div>
                <div class="info-item">
                    <strong>总提交数:</strong> <span id="total-submissions">0</span>
                </div>
                <div class="info-item">
                    <strong>最后更新:</strong> <span id="last-update-time">--</span>
                </div>
                <div class="info-item">
                    <button class="refresh-btn" onclick="loadData()">刷新数据</button>
                </div>
            </div>
        </div>
        
        <!-- 模拟操作统计 -->
        <h2 class="section-title">模拟操作统计</h2>
        <div class="stats-grid" id="simulation-stats">
            <div class="stat-card">
                <h3>发布者数量</h3>
                <div class="value" id="stat-publishers">0</div>
                <div class="trend">平均/提交</div>
            </div>
            <div class="stat-card">
                <h3>订阅者数量</h3>
                <div class="value" id="stat-subscribers">0</div>
                <div class="trend">平均/提交</div>
            </div>
            <div class="stat-card">
                <h3>创建主题数</h3>
                <div class="value" id="stat-topics">0</div>
                <div class="trend">平均/提交</div>
            </div>
            <div class="stat-card">
                <h3>发布消息数</h3>
                <div class="value" id="stat-messages">0</div>
                <div class="trend">平均/提交</div>
            </div>
        </div>
        
        <!-- 测验统计 -->
        <h2 class="section-title">测验成绩统计</h2>
        <div class="stats-grid" id="quiz-stats">
            <div class="stat-card">
                <h3>平均得分</h3>
                <div class="value" id="stat-avg-score">0</div>
                <div class="trend">满分4分</div>
            </div>
            <div class="stat-card">
                <h3>平均准确率</h3>
                <div class="value" id="stat-accuracy">0%</div>
                <div class="trend">正确率</div>
            </div>
            <div class="stat-card">
                <h3>平均用时</h3>
                <div class="value" id="stat-avg-time">0s</div>
                <div class="trend">完成时间</div>
            </div>
            <div class="stat-card">
                <h3>满分人数</h3>
                <div class="value" id="stat-perfect">0</div>
                <div class="trend">4题全对</div>
            </div>
        </div>
        
        <!-- 图表区域 -->
        <h2 class="section-title">数据可视化分析</h2>
        <div class="charts-grid" id="charts-grid">
            <div class="chart-card">
                <h3>分数分布</h3>
                <div class="chart-container">
                    <canvas id="scoreChart"></canvas>
                </div>
            </div>
            
            <div class="chart-card">
                <h3>操作类型分布</h3>
                <div class="chart-container">
                    <canvas id="operationChart"></canvas>
                </div>
            </div>
            
            <div class="chart-card full-width">
                <h3>提交时间趋势</h3>
                <div class="chart-container large">
                    <canvas id="timelineChart"></canvas>
                </div>
            </div>
            
            <div class="chart-card full-width">
                <h3>题目正确率分析</h3>
                <div class="chart-container">
                    <canvas id="questionChart"></canvas>
                </div>
            </div>
        </div>
        
        <!-- 提交记录明细 -->
        <h2 class="section-title">提交记录明细</h2>
        <div class="submissions-table">
            <h3>详细数据表格</h3>
            <div id="table-container">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>

    <div class="last-update">
        数据每30秒自动刷新 | <span id="auto-refresh-status">自动刷新已启用</span>
    </div>

    <script>
        // 从统一查询接口获取指定活动的数据
        const DATA_API_URL = '/api/submissions?activity_id=mqtt_simulation';
        
        let charts = {};
        let currentData = null;
        
        document.addEventListener('DOMContentLoaded', function() {
            loadData();
            setInterval(loadData, 30000);
        });
        
        async function loadData() {
            try {
                const response = await fetch(DATA_API_URL);
                if (!response.ok) throw new Error('数据加载失败');
                const data = await response.json();
                // 提取 submissions 数组，并将 payload 平铺到顶层
                const submissions = (data.submissions || []).map(s => {
                    const payload = s.payload || {};
                    return {
                        ...s,
                        ...payload,
                        publisher_count: payload.simulation_data?.operation_counts?.publisher_clients || 0,
                        subscriber_count: payload.simulation_data?.operation_counts?.subscriber_clients || 0,
                        topic_count: payload.simulation_data?.topics_created || 0,
                        message_count: payload.simulation_data?.messages_published || 0,
                        subscription_count: payload.simulation_data?.total_subscriptions || 0,
                        quiz_score: payload.quiz_data?.score || 0,
                        quiz_accuracy: payload.quiz_data?.accuracy || 0
                    };
                });
                currentData = { submissions };
                updateDashboard(currentData);
            } catch (error) {
                console.error('数据加载失败:', error);
            }
        }
        
        function updateDashboard(data) {
            updateSimulationStats(data);
            updateQuizStats(data);
            updateCharts(data);
            updateTable(data);
            document.getElementById('total-submissions').textContent = data.submissions.length;
            document.getElementById('last-update-time').textContent = new Date().toLocaleString('zh-CN');
        }
        
        function updateSimulationStats(data) {
            const submissions = data.submissions || [];
            
            if (submissions.length === 0) {
                ['publishers', 'subscribers', 'topics', 'messages'].forEach(key => {
                    document.getElementById(`stat-${key}`).textContent = '0';
                });
                return;
            }
            
            const avgPublishers = submissions.reduce((sum, s) => sum + s.publisher_count, 0) / submissions.length;
            const avgSubscribers = submissions.reduce((sum, s) => sum + s.subscriber_count, 0) / submissions.length;
            const avgTopics = submissions.reduce((sum, s) => sum + s.topic_count, 0) / submissions.length;
            const avgMessages = submissions.reduce((sum, s) => sum + s.message_count, 0) / submissions.length;
            
            document.getElementById('stat-publishers').textContent = avgPublishers.toFixed(1);
            document.getElementById('stat-subscribers').textContent = avgSubscribers.toFixed(1);
            document.getElementById('stat-topics').textContent = avgTopics.toFixed(1);
            document.getElementById('stat-messages').textContent = avgMessages.toFixed(1);
        }
        
        function updateQuizStats(data) {
            const submissions = data.submissions || [];
            
            if (submissions.length === 0) {
                ['avg-score', 'accuracy', 'avg-time', 'perfect'].forEach(key => {
                    document.getElementById(`stat-${key}`).textContent = '0';
                });
                return;
            }
            
            const avgScore = submissions.reduce((sum, s) => sum + s.quiz_score, 0) / submissions.length;
            const avgAccuracy = submissions.reduce((sum, s) => sum + s.quiz_accuracy, 0) / submissions.length;
            const avgTime = submissions.reduce((sum, s) => sum + (s.duration || 0), 0) / submissions.length;
            const perfectCount = submissions.filter(s => s.quiz_score === 4).length;
            
            document.getElementById('stat-avg-score').textContent = avgScore.toFixed(1);
            document.getElementById('stat-accuracy').textContent = (avgAccuracy * 100).toFixed(1) + '%';
            document.getElementById('stat-avg-time').textContent = Math.round(avgTime) + 's';
            document.getElementById('stat-perfect').textContent = perfectCount;
        }
        
        function updateCharts(data) {
            const submissions = data.submissions || [];
            
            if (submissions.length === 0) return;
            
            createScoreDistributionChart(submissions);
            createOperationChart(submissions);
            createTimeTrendChart(submissions);
            createQuestionAccuracyChart(submissions);
        }
        
        function createScoreDistributionChart(submissions) {
            const ctx = document.getElementById('scoreChart').getContext('2d');
            
            const ranges = {'4分': 0, '3分': 0, '2分': 0, '1分': 0, '0分': 0};
            submissions.forEach(s => {
                const score = s.quiz_score || 0;
                const key = score + '分';
                ranges[key] = (ranges[key] || 0) + 1;
            });
            
            const labels = ['4分', '3分', '2分', '1分', '0分'];
            const values = labels.map(l => ranges[l] || 0);
            
            if (charts.score) charts.score.destroy();
            charts.score = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '人数',
                        data: values,
                        backgroundColor: ['#27ae60', '#3498db', '#f39c12', '#e74c3c', '#95a5a6']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {legend: {display: false}},
                    scales: {y: {beginAtZero: true, ticks: {stepSize: 1}}}
                }
            });
        }
        
        function createOperationChart(submissions) {
            const ctx = document.getElementById('operationChart').getContext('2d');
            
            const opCounts = {'发布者': 0, '订阅者': 0, '主题': 0, '消息': 0};
            submissions.forEach(s => {
                opCounts['发布者'] += s.publisher_count;
                opCounts['订阅者'] += s.subscriber_count;
                opCounts['主题'] += s.topic_count;
                opCounts['消息'] += s.message_count;
            });
            
            if (charts.operation) charts.operation.destroy();
            charts.operation = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(opCounts),
                    datasets: [{
                        data: Object.values(opCounts),
                        backgroundColor: ['#e74c3c', '#27ae60', '#3498db', '#9b59b6']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {legend: {position: 'right'}}
                }
            });
        }
        
        function createTimeTrendChart(submissions) {
            const ctx = document.getElementById('timelineChart').getContext('2d');
            
            const timeCounts = {};
            submissions.forEach(s => {
                const time = new Date(s.submit_time || s._server_timestamp);
                const key = time.toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit'});
                timeCounts[key] = (timeCounts[key] || 0) + 1;
            });
            
            const labels = Object.keys(timeCounts).sort();
            const values = labels.map(l => timeCounts[l]);
            
            if (charts.timeline) charts.timeline.destroy();
            charts.timeline = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '提交数量',
                        data: values,
                        borderColor: '#3498db',
                        backgroundColor: 'rgba(52, 152, 219, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {legend: {display: false}},
                    scales: {y: {beginAtZero: true, ticks: {stepSize: 1}}}
                }
            });
        }
        
        function createQuestionAccuracyChart(submissions) {
            const ctx = document.getElementById('questionChart').getContext('2d');
            
            const questionStats = {};
            submissions.forEach(s => {
                const answers = s.quiz_data?.answers || [];
                answers.forEach(a => {
                    if (!questionStats[a.question_id]) {
                        questionStats[a.question_id] = {correct: 0, total: 0};
                    }
                    questionStats[a.question_id].total++;
                    if (a.is_correct) questionStats[a.question_id].correct++;
                });
            });
            
            const labels = Object.keys(questionStats).sort();
            const accuracy = labels.map(q => 
                (questionStats[q].correct / questionStats[q].total * 100).toFixed(1)
            );
            
            if (charts.question) charts.question.destroy();
            charts.question = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels.map(l => `题目${l.replace('q', '')}`),
                    datasets: [{
                        label: '正确率(%)',
                        data: accuracy,
                        backgroundColor: accuracy.map(acc => acc >= 75 ? '#27ae60' : acc >= 50 ? '#f39c12' : '#e74c3c')
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {legend: {display: false}},
                    scales: {y: {beginAtZero: true, max: 100}}
                }
            });
        }
        
        function updateTable(data) {
            const submissions = data.submissions || [];
            const container = document.getElementById('table-container');
            
            if (submissions.length === 0) {
                container.innerHTML = '<div class="loading">暂无数据</div>';
                return;
            }
            
            const sortedSubmissions = [...submissions].sort((a, b) => new Date(b._server_timestamp) - new Date(a._server_timestamp));
            
            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>序号</th>
                            <th>提交时间</th>
                            <th>用时(秒)</th>
                            <th>发布者</th>
                            <th>订阅者</th>
                            <th>主题数</th>
                            <th>消息数</th>
                            <th>测验得分</th>
                            <th>准确率</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            sortedSubmissions.forEach((s, index) => {
                const submitTime = s._server_timestamp ? new Date(s._server_timestamp).toLocaleString('zh-CN') : '--';
                const accuracy = (s.quiz_accuracy * 100).toFixed(1) + '%';
                const scoreClass = s.quiz_score === 4 ? 'status-success' : s.quiz_score >= 2 ? 'status-warning' : 'status-danger';
                
                html += `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${submitTime}</td>
                        <td>${s.duration || 0}</td>
                        <td>${s.publisher_count}</td>
                        <td>${s.subscriber_count}</td>
                        <td>${s.topic_count}</td>
                        <td>${s.message_count}</td>
                        <td><span class="status-badge ${scoreClass}">${s.quiz_score}/4</span></td>
                        <td>${accuracy}</td>
                    </tr>
                `;
            });
            
            html += '</tbody></table>';
            container.innerHTML = html;
        }
    </script>
</body>
</html>
