<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生信息数据查看</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f5f7fa;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            padding: 30px;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .description {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 30px;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .controls input, .controls select, .controls button {
            padding: 8px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 5px;
            font-size: 0.9rem;
        }
        .controls input, .controls select {
            flex: 1;
            min-width: 150px;
        }
        .controls button {
            background: #3498db;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }
        .controls button:hover {
            background: #2980b9;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }
        th {
            background: #f8fafc;
            font-weight: 600;
            color: #2d3748;
        }
        tr:hover {
            background: #f8fafc;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-card.secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        .stat-card tertiary {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }
        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            display: none;
        }
        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
        }
        footer {
            text-align: center;
            margin-top: 30px;
            color: #718096;
            font-size: 0.9rem;
        }
        .export-btn {
            background: #27ae60;
        }
        .export-btn:hover {
            background: #219a52;
        }
        /* 打印样式 */
        @media print {
            .controls, .export-btn {
                display: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 学生信息收集表 - 数据看板</h1>
        <p class="description">查看所有提交的学生信息和统计数据</p>

        <div class="controls">
            <input type="text" id="searchInput" placeholder="搜索姓名或学号...">
            <select id="classFilter">
                <option value="">所有班级</option>
                <option value="高一 (1) 班">高一 (1) 班</option>
                <option value="高一 (2) 班">高一 (2) 班</option>
                <option value="高一 (3) 班">高一 (3) 班</option>
            </select>
            <button onclick="loadData()">🔄 刷新数据</button>
            <button class="export-btn" onclick="exportToCSV()">📥 导出 CSV</button>
        </div>

        <div id="loading" class="loading">正在加载数据...</div>
        <div id="stats" class="stats"></div>
        <table id="dataTable">
            <thead>
                <tr>
                    <th>姓名</th>
                    <th>学号</th>
                    <th>班级</th>
                    <th>联系电话</th>
                    <th>邮箱</th>
                    <th>兴趣爱好</th>
                    <th>提交时间</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>

        <div id="message" class="message"></div>

        <footer>
            <hr>
            <p>© 2026 QuickForge 课堂教学系统</p>
        </footer>
    </div>

    <script>
        const teacher = '老张';
        const activityId = '学生信息收集表';

        let allData = [];

        // 加载数据
        async function loadData() {
            const loadingDiv = document.getElementById('loading');
            loadingDiv.style.display = 'block';

            try {
                const response = await fetch(`/api/submissions?teacher=${teacher}&activity_id=${activityId}&limit=500`);
                const result = await response.json();

                if (result.success && Array.isArray(result.submissions)) {
                    allData = result.submissions;
                    updateStats();
                    renderTable(allData);
                } else {
                    showMessage('❌ 加载失败：' + (result.message || '未知错误'), 'error');
                }
            } catch (error) {
                console.error('加载错误:', error);
                showMessage('❌ 网络错误：' + error.message, 'error');
            } finally {
                loadingDiv.style.display = 'none';
            }
        }

        // 更新统计卡片
        function updateStats() {
            const total = allData.length;
            const classes = {};
            let filledPhone = 0;
            let filledEmail = 0;

            allData.forEach(item => {
                const data = parseData(item);
                if (data.class) classes[data.class] = (classes[data.class] || 0) + 1;
                if (data.phone) filledPhone++;
                if (data.email) filledEmail++;
            });

            const statsHTML = `
                <div class="stat-card">
                    <div class="stat-number">${total}</div>
                    <div class="stat-label">总提交数</div>
                </div>
                <div class="stat-card secondary">
                    <div class="stat-number">${Object.keys(classes).length}</div>
                    <div class="stat-label">涉及班级</div>
                </div>
                <div class="stat-card tertiary">
                    <div class="stat-number">${Math.round(filledPhone / total * 100) || 0}%</div>
                    <div class="stat-label">电话完整率</div>
                </div>
            `;
            document.getElementById('stats').innerHTML = statsHTML;
        }

        // 解析提交数据
        function parseData(submission) {
            try {
                if (submission.data) {
                    return typeof submission.data === 'string' ? JSON.parse(submission.data) : submission.data;
                }
                return {};
            } catch (e) {
                return {};
            }
        }

        // 渲染表格
        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = data.map(item => {
                const d = parseData(item);
                const time = item._server_timestamp 
                    ? new Date(item._server_timestamp).toLocaleString('zh-CN')
                    : '-';
                return `
                    <tr>
                        <td>${escapeHtml(d.name || '-')}</td>
                        <td>${escapeHtml(d.studentId || escapeHtml(item.student_id || '-'))}</td>
                        <td>${escapeHtml(d.class || '-')}</td>
                        <td>${escapeHtml(d.phone || '-')}</td>
                        <td>${escapeHtml(d.email || '-')}</td>
                        <td>${escapeHtml(d.hobbies || '-')}</td>
                        <td>${time}</td>
                        <td><button onclick="viewDetails(${JSON.stringify(d).replace(/"/g, '&quot;')})">查看详情</button></td>
                    </tr>
                `;
            }).join('');
        }

        // 过滤数据
        function filterData() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            const classFilter = document.getElementById('classFilter').value;

            let filtered = allData.filter(item => {
                const d = parseData(item);
                const matchKeyword = !keyword || 
                    (d.name && d.name.toLowerCase().includes(keyword)) ||
                    (d.studentId && d.studentId.toLowerCase().includes(keyword));
                
                const matchClass = !classFilter || d.class === classFilter;
                
                return matchKeyword && matchClass;
            });

            renderTable(filtered);
        }

        // 显示详情弹窗
        function viewDetails(data) {
            const details = Object.entries(data)
                .map(([k, v]) => `<tr><td>${k}</td><td>${escapeHtml(String(v))}</td></tr>`)
                .join('');
            
            const modal = `
                <div style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1000;">
                    <div style="background:white;padding:30px;border-radius:10px;max-width:600px;max-height:80vh;overflow:auto;">
                        <h2>详细信息</h2>
                        <table style="margin-top:20px;">${details}</table>
                        <button onclick="this.closest('.modal-overlay').remove()" style="margin-top:20px;padding:10px 20px;background:#3498db;color:white;border:none;border-radius:5px;cursor:pointer;">关闭</button>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modal);
        }

        // 导出 CSV
        function exportToCSV() {
            if (allData.length === 0) {
                showMessage('⚠️ 没有可导出的数据', 'error');
                return;
            }

            const headers = ['姓名', '学号', '班级', '电话', '邮箱', '兴趣爱好', '提交时间'];
            const rows = allData.map(item => {
                const d = parseData(item);
                const time = item._server_timestamp ? new Date(item._server_timestamp).toLocaleString('zh-CN') : '';
                return [
                    d.name || '',
                    d.studentId || item.student_id || '',
                    d.class || '',
                    d.phone || '',
                    d.email || '',
                    d.hobbies || '',
                    time
                ].map(field => `"${field}"`).join(',');
            });

            const csvContent = [headers.join(','), ...rows].join('\n');
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `学生信息_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
            
            showMessage(`✅ 已导出 ${allData.length} 条记录`, 'success');
        }

        // 显示消息
        function showMessage(text, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = text;
            msgDiv.className = 'message ' + type;
            setTimeout(() => msgDiv.style.display = 'none', 5000);
        }

        // HTML 转义
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 事件监听
        document.getElementById('searchInput').addEventListener('input', filterData);
        document.getElementById('classFilter').addEventListener('change', filterData);

        // 初始加载
        loadData();
    </script>
</body>
</html>
