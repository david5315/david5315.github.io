<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生信息收集表</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f5f7fa;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            padding: 30px;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .description {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 30px;
        }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2d3748;
        }
        .required { color: #e53e3e; }
        input[type="text"],
        input[type="number"],
        input[type="email"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 5px;
            font-size: 1rem;
        }
        input[type="text"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }
        textarea { min-height: 100px; resize: vertical; }
        input[type="file"] {
            width: 100%;
            padding: 8px;
            border: 2px dashed #cbd5e0;
            border-radius: 5px;
            background-color: #f7fafc;
        }
        .btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
            width: 100%;
            font-weight: 600;
        }
        .btn:hover { background: #2980b9; }
        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            display: none;
        }
        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        .message.loading {
            background-color: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
            display: block;
        }
        footer {
            text-align: center;
            margin-top: 30px;
            color: #718096;
            font-size: 0.9rem;
        }
        hr {
            border: none;
            border-top: 1px solid #e2e8f0;
            margin: 20px 0;
        }
        .file-note {
            font-size: 0.85rem;
            color: #718096;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 学生信息收集表</h1>
        <p class="description">请填写您的个人信息，用于教学管理和联系</p>

        <form id="infoForm">
            <!-- 隐藏的必填字段 -->
            <input type="hidden" id="teacher" name="teacher">
            <input type="hidden" id="activityId" name="activityId">
            
            <div class="form-group">
                <label for="name">姓名 <span class="required">*</span></label>
                <input type="text" id="name" name="name" placeholder="请输入您的姓名" required>
            </div>

            <div class="form-group">
                <label for="studentId">学号 <span class="required">*</span></label>
                <input type="text" id="studentId" name="studentId" placeholder="请输入您的学号" required>
            </div>

            <div class="form-group">
                <label for="class">班级 <span class="required">*</span></label>
                <select id="class" name="class" required>
                    <option value="">请选择班级</option>
                    <option value="高一 (1) 班">高一 (1) 班</option>
                    <option value="高一 (2) 班">高一 (2) 班</option>
                    <option value="高一 (3) 班">高一 (3) 班</option>
                    <option value="高二 (1) 班">高二 (1) 班</option>
                    <option value="高二 (2) 班">高二 (2) 班</option>
                </select>
            </div>

            <div class="form-group">
                <label for="phone">联系电话</label>
                <input type="text" id="phone" name="phone" placeholder="请输入手机号码" pattern="[0-9]{11}">
            </div>

            <div class="form-group">
                <label for="email">电子邮箱</label>
                <input type="email" id="email" name="email" placeholder="请输入邮箱地址">
            </div>

            <div class="form-group">
                <label for="hobbies">兴趣爱好</label>
                <textarea id="hobbies" name="hobbies" placeholder="请列出您的兴趣爱好（每行一个）"></textarea>
            </div>

            <div class="form-group">
                <label for="photo">个人照片（可选）</label>
                <input type="file" id="photo" name="photo" accept="image/*">
                <p class="file-note">支持 JPG、PNG 格式，大小不超过 5MB</p>
            </div>

            <button type="submit" class="btn">📤 提交信息</button>
        </form>

        <div id="message" class="message"></div>

        <footer>
            <hr>
            <p>© 2026 QuickForge 课堂教学系统</p>
        </footer>
    </div>

    <script>
        // 获取隐藏字段值（由后端注入）
        const teacher = document.getElementById('teacher').value || '老张';
        const activityId = document.getElementById('activityId').value || '学生信息收集表';
        
        // 自动填充学生 ID（如果已登录）
        if (window.studentId) {
            document.getElementById('studentId').value = window.studentId;
        }

        document.getElementById('infoForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const messageDiv = document.getElementById('message');
            messageDiv.className = 'message loading';
            messageDiv.textContent = '正在提交...';

            try {
                const formData = new FormData();
                
                // ✅ 方式 1: 直接添加必要字段（推荐）
                formData.append('teacher', teacher);
                formData.append('activity_id', activityId);
                formData.append('student_id', document.getElementById('studentId').value);
                
                // ✅ 方式 2: 同时提供 data JSON 字段（兼容性）
                const payload = {
                    name: document.getElementById('name').value,
                    class: document.getElementById('class').value,
                    phone: document.getElementById('phone').value,
                    email: document.getElementById('email').value,
                    hobbies: document.getElementById('hobbies').value,
                    client_timestamp: new Date().toISOString()
                };
                formData.append('data', JSON.stringify(payload));
                
                // 添加附件
                const photoInput = document.getElementById('photo');
                for (let i = 0; i < photoInput.files.length; i++) {
                    formData.append('files', photoInput.files[i]);
                }

                console.log('提交数据:', { teacher, activityId, studentId: document.getElementById('studentId').value });

                const response = await fetch('/api/submit', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    messageDiv.className = 'message success';
                    messageDiv.textContent = '✅ 提交成功！感谢您的配合。';
                    document.getElementById('infoForm').reset();
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = '❌ 提交失败：' + (result.message || result.error || '未知错误');
                }
            } catch (error) {
                console.error('提交错误:', error);
                messageDiv.className = 'message error';
                messageDiv.textContent = '❌ 网络错误：' + error.message;
            }
        });
    </script>
</body>
</html>
