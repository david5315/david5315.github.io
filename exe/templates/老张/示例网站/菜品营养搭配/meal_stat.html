<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>配餐数据统计</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        body {
            background-color: #f5f7fa;
            padding: 20px;
        }
        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .info-bar {
            background: #ecf0f1;
            padding: 10px 20px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 16px;
            color: #34495e;
        }
        .info-bar .teacher-activity {
            font-weight: bold;
            color: #3498db;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #ecf0f1;
            padding: 20px;
            border-radius: 6px;
            text-align: center;
            flex: 1;
            margin: 0 10px;
        }
        .stat-card h3 {
            color: #34495e;
            font-size: 16px;
            margin-bottom: 10px;
        }
        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
            color: #3498db;
        }
        .chart-container {
            width: 400px;
            margin: 0 auto 30px;
            height: 300px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 14px;
        }
        th {
            background-color: #3498db;
            color: white;
            padding: 12px;
            text-align: left;
        }
        td {
            padding: 10px;
            border-bottom: 1px solid #ecf0f1;
        }
        tr:hover {
            background-color: #f8f9fa;
        }
        .badge-pass {
            background-color: #d4edda;
            color: #155724;
            padding: 4px 8px;
            border-radius: 12px;
            font-weight: bold;
        }
        .badge-fail {
            background-color: #f8d7da;
            color: #721c24;
            padding: 4px 8px;
            border-radius: 12px;
            font-weight: bold;
        }
        .like-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 5px;
        }
        .like-btn:hover {
            background: #2980b9;
        }
        .like-count {
            font-weight: bold;
            color: #e67e22;
        }
        .error-message {
            background-color: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
            font-size: 16px;
            margin-bottom: 20px;
        }
    </style>
</head>

<!-- QUICKFORGE FIX -->
<input type="hidden" id="qf_teacher" value="{{teacher}}">
<input type="hidden" id="qf_activity_id" value="{{task}}">
<input type="hidden" id="qf_student_id" name="student_id" value="">
<!-- END FIX -->

<body>
    <div class="dashboard">
        <h1>配餐数据统计</h1>
        <div class="info-bar" id="infoBar">
            <span>正在查看：</span>
            <span class="teacher-activity" id="teacherActivityDisplay"></span>
        </div>
        <div class="stats" id="stats"></div>
        <div class="chart-container">
            <canvas id="pieChart"></canvas>
        </div>
        <table id="submissionsTable">
            <thead>
                <tr>
                    <th>学号</th>
                    <th>提交时间</th>
                    <th>所选菜品</th>
                    <th>热量(千焦)</th>
                    <th>脂肪(g)</th>
                    <th>蛋白质(g)</th>
                    <th>符合标准</th>
                    <th>喜欢</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script>
        // 从隐藏字段或URL路径中获取教师和活动ID
        function getTeacherAndActivity() {
            let teacher = null;
            let activityId = null;

            // 1. 尝试从隐藏字段获取（可能已被服务器替换）
            const qfTeacher = document.getElementById('qf_teacher')?.value;
            const qfActivity = document.getElementById('qf_activity_id')?.value;

            if (qfTeacher && !qfTeacher.includes('{{') && qfTeacher.trim() !== '') {
                teacher = qfTeacher.trim();
            }
            if (qfActivity && !qfActivity.includes('{{') && qfActivity.trim() !== '') {
                activityId = qfActivity.trim();
            }

            // 2. 如果隐藏字段不可用，则从URL路径解析
            if (!teacher || !activityId) {
                const pathParts = window.location.pathname.split('/');
                // URL格式: /templates/教师名/.../任务文件夹/文件名.html
                if (pathParts.length >= 4) {
                    if (!teacher) {
                        teacher = decodeURIComponent(pathParts[2]);
                    }
                    if (!activityId) {
                        activityId = decodeURIComponent(pathParts[pathParts.length - 2]);
                    }
                }
            }

            return { teacher, activityId };
        }

        async function loadData() {
            const { teacher, activityId } = getTeacherAndActivity();
            const infoDisplay = document.getElementById('teacherActivityDisplay');
            const infoBar = document.getElementById('infoBar');

            if (!teacher || !activityId) {
                infoBar.innerHTML = '<span class="error-message">❌ 无法确定教师或活动，请检查页面路径或隐藏字段</span>';
                return;
            }

            infoDisplay.textContent = `${teacher} 老师 - 活动：${activityId}`;

            try {
                // 从统一查询接口获取指定活动的数据，带上 teacher 和 activity_id 参数
                const res = await fetch(`/api/submissions?teacher=${encodeURIComponent(teacher)}&activity_id=${encodeURIComponent(activityId)}`);
                if (!res.ok) {
                    throw new Error(`HTTP ${res.status}`);
                }
                const data = await res.json();
                // 提取 submissions 数组，并将 payload 内容平铺到顶层以便原有函数直接使用
                const submissions = (data.submissions || []).map(sub => {
                    const payload = sub.payload || {};
                    return {
                        ...sub,                 // 包含 student_id 等顶层字段
                        ...payload,             // 平铺 payload 中的字段（如 dishes, nutrition, judgment, submit_time）
                        filename: sub._meta?.filename // 保留文件名以备投票使用
                    };
                });
                renderStats(submissions);
                renderPieChart(submissions);
                renderTable(submissions);
            } catch (error) {
                console.error('加载数据失败:', error);
                infoBar.innerHTML = `<span class="error-message">❌ 加载数据失败：${error.message}</span>`;
            }
        }

        function renderStats(submissions) {
            const total = submissions.length;
            const passed = submissions.filter(s => s.judgment && s.judgment.is_correct === true).length;
            const passRate = total ? ((passed / total) * 100).toFixed(1) : 0;
            document.getElementById('stats').innerHTML = `
                <div class="stat-card"><h3>总提交数</h3><div class="value">${total}</div></div>
                <div class="stat-card"><h3>符合标准数</h3><div class="value">${passed}</div></div>
                <div class="stat-card"><h3>符合率</h3><div class="value">${passRate}%</div></div>
            `;
        }

        function renderPieChart(submissions) {
            const total = submissions.length;
            const passed = submissions.filter(s => s.judgment && s.judgment.is_correct === true).length;
            const failed = total - passed;
            const ctx = document.getElementById('pieChart').getContext('2d');
            new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: ['符合标准', '不符合标准'],
                    datasets: [{
                        data: [passed, failed],
                        backgroundColor: ['#2ecc71', '#e74c3c']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom' }
                    }
                }
            });
        }

        function renderTable(submissions) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            submissions.forEach(sub => {
                const dishesStr = sub.dishes ? sub.dishes.map(d => d.name).join('、') : '无';
                const isCorrect = sub.judgment && sub.judgment.is_correct === true;
                const badgeClass = isCorrect ? 'badge-pass' : 'badge-fail';
                const badgeText = isCorrect ? '符合' : '不符合';
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${sub.student_id || '—'}</td>
                    <td>${sub.submit_time ? new Date(sub.submit_time).toLocaleString() : '—'}</td>
                    <td>${dishesStr}</td>
                    <td>${sub.nutrition?.calories || 0}</td>
                    <td>${sub.nutrition?.fat || 0}</td>
                    <td>${sub.nutrition?.protein || 0}</td>
                    <td><span class="${badgeClass}">${badgeText}</span></td>
                    <td>
                        <button class="like-btn" data-filename="${sub.filename}">喜欢</button>
                        <span class="like-count" id="likes-${sub.filename}">${sub.votes || 0}</span>
                    </td>
                `;
                tbody.appendChild(row);
            });

            // 绑定投票事件（此处仅为UI示例，投票功能需单独实现）
            document.querySelectorAll('.like-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const filename = e.target.dataset.filename;
                    alert('投票功能需额外实现（建议使用另一个存储集合）');
                });
            });
        }

        // 初始加载
        loadData();

        // 每30秒自动刷新
        setInterval(loadData, 30000);
    </script>
</body>
</html>
