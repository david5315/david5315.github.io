<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>填空题练习</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; background-color: #f5f7fa; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.1); padding: 30px; }
        h1 { text-align: center; color: #16a085; margin-bottom: 10px; }
        .description { text-align: center; color: #7f8c8d; margin-bottom: 30px; }
        .question { margin-bottom: 25px; padding: 20px; background: #f8fafc; border-radius: 8px; border-left: 4px solid #16a085; }
        .question-number { font-weight: bold; color: #16a085; margin-bottom: 10px; }
        .answer-input { width: 200px; padding: 8px 12px; border: 2px solid #bdc3c7; border-radius: 5px; font-size: 1rem; transition: border 0.3s; }
        .answer-input:focus { outline: none; border-color: #16a085; }
        .btn { background: #16a085; color: white; border: none; padding: 12px 25px; font-size: 1rem; border-radius: 5px; cursor: pointer; transition: background 0.3s; width: 100%; font-weight: 600; margin-top: 20px; }
        .btn:hover { background: #138a70; }
        .message { margin-top: 20px; padding: 15px; border-radius: 5px; text-align: center; display: none; }
        .message.success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; display: block; }
        .message.error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; display: block; }
        .loading { background-color: #fff3cd; color: #856404; padding: 15px; border-radius: 5px; text-align: center; display: none; }
        footer { text-align: center; margin-top: 30px; color: #718096; font-size: 0.9rem; }
        hr { border: none; border-top: 1px solid #e2e8f0; margin: 20px 0; }
        .score-display { font-size: 1.5rem; color: #27ae60; text-align: center; margin: 20px 0; padding: 15px; background: #d4edda; border-radius: 8px; }
        .hint { font-size: 0.85rem; color: #95a5a6; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>✍️ 填空题练习</h1>
        <p class="description">包含 5 道填空题，每道题填写一个答案</p>
        <form id="quizForm">
            <input type="hidden" id="teacher" value="{{teacher}}">
            <input type="hidden" id="activityId" value="{{task}}">
            <div id="questions"></div>
            <button type="submit" class="btn">✅ 提交答案</button>
        </form>
        <div id="loading" class="loading">正在提交...</div>
        <div id="message" class="message"></div>
        <div id="scoreDisplay" class="score-display" style="display:none;"></div>
        <footer><hr><p>© 2026 QuickForge 课堂教学系统</p></footer>
    </div>
    <script>
        const questions = [
            { id: 1, text: "中国的最大湖泊是______", correct: "青海湖" },
            { id: 2, text: "光在真空中的传播速度约为______公里/秒", correct: "30 万" },
            { id: 3, text: "水的化学式是______", correct: "H2O" },
            { id: 4, text: "人体有______对染色体", correct: "23" },
            { id: 5, text: "圆周率π约等于______(保留两位小数)", correct: "3.14" }
        ];
        
        const teacher = document.getElementById('teacher').value;
        const activityId = document.getElementById('activityId').value;

        function renderQuestions() {
            document.getElementById('questions').innerHTML = questions.map((q, idx) => 
                `<div class="question">
                    <div class="question-number">${idx+1}. ${q.text}</div>
                    <input type="text" id="answer${q.id}" class="answer-input" placeholder="请输入答案" required>
                    <p class="hint">提示：答案不区分大小写，可以填写中文或英文</p>
                </div>`
            ).join('');
        }

        document.getElementById('quizForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const loadingDiv = document.getElementById('loading');
            const messageDiv = document.getElementById('message');
            const scoreDiv = document.getElementById('scoreDisplay');
            
            loadingDiv.style.display = 'block';
            messageDiv.style.display = 'none';
            scoreDiv.style.display = 'none';

            try {
                const answers = [];
                let allAnswered = true;
                
                questions.forEach(q => {
                    const input = document.getElementById(`answer${q.id}`);
                    if (!input.value.trim()) {
                        allAnswered = false;
                    }
                    answers.push(input.value.trim());
                    input.setAttribute('data-user-answer', input.value.trim());
                });

                if (!allAnswered) {
                    loadingDiv.style.display = 'none';
                    messageDiv.textContent = '⚠️ 请回答所有题目！';
                    messageDiv.className = 'message error';
                    messageDiv.style.display = 'block';
                    return;
                }

                // 简单比对（实际应更智能）
                let score = 0;
                answers.forEach((ans, idx) => {
                    const correctAns = questions[idx].correct.toLowerCase().trim();
                    if (ans.toLowerCase().includes(correctAns) || correctAns.includes(ans.toLowerCase())) {
                        score++;
                    }
                });
                
                const finalScore = Math.round((score / questions.length) * 100);

                const formData = new FormData();
                formData.append('teacher', teacher);
                formData.append('activity_id', activityId);
                formData.append('student_id', window.studentId || 'S001');
                formData.append('data', JSON.stringify({
                    answers: answers,
                    user_submissions: questions.map((q, i) => ({
                        question: q.text,
                        user_answer: answers[i],
                        correct_answer: q.correct,
                        is_correct: answers[i].toLowerCase().includes(q.correct.toLowerCase())
                    })),
                    score: score,
                    total: questions.length,
                    percentage: finalScore,
                    client_timestamp: new Date().toISOString()
                }));

                const response = await fetch('/api/submit', { method: 'POST', body: formData });
                const result = await response.json();
                loadingDiv.style.display = 'none';

                if (response.ok && result.success) {
                    scoreDiv.innerHTML = `🎉 你的得分：<strong>${finalScore}分</strong> (${score}/${questions.length} 正确)<br>
                                          <small>查看每题评分...</small>`;
                    scoreDiv.style.display = 'block';
                    messageDiv.textContent = '✅ 答案已提交！';
                    messageDiv.className = 'message success';
                    messageDiv.style.display = 'block';
                } else {
                    messageDiv.textContent = '❌ 提交失败：' + (result.message || result.error || '未知错误');
                    messageDiv.className = 'message error';
                    messageDiv.style.display = 'block';
                }
            } catch (error) {
                console.error('提交错误:', error);
                loadingDiv.style.display = 'none';
                messageDiv.textContent = '❌ 网络错误：' + error.message;
                messageDiv.className = 'message error';
                messageDiv.style.display = 'block';
            }
        });

        renderQuestions();
    </script>
</body>
</html>
