    <script>
        // --- 配置常量 ---
        const CONFIG = {
            teacher: '老张',
            activityId: '模板网页/通用课堂签到', // 确保与后端 API 定义一致
            apiUrl: '/api/', // 基础 URL
            refreshInterval: 10000, // 10 秒自动刷新一次
            studentIdPrefix: 'S' // 学生 ID 前缀
        };

        // --- DOM 元素引用 ---
        const els = {
            form: document.getElementById('checkinForm'),
            btn: document.getElementById('submitBtn'),
            btnText: document.getElementById('btnText'),
            btnLoader: document.getElementById('btnLoader'),
            successCard: document.getElementById('successCard'),
            feedList: document.getElementById('feedList'),
            stats: {
                present: document.getElementById('presentCount'),
                late: document.getElementById('lateCount'),
                total: document.getElementById('totalCount')
            },
            lastUpdate: document.getElementById('lastUpdate')
        };

        let isSignedIn = false;
        let currentSubmissions = [];

        // --- 工具函数 ---
        function generateStudentId() {
            return CONFIG.studentIdPrefix + Math.floor(Math.random() * 10000).toString().padStart(4, '0');
        }

        function formatTime(dateObj) {
            return dateObj.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        // 安全转义 HTML，防止 XSS
        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        // --- 核心业务逻辑 ---

        /**
         * 提交签到数据
         * 遵循 /api/submit 接口规范：POST application/json 或 multipart/form-data
         */
        async function submitAttendance(e) {
            e.preventDefault();
            if (isSignedIn) return;

            const studentName = document.getElementById('studentName').value.trim();
            const studentClass = document.getElementById('studentClass').value;

            if (!studentName || !studentClass) {
                alert('请填写完整信息！');
                return;
            }

            setLoading(true);

            try {
                // 1. 构建请求体
                const now = new Date();
                const payload = {
                    teacher: CONFIG.teacher,
                    activity_id: CONFIG.activityId,
                    student_id: document.getElementById('student_id').value, // 使用生成的唯一 ID
                    data: JSON.stringify({
                        name: studentName,
                        class: studentClass,
                        time: now.toISOString(), // ISO 8601 格式最佳
                        submission_type: 'attendance_checkin'
                    })
                };

                // 2. 发送请求 (使用 JSON 模式，无文件上传需求)
                const response = await fetch(`${CONFIG.apiUrl}submit`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                // 3. 处理响应
                if (response.ok && result.success) {
                    handleSuccess(now);
                } else {
                    throw new Error(result.message || '提交失败');
                }

            } catch (error) {
                console.error('Submission Error:', error);
                alert(`❌ 提交出错：${error.message}\n请检查网络连接或稍后重试。`);
                setLoading(false);
            }
        }

        function handleSuccess(nowDate) {
            isSignedIn = true;
            
            // UI 反馈
            els.btn.classList.add('hidden');
            els.successCard.classList.remove('hidden');
            
            // 滚动到底部显示成功消息
            setTimeout(() => {
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }, 100);

            // 强制立即刷新数据列表，让当前用户看到自己的记录
            loadAttendanceData();
            
            // 停止自动轮询（可选，这里设置为继续轮询以保持实时性）
        }

        /**
         * 获取并渲染数据
         * 遵循 /api/submissions 接口规范：GET 参数 teacher/activity_id
         * 特别注意：响应数据在 data.submissions 数组中
         */
        async function loadAttendanceData() {
            if (els.form.classList.contains('loading')) return; // 防止提交时并发查询

            try {
                const params = new URLSearchParams({
                    teacher: CONFIG.teacher,
                    activity_id: CONFIG.activityId,
                    limit: 200 // 获取更多数据用于展示
                });

                const response = await fetch(`${CONFIG.apiUrl}submissions?${params}`);
                
                if (!response.ok) throw new Error('网络请求失败');

                const data = await response.json();

                // 关键步骤：验证数据结构
                if (data.success && Array.isArray(data.submissions)) {
                    updateDashboard(data.submissions);
                } else {
                    console.warn('API 返回数据格式异常:', data);
                    updateDashboard([]); // 降级处理
                }

            } catch (error) {
                console.error('Failed to load data:', error);
                els.feedList.innerHTML = `<li class="text-center text-red-500 text-sm py-2">数据加载失败，请稍后重试</li>`;
            } finally {
                els.lastUpdate.textContent = formatTime(new Date());
            }
        }

        function updateDashboard(submissions) {
            currentSubmissions = submissions;
            const todayStr = new Date().toDateString();

            // 1. 筛选今日数据
            const todaysData = submissions.filter(s => {
                const ts = s._server_timestamp ? new Date(s._server_timestamp).toDateString() : null;
                return ts === todayStr;
            });

            // 2. 计算统计数据
            const totalCount = todaysData.length;
            let lateCount = 0;
            
            // 遍历数据判断迟到（假设标准上课时间为 8:00，这里简单演示逻辑）
            // 实际场景中，应参考 data.time 或 _server_timestamp 与预设上课时间对比
            todaysData.forEach(item => {
                const checkTime = item.data?.time || item._server_timestamp;
                if (checkTime) {
                    const date = new Date(checkTime);
                    // 简单逻辑：如果分钟数不为 0 或小时大于 8，视为迟到（示例逻辑）
                    if (date.getHours() > 8 || (date.getHours() === 8 && date.getMinutes() > 0)) {
                        lateCount++;
                    }
                }
            });

            const presentCount = totalCount - lateCount;

            // 3. 更新 DOM 统计
            els.stats.total.textContent = totalCount;
            els.stats.late.textContent = lateCount;
            els.stats.present.textContent = presentCount;

            // 4. 更新 Feed 列表
            renderFeedList(todaysData.reverse()); // 最新的在前面
        }

        function renderFeedList(list) {
            if (list.length === 0) {
                els.feedList.innerHTML = `<li class="text-center text-gray-400 text-sm py-4 italic">暂无今日签到记录</li>`;
                return;
            }

            els.feedList.innerHTML = list.map(item => {
                const timeStr = item.data?.time || item._server_timestamp;
                const timeObj = timeStr ? new Date(timeStr) : new Date();
                const timeDisplay = formatTime(timeObj);
                
                // 从 data 字段中提取名字，如果没有则显示 Anonymous
                const name = item.data?.name || 'Anonymous';
                const className = item.data?.class || '';
