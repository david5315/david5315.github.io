<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>问答题练习</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; background-color: #f5f7fa; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: white; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.1); padding: 30px; }
        h1 { text-align: center; color: #c0392b; margin-bottom: 10px; }
        .description { text-align: center; color: #7f8c8d; margin-bottom: 30px; }
        .question { margin-bottom: 30px; padding: 20px; background: #fef9e7; border-radius: 8px; border-left: 4px solid #c0392b; }
        .question-number { font-weight: bold; color: #c0392b; margin-bottom: 10px; }
        .answer-area { width: 100%; min-height: 150px; padding: 12px; border: 2px solid #ddd; border-radius: 5px; font-size: 1rem; resize: vertical; transition: border 0.3s; font-family: inherit; }
        .answer-area:focus { outline: none; border-color: #c0392b; }
        .word-count { text-align: right; font-size: 0.85rem; color: #95a5a6; margin-top: 5px; }
        .btn { background: #c0392b; color: white; border: none; padding: 12px 25px; font-size: 1rem; border-radius: 5px; cursor: pointer; transition: background 0.3s; width: 100%; font-weight: 600; margin-top: 20px; }
        .btn:hover { background: #a93226; }
        .message { margin-top: 20px; padding: 15px; border-radius: 5px; text-align: center; display: none; }
        .message.success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; display: block; }
        .message.error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; display: block; }
        .loading { background-color: #fff3cd; color: #856404; padding: 15px; border-radius: 5px; text-align: center; display: none; }
        footer { text-align: center; margin-top: 30px; color: #718096; font-size: 0.9rem; }
        hr { border: none; border-top: 1px solid #e2e8f0; margin: 20px 0; }
        .char-limit { color: #e67e22; font-size: 0.85rem; }
        .char-limit.safe { color: #27ae60; }
    </style>
</head>
<body>
    <div class="container">
        <h1>✍️ 问答题练习</h1>
        <p class="description">包含 3 道简答题，请输入你的回答（建议每題不少于 50 字）</p>
        <form id="quizForm">
            <input type="hidden" id="teacher" value="{{teacher}}">
            <input type="hidden" id="activityId" value="{{task}}">
            <div id="questions"></div>
            <button type="submit" class="btn">✅ 提交答案</button>
        </form>
        <div id="loading" class="loading">正在提交...</div>
        <div id="message" class="message"></div>
        <footer><hr><p>© 2026 QuickForge 课堂教学系统</p></footer>
    </div>
    <script>
        const questions = [
            { id: 1, text: "请简述光合作用的过程和意义", minLength: 50 },
            { id: 2, text: "描述一次你印象深刻的团队合作经历", minLength: 50 },
            { id: 3, text: "你认为未来教育的发展趋势是什么？为什么", minLength: 50 }
        ];
        
        const teacher = document.getElementById('teacher').value;
        const activityId = document.getElementById('activityId').value;

        function renderQuestions() {
            document.getElementById('questions').innerHTML = questions.map((q, idx) => 
                `<div class="question">
                    <div class="question-number">${idx+1}. ${q.text}</div>
                    <textarea id="answer${q.id}" class="answer-area" placeholder="请输入你的答案..." required minlength="${q.minLength}"></textarea>
                    <p class="word-count"><span id="count${q.id}" class="char-limit">0/${q.minLength}字</span></p>
                </div>`
            ).join('');
            
            // 添加字数统计
            questions.forEach(q => {
                document.getElementById(`answer${q.id}`).addEventListener('input', function() {
                    const count = this.value.length;
                    const counter = document.getElementById(`count${q.id}`);
                    counter.textContent = `${count}/${q.minLength}字`;
                    counter.className = count >= q.minLength ? 'char-limit safe' : 'char-limit';
                });
            });
        }

        document.getElementById('quizForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const loadingDiv = document.getElementById('loading');
            const messageDiv = document.getElementById('message');
            
            loadingDiv.style.display = 'block';
            messageDiv.style.display = 'none';

            try {
                const answers = [];
                let allValid = true;
                
                questions.forEach(q => {
                    const input = document.getElementById(`answer${q.id}`);
                    const text = input.value.trim();
                    
                    if (text.length < q.minLength) {
                        allValid = false;
                        alert(`${q.text}\n⚠️ 答案太短了！至少需要${q.minLength}个字`);
                    }
                    
                    answers.push(text);
                });

                if (!allValid) {
                    loadingDiv.style.display = 'none';
                    return;
                }

                const formData = new FormData();
                formData.append('teacher', teacher);
                formData.append('activity_id', activityId);
                formData.append('student_id', window.studentId || 'S001');
                formData.append('data', JSON.stringify({
                    answers: answers,
                    submissions: questions.map((q, i) => ({
                        question: q.text,
                        answer: answers[i],
                        word_count: answers[i].length
                    })),
                    client_timestamp: new Date().toISOString()
                }));

                console.log('提交问答数据:', { teacher, activityId, studentId: window.studentId || 'S001' });

                const response = await fetch('/api/submit', { method: 'POST', body: formData });
                const result = await response.json();
                loadingDiv.style.display = 'none';

                if (response.ok && result.success) {
                    messageDiv.textContent = '✅ 答案已提交！感谢你的认真作答，老师将会仔细批改。';
                    messageDiv.className = 'message success';
                    messageDiv.style.display = 'block';
                    document.getElementById('quizForm').reset();
                    questions.forEach(q => {
                        const counter = document.getElementById(`count${q.id}`);
                        counter.textContent = `0/${q.minLength}字`;
                        counter.className = 'char-limit';
                    });
                } else {
                    messageDiv.textContent = '❌ 提交失败：' + (result.message || result.error || '未知错误');
                    messageDiv.className = 'message error';
                    messageDiv.style.display = 'block';
                }
            } catch (error) {
                console.error('提交错误:', error);
                loadingDiv.style.display = 'none';
                messageDiv.textContent = '❌ 网络错误：' + error.message;
                messageDiv.className = 'message error';
                messageDiv.style.display = 'block';
            }
        });

        renderQuestions();
    </script>
</body>
</html>
