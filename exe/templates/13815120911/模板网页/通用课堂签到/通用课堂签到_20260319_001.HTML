<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课堂智能签到</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { max-width: 600px; width: 100%; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        
        header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 40px 30px; text-align: center; position: relative; }
        header::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="2" fill="white" opacity="0.3"/></svg>'); animation: float 3s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        
        h1 { font-size: 2rem; margin-bottom: 10px; position: relative; z-index: 1; }
        .subtitle { opacity: 0.9; font-size: 1.1rem; position: relative; z-index: 1; }
        .class-name { font-size: 1.3rem; font-weight: bold; margin-top: 15px; background: rgba(255,255,255,0.2); display: inline-block; padding: 8px 20px; border-radius: 50px; position: relative; z-index: 1; }
        
        .stats-container { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 15px; padding: 20px; margin: 20px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; position: relative; z-index: 1; }
        .stat-item { text-align: center; }
        .stat-number { font-size: 2rem; font-weight: bold; }
        .stat-label { font-size: 0.85rem; opacity: 0.9; margin-top: 5px; }
        .stat-icon { font-size: 1.5rem; margin-bottom: 5px; }
        
        form { padding: 30px; }
        .input-group { margin-bottom: 25px; position: relative; }
        label { display: block; font-weight: 600; color: #4a5568; margin-bottom: 8px; }
        input[type="text"], select { width: 100%; padding: 15px 20px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 1rem; transition: all 0.3s; background: #fff; }
        input:focus, select:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }
        
        .attendance-status { padding: 12px 20px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-weight: 600; display: none; }
        .attendance-status.present { background: #d1fae5; color: #065f46; }
        .attendance-status.late { background: #fef3c7; color: #92400e; }
        
        .submit-btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 15px 50px; font-size: 1.1rem; border-radius: 50px; cursor: pointer; transition: all 0.3s; width: 100%; font-weight: 600; }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(102,126,234,0.4); }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .live-feed { max-height: 300px; overflow-y: auto; margin-top: 30px; border-top: 2px solid #e9ecef; padding-top: 20px; }
        .live-feed-title { font-size: 1.1rem; font-weight: bold; color: #4a5568; margin-bottom: 15px; }
        .feed-list { list-style: none; }
        .feed-item { padding: 12px 15px; background: #f8fafc; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        .feed-time { font-size: 0.8rem; color: #95a5a6; }
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; }
        .status-present { background: #d1fae5; color: #065f46; }
        .status-late { background: #fef3c7; color: #92400e; }
        
        footer { text-align: center; padding: 20px; color: rgba(255,255,255,0.7); }
        .refresh-info { font-size: 0.8rem; opacity: 0.8; margin-top: 10px; }
        
        @media (max-width: 600px) {
            .stats-container { grid-template-columns: 1fr; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 课堂智能签到</h1>
            <p class="subtitle">点击按钮完成今日考勤记录</p>
            <div class="class-name">信息技术课 - 高一 (1) 班</div>
        </header>

        <div class="stats-container">
            <div class="stat-item">
                <div class="stat-icon">✅</div>
                <div class="stat-number" id="presentCount">0</div>
                <div class="stat-label">已签到</div>
            </div>
            <div class="stat-item">
                <div class="stat-icon">⏰</div>
                <div class="stat-number" id="lateCount">0</div>
                <div class="stat-label">迟到的</div>
            </div>
            <div class="stat-item">
                <div class="stat-icon">👥</div>
                <div class="stat-number" id="totalCount">0</div>
                <div class="stat-label">总人数</div>
            </div>
        </div>

        <form id="checkinForm">
            <input type="hidden" id="teacher" value="{{teacher}}">
            <input type="hidden" id="activityId" value="{{task}}">
            
            <div class="input-group">
                <label for="studentName">姓名</label>
                <input type="text" id="studentName" placeholder="请输入您的姓名" required autocomplete="off">
            </div>

            <div class="input-group">
                <label for="studentClass">班级</label>
                <select id="studentClass" required>
                    <option value="">请选择班级</option>
                    <option value="高一 (1) 班">高一 (1) 班</option>
                    <option value="高一 (2) 班">高一 (2) 班</option>
                    <option value="高二 (1) 班">高二 (1) 班</option>
                </select>
            </div>

            <div class="attendance-status present" id="statusPresent">
                ✅ 签到成功！欢迎参加今天的课程
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">📍 立即签到</button>
        </form>

        <div class="live-feed">
            <div class="live-feed-title">🔄 实时签到列表 (自动刷新)</div>
            <ul class="feed-list" id="feedList"></ul>
            <p class="refresh-info">每 30 秒自动更新 • 最后更新：<span id="lastUpdate">--:--</span></p>
        </div>

        <footer><p>© 2026 QuickForge 课堂教学系统 | 数据实时同步至教师端</p></footer>
    </div>

    <script>
        const teacher = '老张';
        const activityId = '通用课堂签到';
        let isSignedIn = false;

        // 格式化时间
        function formatTime(date) {
            return date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        }

        // 计算迟到状态
        function checkLateStatus(checkinTime) {
            const now = new Date();
            const diffMinutes = Math.floor((now - checkinTime) / 60000);
            return diffMinutes <= 5 ? '正常' : '迟到';
        }

        // 加载签到数据
        async function loadAttendanceData() {
            try {
                const response = await fetch(`/api/submissions?teacher=${teacher}&activity_id=${activityId}&limit=100`);
                const data = await response.json();

                if (data.success && Array.isArray(data.submissions)) {
                    updateStatsAndFeed(data.submissions);
                }
            } catch (error) {
                console.error('加载数据失败:', error);
            }
        }

        function updateStatsAndFeed(submissions) {
            const today = new Date().toDateString();
            const todaySubmissions = submissions.filter(s => {
                const submitDate = new Date(s._server_timestamp || Date.now()).toDateString();
                return submitDate === today;
            });

            const total = todaySubmissions.length;
            let late = 0;

            todaySubmissions.forEach(sub => {
                const timeStr = sub.data?.time;
                if (timeStr) {
                    const checkinTime = new Date(timeStr);
                    const status = checkLateStatus(checkinTime);
                    if (status === '迟到') late++;
                }
            });

            const present = total - late;

            // 更新统计
            document.getElementById('presentCount').textContent = present;
            document.getElementById('lateCount').textContent = late;
            document.getElementById('totalCount').textContent = total;

            // 更新实时列表
            const feedList = document.getElementById('feedList');
            feedList.innerHTML = todaySubmissions.slice(-20).reverse().map(sub => {
                const timeStr = sub.data?.time;
                const time = timeStr ? new Date(timeStr).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' }) : formatTime(new Date(sub._server_timestamp));
                
                const name = sub.data?.name || 'Anonymous';
                const status = checkLateStatus(timeStr ? new Date(timeStr) : new Date());
                
                return `
                    <li class="feed-item">
                        <span>${escapeHtml(name)}</span>
                        <div style="text-align:right;">
                            <span class="feed-time">${time}</span><br>
                            <span class="status-badge ${status === '迟到' ? 'status-late' : 'status-present'}">
                                ${status === '迟到' ? '⏰ 迟到' : '✅ 准时'}
                            </span>
                        </div>
                    </li>
                `;
            }).join('');

            document.getElementById('lastUpdate').textContent = formatTime(new Date());
        }

        async function handleCheckin(e) {
            e.preventDefault();

            if (isSignedIn) return;

            const studentName = document.getElementById('studentName').value.trim();
            const studentClass = document.getElementById('studentClass').value;

            if (!studentName || !studentClass) {
                alert('请填写完整信息！');
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = '⏳ 正在签到...';

            try {
                const now = new Date();
                const formData = new FormData();
                formData.append('teacher', teacher);
                formData.append('activity_id', activityId);
                formData.append('student_id', window.studentId || 'S001');
                formData.append('data', JSON.stringify({
                    name: studentName,
                    class: studentClass,
                    time: now.toISOString(),
                    submission_type: 'attendance_checkin',
                    client_timestamp: now.toISOString()
                }));

                const response = await fetch('/api/submit', { method: 'POST', body: formData });
                const result = await response.json();

                if (response.ok && result.success) {
                    isSignedIn = true;
                    
                    // 显示签到成功状态
                    const statusDiv = document.getElementById('statusPresent');
                    const timeStr = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
                    const lateStatus = checkLateStatus(now);
                    
                    statusDiv.style.display = 'block';
                    statusDiv.className = `attendance-status ${lateStatus === '迟到' ? 'late' : 'present'}`;
                    statusDiv.innerHTML = `${lateStatus === '迟到' ? '⏰' : '✅'} 签到${lateStatus === '迟到' ? '(迟到)' : '成功'}！欢迎参加今天的课程<br><small>签到时间：${timeStr}</small>`;
                    
                    // 隐藏提交按钮
                    btn.style.display = 'none';
                    
                    // 重新加载数据以显示最新记录
                    setTimeout(() => loadAttendanceData(), 1000);
                    
                    alert(`✅ ${lateStatus === '迟到' ? '迟到' : '准时'}签到成功！\n签到时间：${timeStr}`);
                } else {
                    throw new Error(result.message || '未知错误');
                }
            } catch (error) {
                console.error('签到失败:', error);
                alert('❌ 签到失败：' + error.message);
                btn.disabled = false;
                btn.textContent = '📍 立即签到';
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 页面加载时初始化
        document.getElementById('checkinForm').addEventListener('submit', handleCheckin);
        loadAttendanceData();

        // 每 30 秒自动刷新
        setInterval(loadAttendanceData, 30000);
    </script>
</body>
</html>
