<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多选题练习</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; background-color: #f5f7fa; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.1); padding: 30px; }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 10px; }
        .description { text-align: center; color: #7f8c8d; margin-bottom: 30px; }
        .question { margin-bottom: 25px; padding: 20px; background: #f8fafc; border-radius: 8px; border-left: 4px solid #9b59b6; }
        .question-number { font-weight: bold; color: #9b59b6; margin-bottom: 10px; }
        .options { margin-top: 10px; }
        .option-item { display: flex; align-items: center; margin-bottom: 10px; padding: 10px; background: white; border-radius: 5px; cursor: pointer; transition: all 0.2s; }
        .option-item:hover { background: #f3e5f5; }
        .option-item input[type="checkbox"] { margin-right: 10px; width: 18px; height: 18px; }
        .btn { background: #9b59b6; color: white; border: none; padding: 12px 25px; font-size: 1rem; border-radius: 5px; cursor: pointer; transition: background 0.3s; width: 100%; font-weight: 600; margin-top: 20px; }
        .btn:hover { background: #8e44ad; }
        .message { margin-top: 20px; padding: 15px; border-radius: 5px; text-align: center; display: none; }
        .message.success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; display: block; }
        .message.error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; display: block; }
        .loading { background-color: #fff3cd; color: #856404; padding: 15px; border-radius: 5px; text-align: center; display: none; }
        footer { text-align: center; margin-top: 30px; color: #718096; font-size: 0.9rem; }
        hr { border: none; border-top: 1px solid #e2e8f0; margin: 20px 0; }
        .score-display { font-size: 1.5rem; color: #27ae60; text-align: center; margin: 20px 0; padding: 15px; background: #d4edda; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 多选题练习</h1>
        <p class="description">包含 5 道多选题，每题至少有两个正确选项</p>
        <form id="quizForm">
            <input type="hidden" id="teacher" value="{{teacher}}">
            <input type="hidden" id="activityId" value="{{task}}">
            <div id="questions"></div>
            <button type="submit" class="btn">✅ 提交答案</button>
        </form>
        <div id="loading" class="loading">正在提交...</div>
        <div id="message" class="message"></div>
        <div id="scoreDisplay" class="score-display" style="display:none;"></div>
        <footer><hr><p>© 2026 QuickForge 课堂教学系统</p></footer>
    </div>
    <script>
        const questions = [
            { id: 1, text: "下列哪些是中国的省级行政区？", options: ["北京", "上海", "广州", "深圳"], correct: [0,1] },
            { id: 2, text: "以下哪些属于可再生能源？", options: ["太阳能", "石油", "风能", "水能"], correct: [0,2,3] },
            { id: 3, text: "光合作用的产物包括？", options: ["氧气", "二氧化碳", "葡萄糖", "水"], correct: [0,2] },
            { id: 4, text: "二次方程的解法包括？", options: ["配方法", "因式分解法", "开平方法", "图像法"], correct: [0,1,2,3] },
            { id: 5, text: "人体的消化器官包括？", options: ["胃", "心脏", "肝脏", "肺"], correct: [0,2] }
        ];
        
        const teacher = document.getElementById('teacher').value;
        const activityId = document.getElementById('activityId').value;

        function renderQuestions() {
            document.getElementById('questions').innerHTML = questions.map((q, idx) => 
                `<div class="question">
                    <div class="question-number">${idx+1}. ${q.text}</div>
                    <div class="options">
                        ${q.options.map((opt, optIdx) => 
                            `<label class="option-item">
                                <input type="checkbox" name="q${q.id}" value="${optIdx}">
                                <span>${String.fromCharCode(65+optIdx)}) ${opt}</span>
                            </label>`).join('')}
                    </div>
                </div>`
            ).join('');
        }

        document.getElementById('quizForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const loadingDiv = document.getElementById('loading');
            const messageDiv = document.getElementById('message');
            const scoreDiv = document.getElementById('scoreDisplay');
            
            loadingDiv.style.display = 'block';
            messageDiv.style.display = 'none';
            scoreDiv.style.display = 'none';

            try {
                const answers = [];
                questions.forEach(q => {
                    const selected = Array.from(document.querySelectorAll(`input[name="q${q.id}"]:checked`)).map(cb => parseInt(cb.value));
                    answers.push(selected.length ? selected : null);
                });

                if (answers.includes(null)) {
                    loadingDiv.style.display = 'none';
                    messageDiv.textContent = '⚠️ 请回答所有题目！';
                    messageDiv.className = 'message error';
                    messageDiv.style.display = 'block';
                    return;
                }

                let score = 0;
                answers.forEach((ans, idx) => {
                    if (JSON.stringify(ans.sort()) === JSON.stringify(questions[idx].correct.sort())) score++;
                });
                const finalScore = Math.round((score / questions.length) * 100);

                const formData = new FormData();
                formData.append('teacher', teacher);
                formData.append('activity_id', activityId);
                formData.append('student_id', window.studentId || 'S001');
                formData.append('data', JSON.stringify({
                    answers: answers,
                    score: score,
                    total: questions.length,
                    percentage: finalScore,
                    client_timestamp: new Date().toISOString()
                }));

                const response = await fetch('/api/submit', { method: 'POST', body: formData });
                const result = await response.json();
                loadingDiv.style.display = 'none';

                if (response.ok && result.success) {
                    scoreDiv.textContent = `🎉 你的得分：${finalScore}分 (${score}/${questions.length} 完全正确)`;
                    scoreDiv.style.display = 'block';
                    messageDiv.textContent = '✅ 答案已提交！';
                    messageDiv.className = 'message success';
                    messageDiv.style.display = 'block';
                    document.getElementById('quizForm').reset();
                } else {
                    messageDiv.textContent = '❌ 提交失败：' + (result.message || result.error || '未知错误');
                    messageDiv.className = 'message error';
                    messageDiv.style.display = 'block';
                }
            } catch (error) {
                console.error('提交错误:', error);
                loadingDiv.style.display = 'none';
                messageDiv.textContent = '❌ 网络错误：' + error.message;
                messageDiv.className = 'message error';
                messageDiv.style.display = 'block';
            }
        });

        renderQuestions();
    </script>
</body>
</html>
