<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生信息查询</title>
    <style>
        :root { --primary: #4361ee; --secondary: #3f37c9; --success: #4cc9f0; --light: #f8f9fa; --dark: #212529; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 2rem; }
        .app-container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; color: white; margin-bottom: 2rem; }
        h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 0.5rem; }
        .subtitle { opacity: 0.9; font-size: 1.1rem; }
        .card { background: white; border-radius: 1rem; padding: 2rem; box-shadow: 0 10px 40px rgba(0,0,0,0.1); margin-bottom: 2rem; }
        .search-box { display: flex; gap: 1rem; margin-bottom: 2rem; }
        .search-input { flex: 1; padding: 1rem 1.5rem; border: 2px solid #e9ecef; border-radius: 0.5rem; font-size: 1rem; transition: all 0.3s; }
        .search-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(67,97,238,0.1); }
        .btn { padding: 1rem 2rem; border: none; border-radius: 0.5rem; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--secondary); transform: translateY(-2px); }
        .btn-secondary { background: var(--light); color: var(--dark); }
        .btn-secondary:hover { background: #e9ecef; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); color: white; padding: 1.5rem; border-radius: 0.75rem; }
        .stat-number { font-size: 2.5rem; font-weight: 700; }
        .stat-label { opacity: 0.9; font-size: 0.9rem; margin-top: 0.25rem; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 1rem; background: var(--light); font-weight: 600; color: var(--dark); }
        td { padding: 1rem; border-bottom: 1px solid #e9ecef; }
        tr:hover { background: #f8f9fa; }
        .grade-badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 1rem; font-size: 0.85rem; font-weight: 600; }
        .grade-a { background: #d1fae5; color: #065f46; }
        .grade-b { background: #dbeafe; color: #1e40af; }
        .grade-c { background: #fef3c7; color: #92400e; }
        .loading { text-align: center; padding: 3rem; color: #6b7280; }
        .spinner { width: 40px; height: 40px; border: 4px solid #e9ecef; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 1rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .no-results { text-align: center; padding: 3rem; color: #6b7280; }
        footer { text-align: center; color: rgba(255,255,255,0.7); margin-top: 2rem; }
        @media (max-width: 768px) { .search-box { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>📊 学生成绩查询系统</h1>
            <p class="subtitle">输入学号查询个人成绩详情与趋势分析</p>
        </header>

        <form id="searchForm">
            <input type="hidden" id="teacher" value="{{teacher}}">
            <input type="hidden" id="activityId" value="{{task}}">
        </form>

        <div class="card">
            <div class="search-box">
                <input type="text" id="studentId" class="search-input" placeholder="请输入学生学号..." autocomplete="off">
                <button type="submit" class="btn btn-primary">🔍 查询成绩</button>
            </div>
        </div>

        <div id="loading" class="loading" style="display:none;">
            <div class="spinner"></div>
            <p>正在查询成绩数据...</p>
        </div>

        <div id="noResults" class="no-results" style="display:none;">
            <p>😕 未找到该学号的成绩记录</p>
        </div>

        <div id="results" style="display:none;">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="totalSubmissions">-</div>
                    <div class="stat-label">提交次数</div>
                </div>
                <div class="stat-card" style="background: linear-gradient(135deg, #4cc9f0 0%, #4361ee 100%);">
                    <div class="stat-number" id="avgScore">-</div>
                    <div class="stat-label">平均得分</div>
                </div>
                <div class="stat-card" style="background: linear-gradient(135deg, #f72585 0%, #7209b7 100%);">
                    <div class="stat-number" id="bestScore">-</div>
                    <div class="stat-label">最高得分</div>
                </div>
            </div>

            <div class="card">
                <h2 style="margin-bottom:1.5rem;">📝 成绩明细</h2>
                <table id="gradesTable">
                    <thead>
                        <tr>
                            <th>提交时间</th>
                            <th>类型</th>
                            <th>得分</th>
                            <th>等级</th>
                            <th>备注</th>
                        </tr>
                    </thead>
                    <tbody id="gradesBody"></tbody>
                </table>
            </div>

            <div class="card">
                <h2 style="margin-bottom:1.5rem;">📈 最近提交</h2>
                <div id="recentList"></div>
            </div>
        </div>

        <div style="position:fixed;top:20px;right:20px;z-index:1000;">
            <div id="message" style="padding:1rem 1.5rem;border-radius:0.5rem;display:none;"></div>
        </div>

        <footer><p>© 2026 QuickForge 课堂教学系统</p></footer>
    </div>

    <script>
        const teacher = document.getElementById('teacher').value;
        const activityId = document.getElementById('activityId').value;

        document.getElementById('searchForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const studentId = document.getElementById('studentId').value.trim();
            
            if (!studentId) {
                showMessage('请输入学号！', 'error');
                return;
            }

            showLoading(true);
            hideResults();

            try {
                const response = await fetch(`/api/submissions?teacher=${teacher}&activity_id=${activityId}&student_id=${studentId}&limit=500`);
                const data = await response.json();

                if (data.success && Array.isArray(data.submissions) && data.submissions.length > 0) {
                    displayResults(data.submissions);
                } else {
                    showNoResults();
                }
            } catch (error) {
                console.error('查询失败:', error);
                showMessage('❌ 查询失败：' + error.message, 'error');
                showLoading(false);
            }
        });

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        function hideResults() {
            document.getElementById('results').style.display = 'none';
            document.getElementById('noResults').style.display = 'none';
        }

        function showNoResults() {
            document.getElementById('noResults').style.display = 'block';
            showLoading(false);
        }

        function displayResults(submissions) {
            hideResults();
            document.getElementById('results').style.display = 'block';

            let totalScore = 0;
            let maxScore = 0;

            // 计算统计数据
            submissions.forEach(sub => {
                const score = calculateScore(sub);
                totalScore += score;
                if (score > maxScore) maxScore = score;
            });

            const avgScore = Math.round(totalScore / submissions.length);
            const bestScore = Math.round(maxScore);

            // 更新统计卡片
            document.getElementById('totalSubmissions').textContent = submissions.length;
            document.getElementById('avgScore').textContent = `${avgScore}%`;
            document.getElementById('bestScore').textContent = `${bestScore}%`;

            // 渲染表格
            const tbody = document.getElementById('gradesBody');
            tbody.innerHTML = submissions.map((sub, i) => {
                const time = new Date(sub._server_timestamp || Date.now()).toLocaleString('zh-CN');
                const type = sub.data?.type || '普通提交';
                const score = calculateScore(sub);
                const grade = getGrade(score);
                const note = sub.data?.note || '-';

                return `
                    <tr>
                        <td>${time}</td>
                        <td>${escapeHtml(type)}</td>
                        <td>${score}%</td>
                        <td><span class="grade-badge ${grade.class}">${grade.label}</span></td>
                        <td>${escapeHtml(note)}</td>
                    </tr>
                `;
            }).join('');

            // 渲染最近提交列表
            const recentDiv = document.getElementById('recentList');
            recentDiv.innerHTML = submissions.slice(0, 5).map((sub, i) => {
                const time = new Date(sub._server_timestamp || Date.now()).toLocaleString('zh-CN');
                return `
                    <div style="padding:1rem;border-left:3px solid var(--primary);margin-bottom:0.5rem;background:#f8f9fa;border-radius:0.25rem;">
                        <strong>提交${i+1}</strong>: ${time}<br>
                        <small>得分：${calculateScore(sub)}%</small>
                    </div>
                `;
            }).join('');

            showLoading(false);
            showMessage(`✓ 查询成功，共找到 ${submissions.length} 条记录`, 'success');
        }

        function calculateScore(submission) {
            try {
                const data = typeof submission.data === 'string' ? JSON.parse(submission.data) : submission.data;
                if (data.score !== undefined && data.total) {
                    return Math.round((data.score / data.total) * 100);
                }
                if (data.percentage) return data.percentage;
                return 0;
            } catch {
                return 0;
            }
        }

        function getGrade(score) {
            if (score >= 90) return { label: 'A+', class: 'grade-a' };
            if (score >= 80) return { label: 'B+', class: 'grade-b' };
            if (score >= 70) return { label: 'C+', class: 'grade-c' };
            return { label: 'D', class: 'grade-c' };
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.style.background = type === 'success' ? '#d1fae5' : '#fee2e2';
            msg.style.color = type === 'success' ? '#065f46' : '#991b1b';
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
