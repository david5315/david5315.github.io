<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网络实验室模拟器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Microsoft YaHei", Arial, sans-serif; background: #f0f2f5; overflow: hidden; }
        #toolbar {
            background: #2c3e50; padding: 12px 20px; display: flex; gap: 10px;
            flex-wrap: wrap; box-shadow: 0 2px 5px rgba(0,0,0,0.1); align-items: center;
        }
        .tool-group { display: flex; gap: 8px; }
        .tool-group-right { margin-left: auto; display: flex; gap: 8px; }
        .tool-btn {
            padding: 10px 18px; background: #34495e; color: white; border: none;
            border-radius: 5px; cursor: pointer; font-size: 13px; transition: all 0.3s;
        }
        .tool-btn:hover:not(.disabled) { background: #4a6278; }
        .tool-btn.active { background: #3498db; box-shadow: 0 0 10px rgba(52,152,219,0.5); }
        .tool-btn.highlight { background: linear-gradient(135deg, #e74c3c, #c0392b); }
        .tool-btn.highlight:hover:not(.disabled) { background: linear-gradient(135deg, #c0392b, #a93226); }
        .tool-btn.highlight-green { background: linear-gradient(135deg, #27ae60, #1e8449); }
        .tool-btn.highlight-green:hover:not(.disabled) { background: linear-gradient(135deg, #1e8449, #196f3d); }
        .tool-btn.highlight-orange { background: linear-gradient(135deg, #f39c12, #d68910); }
        .tool-btn.highlight-orange:hover:not(.disabled) { background: linear-gradient(135deg, #d68910, #b9770e); }
        .tool-btn.disabled { opacity: 0.5; cursor: not-allowed; pointer-events: none; }
        #main-container { display: flex; height: calc(100vh - 60px); }
        #canvas { flex: 1; background: #e8eaed; position: relative; overflow: auto; }
        #device-library {
            width: 180px; background: white; padding: 12px;
            box-shadow: -2px 0 5px rgba(0,0,0,0.1); overflow-y: auto;
        }
        #device-library.disabled { opacity: 0.5; pointer-events: none; }
        .device-category { margin-bottom: 15px; }
        .device-category h3 {
            font-size: 13px; color: #2c3e50; margin-bottom: 8px;
            border-bottom: 2px solid #3498db; padding-bottom: 5px;
        }
        .device-item {
            padding: 8px; margin: 4px 0; background: #ecf0f1; border-radius: 5px;
            cursor: pointer; text-align: center; font-size: 11px; transition: all 0.2s;
            display: flex; flex-direction: column; align-items: center;
        }
        .device-item:hover { background: #3498db; color: white; transform: translateX(-3px); }
        .device-item:hover svg { filter: brightness(1.2); }
        .device-item .svg-icon { width: 36px; height: 36px; margin-bottom: 4px; }
        .device-on-canvas { position: absolute; width: 90px; text-align: center; cursor: pointer; user-select: none; z-index: 10; }
        .device-visual {
            width: 64px; height: 64px; margin: 0 auto; background: white;
            border: 2px solid transparent; border-radius: 8px;
            display: flex; align-items: center; justify-content: center; position: relative;
            transition: border-color 0.2s;
        }
        .device-visual.selected { border-color: #3498db; box-shadow: 0 0 8px rgba(52,152,219,0.5); }
        .device-visual.live { animation: blink 1s infinite; }
        @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0.8; } }
        .live-badge {
            position: absolute; top: -6px; right: -6px; background: #e74c3c; color: white;
            padding: 2px 5px; border-radius: 3px; font-size: 9px; font-weight: bold;
        }
        .device-label { margin-top: 4px; font-size: 10px; color: #2c3e50; font-weight: bold; }
        .device-ip { font-size: 9px; color: #7f8c8d; margin-top: 1px; }
        #connections-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        #connections-layer.remove-mode { pointer-events: auto; }
        .data-packet {
            position: absolute; width: 12px; height: 12px; background: #e74c3c;
            border-radius: 50%; z-index: 100; pointer-events: none;
            box-shadow: 0 0 8px #e74c3c;
        }
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3); z-index: 1000; align-items: center; justify-content: center;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: white; padding: 20px; border-radius: 10px; min-width: 380px;
            max-width: 550px; max-height: 80vh; overflow-y: auto; box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            position: absolute; cursor: move;
        }
        .modal-header {
            font-size: 16px; font-weight: bold; margin-bottom: 15px; color: #2c3e50;
            border-bottom: 2px solid #3498db; padding-bottom: 8px; user-select: none;
        }
        .modal-body { margin-bottom: 15px; }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; margin-bottom: 4px; color: #34495e; font-size: 13px; cursor: move; }
        .input-group input {
            width: 100%; padding: 8px; border: 1px solid #bdc3c7;
            border-radius: 5px; font-size: 13px; cursor: text;
        }
        .modal-footer { display: flex; gap: 10px; justify-content: flex-end; }
        .btn {
            padding: 8px 18px; border: none; border-radius: 5px;
            cursor: pointer; font-size: 13px; transition: all 0.3s;
        }
        .btn-primary { background: #3498db; color: white; }
        .btn-primary:hover { background: #2980b9; }
        .btn-secondary { background: #95a5a6; color: white; }
        .btn-secondary:hover { background: #7f8c8d; }
        .ping-result {
            background: #2c3e50; color: #2ecc71; padding: 12px; border-radius: 5px;
            font-family: "Courier New", monospace; font-size: 11px;
            white-space: pre-wrap; margin-top: 12px; max-height: 250px; overflow-y: auto; cursor: move;
        }
        .error-text { color: #e74c3c; }
        .success-text { color: #2ecc71; }
        .status-item {
            padding: 6px 10px; margin: 4px 0; background: #ecf0f1; border-radius: 5px;
            display: flex; justify-content: space-between; align-items: center; font-size: 12px;
        }
        .status-badge { padding: 2px 8px; border-radius: 3px; font-size: 11px; font-weight: bold; }
        .status-badge.ok { background: #2ecc71; color: white; }
        .status-badge.error { background: #e74c3c; color: white; }
        .live-indicator {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #e74c3c; color: white; padding: 10px 25px; border-radius: 25px;
            font-weight: bold; display: none; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .live-indicator.show { display: flex; align-items: center; gap: 10px; }
        .toast {
            position: fixed; top: 70px; right: 20px; padding: 12px 20px;
            border-radius: 5px; color: white; font-weight: bold; z-index: 2000;
            display: none; animation: slideIn 0.3s;
        }
        @keyframes slideIn { from { transform: translateX(300px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast.show { display: block; }
        .toast.success { background: #2ecc71; }
        .toast.error { background: #e74c3c; }
        .svg-icon { width: 40px; height: 40px; }
    </style>
</head>

<body>
    <div id="toolbar">
        <div class="tool-group">
            <button class="tool-btn active" id="moveBtn" onclick="setMode('move')">移动</button>
            <button class="tool-btn" id="connectBtn" onclick="setMode('connect')">有线连接</button>
            <button class="tool-btn" id="wirelessBtn" onclick="setMode('wireless')">无线连接</button>
            <button class="tool-btn" id="removeBtn" onclick="setMode('remove')">拆除</button>
        </div>
        <div class="tool-group-right">
            <button class="tool-btn highlight-orange" id="autoIpBtn" onclick="autoAssignIPs()">一键设置IP</button>
            <button class="tool-btn highlight-green" id="pingBtn" onclick="showPingModal()">Ping测试</button>
            <button class="tool-btn highlight" id="liveBtn" onclick="toggleLivestream()">发起直播</button>
        </div>
    </div>
    <div id="main-container">
        <div id="canvas">
            <svg id="connections-layer"></svg>
        </div>
        <div id="device-library"></div>
    </div>
    <div id="ipModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">配置 IP 地址</div>
            <div class="modal-body">
                <div class="input-group">
                    <label>设备名称: <span id="deviceName"></span></label>
                </div>
                <div class="input-group">
                    <label>IP 地址</label>
                    <input type="text" id="ipInput" placeholder="192.168.1.100">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('ipModal')">取消</button>
                <button class="btn btn-primary" onclick="saveIP()">保存</button>
            </div>
        </div>
    </div>
    <div id="pingModal" class="modal">
        <div class="modal-content" id="pingModalContent" onmousedown="handleModalDrag(event, 'pingModalContent')">
            <div class="modal-header">网络连通性测试 (Ping)</div>
            <div class="modal-body">
                <div class="input-group">
                    <label>源 IP (Source)</label>
                    <input type="text" id="sourceIP" placeholder="192.168.1.1">
                </div>
                <div class="input-group">
                    <label>目的 IP (Destination)</label>
                    <input type="text" id="destIP" placeholder="192.168.1.100">
                </div>
                <button class="btn btn-primary" onclick="runPingTest()">开始测试</button>
                <div id="pingResult" class="ping-result" style="display:none;"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('pingModal')">关闭</button>
            </div>
        </div>
    </div>
    <div id="liveModal" class="modal">
        <div class="modal-content" id="liveModalContent" onmousedown="handleModalDrag(event, 'liveModalContent')">
            <div class="modal-header">网络环境自检报告</div>
            <div class="modal-body" id="liveCheckBody"></div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('liveModal')">关闭</button>
                <button class="btn btn-primary" onclick="activateLive()">开始直播</button>
            </div>
        </div>
    </div>
    <div id="liveIndicator" class="live-indicator">🔴 直播流分发中...<button class="btn btn-secondary" style="padding:5px 12px;font-size:11px;" onclick="stopLive()">停止</button></div>
    <div id="toast" class="toast"></div>
    <script>
        let mode = 'move', deviceCounter = 0, devices = [], connections = [];
        let selectedDeviceId = null, connectStart = null, currentEditDevice = null, isLive = false;
        let animationIntervals = [];
        let dragModal = null, dragOffsetX = 0, dragOffsetY = 0;
        let connectionIdCounter = 0;
        
        // Quickform数据采集相关变量
        let quickformActivityStartTime = null;
        let quickformOperations = [];
        let quickformPingTests = 0;
        let quickformPingSuccess = 0;
        let quickformLiveStartTime = null;
        let quickformLiveDuration = 0;
        const quickformAnonymousId = 'anon_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        // 根据接口文档，需要提供 activity_id，从提交URL中提取或直接定义
        const activityId = '4i5UrQGjgog';  // 与提交URL中的活动ID保持一致
        
        const deviceIcons = {
            'router': `<svg class="svg-icon" viewBox="0 0 64 64"><rect x="8" y="20" width="48" height="28" rx="4" fill="#3498db"/><circle cx="16" cy="34" r="3" fill="#2ecc71"/><circle cx="26" cy="34" r="3" fill="#f1c40f"/><rect x="36" y="30" width="16" height="8" rx="2" fill="#ecf0f1"/><line x1="20" y1="48" x2="20" y2="56" stroke="#34495e" stroke-width="3"/><line x1="44" y1="48" x2="44" y2="56" stroke="#34495e" stroke-width="3"/><path d="M26 12 L32 6 L38 12" stroke="#3498db" stroke-width="2" fill="none"/><path d="M22 16 L32 8 L42 16" stroke="#3498db" stroke-width="2" fill="none"/></svg>`,
            'switch': `<svg class="svg-icon" viewBox="0 0 64 64"><rect x="6" y="22" width="52" height="20" rx="3" fill="#9b59b6"/><rect x="10" y="26" width="6" height="12" rx="1" fill="#ecf0f1"/><rect x="19" y="26" width="6" height="12" rx="1" fill="#ecf0f1"/><rect x="28" y="26" width="6" height="12" rx="1" fill="#ecf0f1"/><rect x="37" y="26" width="6" height="12" rx="1" fill="#ecf0f1"/><rect x="46" y="26" width="6" height="12" rx="1" fill="#ecf0f1"/><circle cx="13" cy="46" r="2" fill="#2ecc71"/><circle cx="22" cy="46" r="2" fill="#2ecc71"/><circle cx="31" cy="46" r="2" fill="#f1c40f"/><circle cx="40" cy="46" r="2" fill="#2ecc71"/><circle cx="49" cy="46" r="2" fill="#2ecc71"/></svg>`,
            'server': `<svg class="svg-icon" viewBox="0 0 64 64"><rect x="14" y="6" width="36" height="16" rx="3" fill="#2c3e50"/><rect x="14" y="24" width="36" height="16" rx="3" fill="#34495e"/><rect x="14" y="42" width="36" height="16" rx="3" fill="#2c3e50"/><circle cx="22" cy="14" r="2" fill="#2ecc71"/><circle cx="22" cy="32" r="2" fill="#3498db"/><circle cx="22" cy="50" r="2" fill="#2ecc71"/><rect x="28" y="12" width="18" height="4" rx="1" fill="#7f8c8d"/><rect x="28" y="30" width="18" height="4" rx="1" fill="#7f8c8d"/><rect x="28" y="48" width="18" height="4" rx="1" fill="#7f8c8d"/></svg>`,
            'pc': `<svg class="svg-icon" viewBox="0 0 64 64"><rect x="10" y="8" width="44" height="32" rx="3" fill="#34495e"/><rect x="14" y="12" width="36" height="24" fill="#3498db"/><rect x="24" y="40" width="16" height="6" fill="#7f8c8d"/><rect x="18" y="46" width="28" height="4" rx="2" fill="#95a5a6"/></svg>`,
            'tablet': `<svg class="svg-icon" viewBox="0 0 64 64"><rect x="8" y="12" width="48" height="40" rx="4" fill="#34495e"/><rect x="12" y="16" width="40" height="30" fill="#3498db"/><circle cx="32" cy="50" r="3" fill="#7f8c8d"/></svg>`,
            'phone': `<svg class="svg-icon" viewBox="0 0 64 64"><rect x="18" y="4" width="28" height="56" rx="4" fill="#34495e"/><rect x="22" y="10" width="20" height="36" fill="#3498db"/><circle cx="32" cy="52" r="3" fill="#7f8c8d"/><rect x="28" y="6" width="8" height="2" rx="1" fill="#7f8c8d"/></svg>`,
            'camera': `<svg class="svg-icon" viewBox="0 0 64 64"><rect x="8" y="18" width="48" height="32" rx="4" fill="#2c3e50"/><circle cx="32" cy="34" r="12" fill="#34495e"/><circle cx="32" cy="34" r="8" fill="#3498db"/><circle cx="32" cy="34" r="4" fill="#2c3e50"/><rect x="44" y="22" width="8" height="6" rx="1" fill="#e74c3c"/><rect x="12" y="12" width="16" height="8" rx="2" fill="#7f8c8d"/></svg>`
        };
        const deviceNames = { 'router': '路由器', 'switch': '交换机', 'server': '服务器', 'pc': '电脑', 'tablet': '平板', 'phone': '手机', 'camera': '摄像机' };
        
        function initDeviceLibrary() {
            const library = document.getElementById('device-library');
            library.innerHTML = `
                <div class="device-category">
                    <h3>网络设备</h3>
                    <div class="device-item" onclick="addDevice('router')">${deviceIcons['router']}<div>路由器</div></div>
                    <div class="device-item" onclick="addDevice('switch')">${deviceIcons['switch']}<div>交换机</div></div>
                    <div class="device-item" onclick="addDevice('server')">${deviceIcons['server']}<div>服务器</div></div>
                </div>
                <div class="device-category">
                    <h3>终端设备</h3>
                    <div class="device-item" onclick="addDevice('pc')">${deviceIcons['pc']}<div>电脑</div></div>
                    <div class="device-item" onclick="addDevice('tablet')">${deviceIcons['tablet']}<div>平板</div></div>
                    <div class="device-item" onclick="addDevice('phone')">${deviceIcons['phone']}<div>手机</div></div>
                    <div class="device-item" onclick="addDevice('camera')">${deviceIcons['camera']}<div>摄像机</div></div>
                </div>
            `;
        }
        
        function handleModalDrag(e, modalId) {
            const tag = e.target.tagName.toLowerCase();
            if (tag === 'input' || tag === 'button') return;
            dragModal = document.getElementById(modalId);
            const rect = dragModal.getBoundingClientRect();
            dragOffsetX = e.clientX - rect.left;
            dragOffsetY = e.clientY - rect.top;
            document.addEventListener('mousemove', onDragModal);
            document.addEventListener('mouseup', stopDragModal);
            e.preventDefault();
        }
        
        function onDragModal(e) {
            if (dragModal) {
                dragModal.style.left = (e.clientX - dragOffsetX) + 'px';
                dragModal.style.top = (e.clientY - dragOffsetY) + 'px';
                dragModal.style.transform = 'none';
            }
        }
        
        function stopDragModal() {
            dragModal = null;
            document.removeEventListener('mousemove', onDragModal);
            document.removeEventListener('mouseup', stopDragModal);
        }
        
        function setMode(newMode) {
            if (isLive) return;
            mode = newMode;
            document.querySelectorAll('.tool-group .tool-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(newMode + 'Btn').classList.add('active');
            connectStart = null;
            const connLayer = document.getElementById('connections-layer');
            if (newMode === 'remove') {
                connLayer.classList.add('remove-mode');
            } else {
                connLayer.classList.remove('remove-mode');
            }
        }
        
        function setLiveMode(enabled) {
            const btns = ['moveBtn', 'connectBtn', 'wirelessBtn', 'removeBtn', 'autoIpBtn', 'pingBtn'];
            btns.forEach(id => {
                const btn = document.getElementById(id);
                if (enabled) btn.classList.add('disabled');
                else btn.classList.remove('disabled');
            });
            const library = document.getElementById('device-library');
            if (enabled) library.classList.add('disabled');
            else library.classList.remove('disabled');
        }
        
        function addDevice(type) {
            if (isLive) return;
            deviceCounter++;
            const canvas = document.getElementById('canvas');
            const rect = canvas.getBoundingClientRect();
            const device = { 
                id: deviceCounter, 
                type, 
                x: 80 + (deviceCounter * 40) % (rect.width - 200), 
                y: 80 + Math.floor(deviceCounter / 6) * 110, 
                ip: null 
            };
            devices.push(device);
            renderDevice(device);
            
            // 记录操作到Quickform数据
            quickformOperations.push({
                "action": "add_device",
                "device_type": type,
                "device_id": device.id,
                "timestamp": new Date().toLocaleTimeString()
            });
            
            setMode('move');
        }
        
        function renderDevice(device) {
            const canvas = document.getElementById('canvas');
            const div = document.createElement('div');
            div.className = 'device-on-canvas';
            div.id = `device-${device.id}`;
            div.style.left = device.x + 'px';
            div.style.top = device.y + 'px';
            div.innerHTML = `<div class="device-visual">${deviceIcons[device.type]}</div><div class="device-label">${deviceNames[device.type]} ${device.id}</div><div class="device-ip">${device.ip || ''}</div>`;
            div.onmousedown = (e) => handleDeviceClick(device, e);
            div.ondblclick = () => { if (!isLive) editIP(device); };
            canvas.appendChild(div);
        }
        
        function handleDeviceClick(device, e) {
            if (isLive) return;
            e.stopPropagation();
            if (mode === 'move') { selectDeviceOnCanvas(device); startDrag(device, e); }
            else if (mode === 'remove') { removeDevice(device); }
            else if (mode === 'connect') { selectDeviceOnCanvas(device); connectDevices(device); }
            else if (mode === 'wireless') { selectDeviceOnCanvas(device); wirelessConnect(device); }
        }
        
        function selectDeviceOnCanvas(device) {
            document.querySelectorAll('.device-visual').forEach(el => el.classList.remove('selected'));
            const div = document.getElementById(`device-${device.id}`);
            if (div) div.querySelector('.device-visual').classList.add('selected');
            selectedDeviceId = device.id;
        }
        
        function startDrag(device, e) {
            if (isLive) return;
            e.preventDefault();
            const startX = e.clientX, startY = e.clientY;
            const startDeviceX = device.x, startDeviceY = device.y;
            function onMouseMove(e) {
                device.x = Math.max(0, startDeviceX + (e.clientX - startX));
                device.y = Math.max(0, startDeviceY + (e.clientY - startY));
                updateDevicePosition(device);
                renderConnections();
            }
            function onMouseUp() {
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
            }
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
        }
        
        function updateDevicePosition(device) {
            const div = document.getElementById(`device-${device.id}`);
            div.style.left = device.x + 'px';
            div.style.top = device.y + 'px';
        }
        
        function removeDevice(device) {
            if (isLive) return;
            devices = devices.filter(d => d.id !== device.id);
            connections = connections.filter(c => c.from !== device.id && c.to !== device.id);
            document.getElementById(`device-${device.id}`).remove();
            renderConnections();
            showToast('设备已删除', 'success');
            
            // 记录删除操作
            quickformOperations.push({
                "action": "remove_device",
                "device_type": device.type,
                "device_id": device.id,
                "timestamp": new Date().toLocaleTimeString()
            });
        }
        
        function connectDevices(device) {
            if (['phone', 'tablet'].includes(device.type)) { showToast('错误:移动设备无网口', 'error'); return; }
            if (!connectStart) { connectStart = device; showToast('请点击第二个设备完成连接', 'success'); }
            else {
                if (['phone', 'tablet'].includes(connectStart.type)) { showToast('错误:移动设备无网口', 'error'); connectStart = null; return; }
                if (connectStart.id !== device.id) {
                    connectionIdCounter++;
                    connections.push({ id: connectionIdCounter, from: connectStart.id, to: device.id, type: 'wired' });
                    renderConnections();
                    showToast('有线连接已建立', 'success');
                    
                    // 记录连接操作
                    const fromDevice = devices.find(d => d.id === connectStart.id);
                    const toDevice = devices.find(d => d.id === device.id);
                    quickformOperations.push({
                        "action": "connect",
                        "from": deviceNames[fromDevice.type] + fromDevice.id,
                        "to": deviceNames[toDevice.type] + toDevice.id,
                        "type": "wired",
                        "timestamp": new Date().toLocaleTimeString()
                    });
                }
                connectStart = null;
            }
        }
        
        function wirelessConnect(device) {
            const isMobile = ['phone', 'tablet'].includes(device.type);
            const isRouter = device.type === 'router';
            if (!connectStart) { 
                if (isMobile || isRouter) {
                    connectStart = device;
                    showToast('请点击路由器或移动设备完成连接', 'success');
                } else {
                    showToast('无线连接仅支持手机/平板与路由器', 'error');
                }
            } else {
                const startIsMobile = ['phone', 'tablet'].includes(connectStart.type);
                const startIsRouter = connectStart.type === 'router';
                if ((startIsMobile && isRouter) || (startIsRouter && isMobile)) {
                    connectionIdCounter++;
                    connections.push({ id: connectionIdCounter, from: connectStart.id, to: device.id, type: 'wireless' });
                    renderConnections();
                    showToast('无线连接已建立', 'success');
                    
                    // 记录无线连接操作
                    const fromDevice = connectStart;
                    const toDevice = device;
                    quickformOperations.push({
                        "action": "connect",
                        "from": deviceNames[fromDevice.type] + fromDevice.id,
                        "to": deviceNames[toDevice.type] + toDevice.id,
                        "type": "wireless",
                        "timestamp": new Date().toLocaleTimeString()
                    });
                }
                connectStart = null;
            }
        }
        
        function renderConnections() {
            const svg = document.getElementById('connections-layer');
            svg.innerHTML = '';
            connections.forEach((conn) => {
                const fromDevice = devices.find(d => d.id === conn.from);
                const toDevice = devices.find(d => d.id === conn.to);
                if (fromDevice && toDevice) {
                    const x1 = fromDevice.x + 45, y1 = fromDevice.y + 32;
                    const x2 = toDevice.x + 45, y2 = toDevice.y + 32;
                    
                    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                    g.setAttribute('data-conn-id', conn.id);
                    g.style.cursor = mode === 'remove' ? 'pointer' : 'default';
                    
                    // 透明粗线用于点击
                    const hitLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    hitLine.setAttribute('x1', x1);
                    hitLine.setAttribute('y1', y1);
                    hitLine.setAttribute('x2', x2);
                    hitLine.setAttribute('y2', y2);
                    hitLine.setAttribute('stroke', 'transparent');
                    hitLine.setAttribute('stroke-width', '20');
                    hitLine.style.cursor = 'pointer';
                    
                    // 可见线条
                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.setAttribute('x1', x1);
                    line.setAttribute('y1', y1);
                    line.setAttribute('x2', x2);
                    line.setAttribute('y2', y2);
                    line.setAttribute('stroke', conn.type === 'wireless' ? '#3498db' : '#34495e');
                    line.setAttribute('stroke-width', conn.type === 'wireless' ? '2' : '3');
                    if (conn.type === 'wireless') {
                        line.setAttribute('stroke-dasharray', '8,4');
                    }
                    
                    g.appendChild(hitLine);
                    g.appendChild(line);
                    
                    g.onmouseenter = () => {
                        if (mode === 'remove') {
                            line.setAttribute('stroke', '#e74c3c');
                            line.setAttribute('stroke-width', '5');
                        }
                    };
                    g.onmouseleave = () => {
                        line.setAttribute('stroke', conn.type === 'wireless' ? '#3498db' : '#34495e');
                        line.setAttribute('stroke-width', conn.type === 'wireless' ? '2' : '3');
                    };
                    g.onclick = (e) => {
                        if (mode === 'remove' && !isLive) {
                            e.stopPropagation();
                            removeConnection(conn.id);
                        }
                    };
                    
                    svg.appendChild(g);
                }
            });
        }
        
        function removeConnection(connId) {
            connections = connections.filter(c => c.id !== connId);
            renderConnections();
            showToast('连接已删除', 'success');
            
            // 记录删除连接操作
            quickformOperations.push({
                "action": "remove_connection",
                "connection_id": connId,
                "timestamp": new Date().toLocaleTimeString()
            });
        }
        
        function editIP(device) {
            currentEditDevice = device;
            document.getElementById('deviceName').textContent = `${deviceNames[device.type]} ${device.id}`;
            document.getElementById('ipInput').value = device.ip || '';
            openModal('ipModal');
        }
        
        function saveIP() {
            const ip = document.getElementById('ipInput').value;
            if (!/^192\.168\.1\.\d{1,3}$/.test(ip)) { showToast('请输入正确的IP地址(示例:192.168.1.100)', 'error'); return; }
            const lastOctet = parseInt(ip.split('.')[3]);
            if (lastOctet < 0 || lastOctet > 255) { showToast('IP地址最后一位必须在0-255之间', 'error'); return; }
            currentEditDevice.ip = ip;
            document.getElementById(`device-${currentEditDevice.id}`).querySelector('.device-ip').textContent = ip;
            closeModal('ipModal');
            showToast('IP配置成功', 'success');
            
            // 记录IP配置操作
            quickformOperations.push({
                "action": "config_ip",
                "device": deviceNames[currentEditDevice.type] + currentEditDevice.id,
                "ip": ip,
                "timestamp": new Date().toLocaleTimeString()
            });
        }
        
        function autoAssignIPs() {
            if (isLive) return;
            let ipCounter = 1;
            devices.forEach(device => {
                device.ip = `192.168.1.${ipCounter++}`;
                document.getElementById(`device-${device.id}`).querySelector('.device-ip').textContent = device.ip;
            });
            showToast(`已自动配置 ${devices.length} 个设备的IP`, 'success');
            
            // 记录自动配置IP操作
            quickformOperations.push({
                "action": "auto_assign_ips",
                "device_count": devices.length,
                "timestamp": new Date().toLocaleTimeString()
            });
        }
        
        function showPingModal() {
            if (isLive) return;
            document.getElementById('pingResult').style.display = 'none';
            const content = document.getElementById('pingModalContent');
            content.style.left = '50%';
            content.style.top = '50%';
            content.style.transform = 'translate(-50%, -50%)';
            openModal('pingModal');
        }
        
        function runPingTest() {
            const sourceIP = document.getElementById('sourceIP').value;
            const destIP = document.getElementById('destIP').value;
            const resultDiv = document.getElementById('pingResult');
            const sourceDevice = devices.find(d => d.ip === sourceIP);
            const destDevice = devices.find(d => d.ip === destIP);
            resultDiv.style.display = 'block';
            
            // 记录Ping测试
            quickformPingTests++;
            
            if (!sourceDevice) { 
                resultDiv.innerHTML = `<span class="error-text">错误:找不到源IP ${sourceIP}</span>`;
                return;
            }
            if (!destDevice) { 
                resultDiv.innerHTML = `<span class="error-text">错误:找不到目的IP ${destIP}</span>`;
                return;
            }
            
            const path = findPath(sourceDevice.id, destDevice.id);
            if (path.length === 0) { 
                resultDiv.innerHTML = `<span class="error-text">错误:网络不可达</span>`;
                return;
            }
            
            quickformPingSuccess++;
            
            const pathStr = path.map(id => { const d = devices.find(dev => dev.id === id); return `${deviceNames[d.type]}${d.id}`; }).join(' → ');
            resultDiv.innerHTML = `C:\\> ping -S ${sourceIP} ${destIP}\nPing ${destIP} ...\n路径:[${pathStr}]\n<span class="success-text">来自 ${destIP} 的回复:字节=32 时间=5ms TTL=64</span>`;
            
            // 记录成功的Ping测试
            quickformOperations.push({
                "action": "ping_test",
                "source": sourceIP,
                "destination": destIP,
                "path": pathStr,
                "success": true,
                "timestamp": new Date().toLocaleTimeString()
            });
        }
        
        function findPath(fromId, toId) {
            const visited = new Set(), queue = [[fromId]];
            while (queue.length > 0) {
                const path = queue.shift(), current = path[path.length - 1];
                if (current === toId) return path;
                if (visited.has(current)) continue;
                visited.add(current);
                connections.filter(c => c.from === current || c.to === current)
                    .map(c => c.from === current ? c.to : c.from)
                    .forEach(neighbor => { if (!visited.has(neighbor)) queue.push([...path, neighbor]); });
            }
            return [];
        }
        
        function toggleLivestream() {
            if (isLive) stopLive();
            else startLivestream();
        }
        
        function startLivestream() {
            if (isLive) return;
            const body = document.getElementById('liveCheckBody');
            body.innerHTML = '';
            const camera = devices.find(d => d.type === 'camera');
            const server = devices.find(d => d.type === 'server');
            if (!camera) body.innerHTML += `<div class="status-item"><span>摄像机</span><span class="status-badge error">未添加</span></div>`;
            if (!server) body.innerHTML += `<div class="status-item"><span>服务器</span><span class="status-badge error">未添加</span></div>`;
            devices.forEach(device => {
                const status = device.ip ? '正常' : '未配置IP';
                body.innerHTML += `<div class="status-item"><span>${deviceNames[device.type]} ${device.id}</span><span class="status-badge ${device.ip ? 'ok' : 'error'}">${status}</span></div>`;
            });
            if (connections.length > 0) body.innerHTML += `<div class="status-item"><span>推流链路</span><span class="status-badge ok">正常</span></div>`;
            const content = document.getElementById('liveModalContent');
            content.style.left = '50%';
            content.style.top = '50%';
            content.style.transform = 'translate(-50%, -50%)';
            openModal('liveModal');
        }
        
        function activateLive() {
            closeModal('liveModal');
            isLive = true;
            setLiveMode(true);
            document.getElementById('liveBtn').textContent = '停止直播';
            document.getElementById('liveBtn').classList.remove('disabled');
            quickformLiveStartTime = new Date();
            
            // 记录直播开始
            quickformOperations.push({
                "action": "start_livestream",
                "timestamp": new Date().toLocaleTimeString()
            });
            
            const terminalTypes = ['pc', 'tablet', 'phone', 'camera'];
            devices.forEach(device => {
                const div = document.getElementById(`device-${device.id}`);
                const visual = div.querySelector('.device-visual');
                visual.classList.add('live');
                if (terminalTypes.includes(device.type) && !visual.querySelector('.live-badge')) {
                    const badge = document.createElement('div');
                    badge.className = 'live-badge';
                    badge.textContent = 'LIVE';
                    visual.appendChild(badge);
                }
            });
            document.getElementById('liveIndicator').classList.add('show');
            showToast('直播已启动', 'success');
            startDataAnimation();
        }
        
        function stopLive() {
            isLive = false;
            setLiveMode(false);
            setMode('move');
            document.getElementById('liveBtn').textContent = '发起直播';
            
            // 计算直播时长
            if (quickformLiveStartTime) {
                quickformLiveDuration = Math.floor((new Date() - quickformLiveStartTime) / 1000);
            }
            
            // 记录直播停止
            quickformOperations.push({
                "action": "stop_livestream",
                "duration_seconds": quickformLiveDuration,
                "timestamp": new Date().toLocaleTimeString()
            });
            
            animationIntervals.forEach(clearInterval);
            animationIntervals = [];
            document.querySelectorAll('.data-packet').forEach(el => el.remove());
            devices.forEach(device => {
                const div = document.getElementById(`device-${device.id}`);
                if (div) {
                    const visual = div.querySelector('.device-visual');
                    visual.classList.remove('live');
                    const badge = visual.querySelector('.live-badge');
                    if (badge) badge.remove();
                }
            });
            document.getElementById('liveIndicator').classList.remove('show');
            showToast('直播已停止', 'success');
            
            // 提交数据到Quickform
            submitDataToQuickform();
        }
        
        function startDataAnimation() {
            const camera = devices.find(d => d.type === 'camera');
            const server = devices.find(d => d.type === 'server');
            if (!camera || !server) return;
            const cameraToServerPath = findPath(camera.id, server.id);
            if (cameraToServerPath.length > 0) animateDataPath(cameraToServerPath, '#e74c3c', 2000);
            const terminals = devices.filter(d => ['pc', 'tablet', 'phone'].includes(d.type));
            terminals.forEach((terminal, idx) => {
                const path = findPath(server.id, terminal.id);
                if (path.length > 0) setTimeout(() => animateDataPath(path, '#3498db', 2500), 1000 + idx * 300);
            });
        }
        
        function animateDataPath(path, color, interval) {
            const animate = () => {
                if (!isLive) return;
                for (let i = 0; i < path.length - 1; i++) {
                    setTimeout(() => {
                        if (!isLive) return;
                        const from = devices.find(d => d.id === path[i]);
                        const to = devices.find(d => d.id === path[i + 1]);
                        if (from && to) createDataPacket(from, to, color);
                    }, i * 400);
                }
            };
            animate();
            const intId = setInterval(animate, interval);
            animationIntervals.push(intId);
        }
        
        function createDataPacket(from, to, color) {
            const canvas = document.getElementById('canvas');
            const packet = document.createElement('div');
            packet.className = 'data-packet';
            packet.style.background = color;
            packet.style.boxShadow = `0 0 8px ${color}`;
            packet.style.left = (from.x + 45) + 'px';
            packet.style.top = (from.y + 32) + 'px';
            canvas.appendChild(packet);
            const dx = to.x - from.x, dy = to.y - from.y;
            const duration = 400;
            const startTime = Date.now();
            const animatePacket = () => {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                packet.style.left = (from.x + 45 + dx * progress) + 'px';
                packet.style.top = (from.y + 32 + dy * progress) + 'px';
                if (progress < 1 && isLive) requestAnimationFrame(animatePacket);
                else packet.remove();
            };
            requestAnimationFrame(animatePacket);
        }
        
        function openModal(modalId) { document.getElementById(modalId).classList.add('show'); }
        function closeModal(modalId) { document.getElementById(modalId).classList.remove('show'); }
        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        // Quickform数据提交函数（符合接口文档）
        function submitDataToQuickform() {
            const url = 'https://wzkjgz.site/quickform/api/submit/4i5UrQGjgog';
            
            // 构建提交数据，包含必填字段 activity_id 和 student_id
            const data = {
                "activity_id": activityId,                     // 接口文档要求
                "student_id": quickformAnonymousId,            // 接口文档要求
                "activity_start_time": quickformActivityStartTime ? quickformActivityStartTime.toLocaleString() : new Date().toLocaleString(),
                "operations": quickformOperations,
                "network_setup": {
                    "total_devices": devices.length,
                    "total_connections": connections.length,
                    "ip_configured_count": devices.filter(d => d.ip).length,
                    "has_camera": devices.some(d => d.type === 'camera'),
                    "has_server": devices.some(d => d.type === 'server')
                },
                "test_results": {
                    "ping_test_count": quickformPingTests,
                    "successful_tests": quickformPingSuccess
                },
                "livestream": {
                    "started": quickformLiveStartTime !== null,
                    "duration_seconds": quickformLiveDuration
                },
                "submit_time": new Date().toLocaleString()
            };
            
            fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            })
            .then(async response => {
                const text = await response.text();
                let result = {};
                try {
                    result = JSON.parse(text);
                } catch(e) {
                    result = { "raw": text };
                }
                
                if (!response.ok) {
                    throw new Error(result.error || result.message || `HTTP ${response.status}`);
                }
                console.log('数据提交成功:', result);
                return result;
            })
            .then(result => {
                console.log('实验数据已成功提交到Quickform');
            })
            .catch(error => {
                console.error('数据提交失败:', error);
            });
        }
        
        // 页面关闭前提交数据（使用sendBeacon）
        window.addEventListener('beforeunload', function(e) {
            if (quickformOperations.length > 0) {
                const url = 'https://wzkjgz.site/quickform/api/submit/4i5UrQGjgog';
                const data = {
                    "activity_id": activityId,
                    "student_id": quickformAnonymousId,
                    "activity_start_time": quickformActivityStartTime ? quickformActivityStartTime.toLocaleString() : new Date().toLocaleString(),
                    "operations": quickformOperations,
                    "network_setup": {
                        "total_devices": devices.length,
                        "total_connections": connections.length,
                        "ip_configured_count": devices.filter(d => d.ip).length,
                        "has_camera": devices.some(d => d.type === 'camera'),
                        "has_server": devices.some(d => d.type === 'server')
                    },
                    "test_results": {
                        "ping_test_count": quickformPingTests,
                        "successful_tests": quickformPingSuccess
                    },
                    "livestream": {
                        "started": quickformLiveStartTime !== null,
                        "duration_seconds": quickformLiveDuration
                    },
                    "submit_time": new Date().toLocaleString()
                };
                
                // 使用navigator.sendBeacon确保页面关闭时也能发送
                const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
                navigator.sendBeacon(url, blob);
            }
        });
        
        document.getElementById('canvas').addEventListener('click', (e) => {
            if (e.target.id === 'canvas' || e.target.id === 'connections-layer') {
                document.querySelectorAll('.device-visual').forEach(el => el.classList.remove('selected'));
                selectedDeviceId = null;
            }
        });
        
        // 初始化时记录活动开始时间
        quickformActivityStartTime = new Date();
        
        initDeviceLibrary();
    </script>
</body>
