<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单选题练习</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f5f7fa;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            padding: 30px;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .description {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 30px;
        }
        .question {
            margin-bottom: 25px;
            padding: 20px;
            background: #f8fafc;
            border-radius: 8px;
            border-left: 4px solid #3498db;
        }
        .question-number {
            font-weight: bold;
            color: #3498db;
            margin-bottom: 10px;
        }
        .options {
            margin-top: 10px;
        }
        .option-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            padding: 10px;
            background: white;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .option-item:hover {
            background: #eef2ff;
        }
        .option-item input[type="radio"] {
            margin-right: 10px;
            width: 18px;
            height: 18px;
        }
        .btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
            width: 100%;
            font-weight: 600;
            margin-top: 20px;
        }
        .btn:hover {
            background: #2980b9;
        }
        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            display: none;
        }
        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        .loading {
            background-color: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
            display: none;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
        }
        footer {
            text-align: center;
            margin-top: 30px;
            color: #718096;
            font-size: 0.9rem;
        }
        hr {
            border: none;
            border-top: 1px solid #e2e8f0;
            margin: 20px 0;
        }
        .score-display {
            font-size: 1.5rem;
            color: #27ae60;
            text-align: center;
            margin: 20px 0;
            padding: 15px;
            background: #d4edda;
            border-radius: 8px;
        }
        .hidden-inputs {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 单选题练习</h1>
        <p class="description">包含 5 道单选题，请选择正确的答案后提交</p>

        <form id="quizForm">
            <!-- 隐藏的必填字段 -->
            <input type="hidden" id="teacher" value="{{teacher}}" class="hidden-inputs">
            <input type="hidden" id="activityId" value="{{task}}" class="hidden-inputs">
            
            <div id="questions">
                <!-- 题目将动态生成 -->
            </div>

            <button type="submit" class="btn">✅ 提交答案</button>
        </form>

        <div id="loading" class="loading">正在提交...</div>
        <div id="message" class="message"></div>
        <div id="scoreDisplay" class="score-display" style="display:none;"></div>

        <footer>
            <hr>
            <p>© 2026 QuickForge 课堂教学系统</p>
        </footer>
    </div>

    <script>
        // 示例题目数据（实际应由 AI 根据模板生成）
        const questions = [
            {
                id: 1,
                text: "下列哪个是太阳系中最大的行星？",
                options: ["地球", "木星", "火星", "土星"],
                correct: 1
            },
            {
                id: 2,
                text: "中国的首都是哪里？",
                options: ["上海", "广州", "北京", "深圳"],
                correct: 2
            },
            {
                id: 3,
                text: "水的化学式是什么？",
                options: ["H2O", "CO2", "O2", "NaCl"],
                correct: 0
            },
            {
                id: 4,
                text: "一年有多少个月？",
                options: ["10 个", "11 个", "12 个", "13 个"],
                correct: 2
            },
            {
                id: 5,
                text: "光速大约是多少？",
                options: ["30 万公里/秒", "300 公里/秒", "3000 公里/秒", "3 万公里/秒"],
                correct: 0
            }
        ];

        const teacher = document.getElementById('teacher').value;
        const activityId = document.getElementById('activityId').value;

        // 渲染题目
        function renderQuestions() {
            const container = document.getElementById('questions');
            container.innerHTML = questions.map((q, idx) => `
                <div class="question">
                    <div class="question-number">${idx + 1}. ${q.text}</div>
                    <div class="options">
                        ${q.options.map((opt, optIdx) => `
                            <label class="option-item">
                                <input type="radio" name="q${q.id}" value="${optIdx}" required>
                                <span>${String.fromCharCode(65 + optIdx)}) ${opt}</span>
                            </label>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        // 处理表单提交
        document.getElementById('quizForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const loadingDiv = document.getElementById('loading');
            const messageDiv = document.getElementById('message');
            const scoreDiv = document.getElementById('scoreDisplay');
            
            loadingDiv.style.display = 'block';
            messageDiv.style.display = 'none';
            scoreDiv.style.display = 'none';

            try {
                // 收集答案
                const answers = [];
                questions.forEach(q => {
                    const selected = document.querySelector(`input[name="q${q.id}"]:checked`);
                    answers.push(selected ? parseInt(selected.value) : null);
                });

                // 检查是否有未答题目
                if (answers.includes(null)) {
                    loadingDiv.style.display = 'none';
                    messageDiv.textContent = '⚠️ 请回答所有题目！';
                    messageDiv.className = 'message error';
                    messageDiv.style.display = 'block';
                    return;
                }

                // 计算得分
                let score = 0;
                answers.forEach((ans, idx) => {
                    if (ans === questions[idx].correct) score++;
                });
                const finalScore = Math.round((score / questions.length) * 100);

                // 准备提交数据
                const formData = new FormData();
                formData.append('teacher', teacher);
                formData.append('activity_id', activityId);
                formData.append('student_id', window.studentId || 'S001'); // 假设学生 ID
                formData.append('data', JSON.stringify({
                    answers: answers,
                    score: score,
                    total: questions.length,
                    percentage: finalScore,
                    client_timestamp: new Date().toISOString()
                }));

                console.log('提交数据:', { teacher, activityId, studentId: window.studentId || 'S001' });

                // 发送到 API
                const response = await fetch('/api/submit', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                loadingDiv.style.display = 'none';

                if (response.ok && result.success) {
                    scoreDiv.textContent = `🎉 你的得分：${finalScore}分 (${score}/${questions.length} 正确)`;
                    scoreDiv.style.display = 'block';
                    messageDiv.textContent = '✅ 答案已提交！';
                    messageDiv.className = 'message success';
                    messageDiv.style.display = 'block';
                    document.getElementById('quizForm').reset();
                } else {
                    messageDiv.textContent = '❌ 提交失败：' + (result.message || result.error || '未知错误');
                    messageDiv.className = 'message error';
                    messageDiv.style.display = 'block';
                }
            } catch (error) {
                console.error('提交错误:', error);
                loadingDiv.style.display = 'none';
                messageDiv.textContent = '❌ 网络错误：' + error.message;
                messageDiv.className = 'message error';
                messageDiv.style.display = 'block';
            }
        });

        // 初始化页面
        renderQuestions();
    </script>
</body>
</html>
