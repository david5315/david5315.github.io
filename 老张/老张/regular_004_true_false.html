<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>判断题练习</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; background-color: #f5f7fa; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.1); padding: 30px; }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 10px; }
        .description { text-align: center; color: #7f8c8d; margin-bottom: 30px; }
        .question { margin-bottom: 25px; padding: 20px; background: #f8fafc; border-radius: 8px; border-left: 4px solid #e67e22; }
        .question-number { font-weight: bold; color: #e67e22; margin-bottom: 10px; }
        .btn-group { display: flex; gap: 20px; margin-top: 10px; }
        .btn-option { padding: 12px 30px; background: white; border: 2px solid #e67e22; border-radius: 5px; cursor: pointer; transition: all 0.3s; font-size: 1rem; }
        .btn-option:hover { background: #fff5e6; }
        .btn-option.selected { background: #e67e22; color: white; }
        .btn { background: #e67e22; color: white; border: none; padding: 12px 25px; font-size: 1rem; border-radius: 5px; cursor: pointer; transition: background 0.3s; width: 100%; font-weight: 600; margin-top: 20px; }
        .btn:hover { background: #d35400; }
        .message { margin-top: 20px; padding: 15px; border-radius: 5px; text-align: center; display: none; }
        .message.success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; display: block; }
        .message.error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; display: block; }
        .loading { background-color: #fff3cd; color: #856404; padding: 15px; border-radius: 5px; text-align: center; display: none; }
        footer { text-align: center; margin-top: 30px; color: #718096; font-size: 0.9rem; }
        hr { border: none; border-top: 1px solid #e2e8f0; margin: 20px 0; }
        .score-display { font-size: 1.5rem; color: #27ae60; text-align: center; margin: 20px 0; padding: 15px; background: #d4edda; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>❓ 判断题练习</h1>
        <p class="description">包含 5 道判断题，请选择"正确"或"错误"</p>
        <form id="quizForm">
            <input type="hidden" id="teacher" value="{{teacher}}">
            <input type="hidden" id="activityId" value="{{task}}">
            <div id="questions"></div>
            <button type="submit" class="btn">✅ 提交答案</button>
        </form>
        <div id="loading" class="loading">正在提交...</div>
        <div id="message" class="message"></div>
        <div id="scoreDisplay" class="score-display" style="display:none;"></div>
        <footer><hr><p>© 2026 QuickForge 课堂教学系统</p></footer>
    </div>
    <script>
        const questions = [
            { id: 1, text: "地球是太阳系的中心", correct: false },
            { id: 2, text: "水的化学式是 H2O", correct: true },
            { id: 3, text: "中国的首都是北京", correct: true },
            { id: 4, text: "光速比声速快", correct: true },
            { id: 5, text: "一年有 13 个月", correct: false }
        ];
        
        const teacher = document.getElementById('teacher').value;
        const activityId = document.getElementById('activityId').value;

        function renderQuestions() {
            document.getElementById('questions').innerHTML = questions.map((q, idx) => 
                `<div class="question">
                    <div class="question-number">${idx+1}. ${q.text}</div>
                    <div class="btn-group">
                        <button type="button" class="btn-option" onclick="selectOption(this, '${q.id}', true)">✔️ 正确</button>
                        <button type="button" class="btn-option" onclick="selectOption(this, '${q.id}', false)">❌ 错误</button>
                    </div>
                </div>`
            ).join('');
        }

        window.selectOption = function(btn, qid, value) {
            const parent = btn.parentElement;
            parent.querySelectorAll('.btn-option').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            parent.dataset.answer = value;
        };

        document.getElementById('quizForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const loadingDiv = document.getElementById('loading');
            const messageDiv = document.getElementById('message');
            const scoreDiv = document.getElementById('scoreDisplay');
            
            loadingDiv.style.display = 'block';
            messageDiv.style.display = 'none';
            scoreDiv.style.display = 'none';

            try {
                const answers = [];
                questions.forEach(q => {
                    const parent = document.querySelector(`[data-answer]`);
                    if (!parent) throw new Error('未回答问题');
                    answers.push(parent.dataset.answer === 'true');
                    parent.removeAttribute('data-answer');
                    parent.querySelectorAll('.btn-option').forEach(b => b.classList.remove('selected'));
                });

                let score = 0;
                answers.forEach((ans, idx) => {
                    if (ans === questions[idx].correct) score++;
                });
                const finalScore = Math.round((score / questions.length) * 100);

                const formData = new FormData();
                formData.append('teacher', teacher);
                formData.append('activity_id', activityId);
                formData.append('student_id', window.studentId || 'S001');
                formData.append('data', JSON.stringify({
                    answers: answers,
                    score: score,
                    total: questions.length,
                    percentage: finalScore,
                    client_timestamp: new Date().toISOString()
                }));

                const response = await fetch('/api/submit', { method: 'POST', body: formData });
                const result = await response.json();
                loadingDiv.style.display = 'none';

                if (response.ok && result.success) {
                    scoreDiv.textContent = `🎉 你的得分：${finalScore}分 (${score}/${questions.length} 正确)`;
                    scoreDiv.style.display = 'block';
                    messageDiv.textContent = '✅ 答案已提交！';
                    messageDiv.className = 'message success';
                    messageDiv.style.display = 'block';
                    document.getElementById('quizForm').reset();
                } else {
                    messageDiv.textContent = '❌ 提交失败：' + (result.message || result.error || '未知错误');
                    messageDiv.className = 'message error';
                    messageDiv.style.display = 'block';
                }
            } catch (error) {
                console.error('提交错误:', error);
                loadingDiv.style.display = 'none';
                messageDiv.textContent = '❌ ' + error.message;
                messageDiv.className = 'message error';
                messageDiv.style.display = 'block';
            }
        });

        renderQuestions();
    </script>
</body>
</html>
