<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIoT 智慧校园管理平台</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/all.min.css">
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --success: #2ecc71;
            --warning: #f39c12;
            --danger: #e74c3c;
            --info: #3498db;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
        }
        .header-title {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }
        .header-subtitle {
            color: #666;
            font-size: 1.1rem;
        }
        .header-buttons {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .header-buttons-row {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .user-info {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 10px 25px;
            border-radius: 50px;
            margin-top: 15px;
            font-weight: 500;
        }
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        .nav-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            transition: all 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            border: 2px solid transparent;
        }
        .nav-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
            border-color: var(--primary);
        }
        .nav-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        .nav-card:nth-child(2) .nav-icon {
            background: linear-gradient(135deg, var(--success), #27ae60);
        }
        .nav-card:nth-child(3) .nav-icon {
            background: linear-gradient(135deg, var(--warning), #f39c12);
        }
        .nav-card:nth-child(4) .nav-icon {
            background: linear-gradient(135deg, var(--info), #2980b9);
        }
        .nav-card:nth-child(5) .nav-icon {
            background: linear-gradient(135deg, var(--danger), #c0392b);
        }
        .nav-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .nav-desc {
            color: #7f8c8d;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 5px;
        }
        .stat-label {
            color: #666;
            font-size: 0.9rem;
        }
        .quick-actions {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }
        .quick-actions h4 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .btn-quick {
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: 500;
            margin: 5px;
            transition: all 0.3s;
        }
        .btn-quick:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        /* 顶部导航 */
        .top-nav { 
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        .top-nav .btn { 
            margin-right: 0;
        }
        
        /* 服务开关样式 */
        .service-switch-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }
        
        .service-switch-item .form-check-input {
            width: 50px;
            height: 25px;
            cursor: pointer;
        }
        
        .service-switch-item .form-check-label {
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            color: #333;
        }
        
        .service-switch-item .badge {
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
    <div class="container">
          <!-- 页面标题 -->
        <div class="header-card" style="padding: 20px;">
            <h1 class="header-title" style="font-size: 2rem;">
                <i class="fas fa-brain me-2"></i>AIoT 智慧校园管理平台
            </h1>
            <p class="header-subtitle">多模态视觉语言智能体 · 校园管理自动化</p>
        </div>
      <!-- 顶部导航 -->
        <div class="top-nav">
            <a href="index.html" class="btn btn-light"><i class="fas fa-home me-1"></i> 首页</a>
            <a href="aiot_index.html" class="btn btn-primary"><i class="fas fa-th-large me-1"></i> 管理首页</a>
            <a href="aiot_config.html" class="btn btn-success"><i class="fas fa-tasks me-1"></i> 任务配置</a>
 
            <a href="aiot_log.html" class="btn btn-info"><i class="fas fa-file-alt me-1"></i> 日志查看</a>
            <a href="aiot_admin.html" class="btn btn-danger"><i class="fas fa-cog me-1"></i> 调试管理</a>
            <a href="aiot_params.html" class="btn btn-success"><i class="fas fa-database me-1"></i> 参数配置</a>
            <a href="aiot_broadcast.html" class="btn btn-info"><i class="fas fa-broadcast-tower me-1"></i> 智能广播</a>
            <a href="aiot_electric.html" class="btn btn-secondary"><i class="fas fa-plug me-1"></i> 智能电控</a>
            <a href="aiot_iot_data.html" class="btn btn-info"><i class="fas fa-database me-1"></i> 物联网实验</a>
            <button id="logoutBtn" class="btn btn-secondary" style="float: right;"><i class="fas fa-sign-out-alt me-1"></i> 退出</button>
        </div>


        <!-- 智慧校园服务总开关 -->
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0"><i class="fas fa-toggle-on me-2"></i>智慧校园服务总开关</h4>
            </div>
            <div class="card-body">
                <p class="text-muted mb-3">以下为软件功能总开关，控制整个系统的核心服务运行状态</p>
                
                <div class="row g-4">
                    <!-- 服务开关列 -->
                    <div class="col-md-6">
                        <div class="service-switch-item">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="switchWebService" checked>
                                <label class="form-check-label" for="switchWebService">
                                    <i class="fas fa-globe me-2"></i>Web服务
                                </label>
                            </div>
                            <small class="text-muted">提供网页界面和 API 接口</small>
                            <span class="badge bg-success ms-2" id="statusWebService">运行中</span>
                        </div>
                        
                        <div class="service-switch-item">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="switchSmsDialog" checked>
                                <label class="form-check-label" for="switchSmsDialog">
                                    <i class="fas fa-sms me-2"></i>短信对话
                                </label>
                            </div>
                            <small class="text-muted">接收短信并自动回复</small>
                            <span class="badge bg-success ms-2" id="statusSmsDialog">运行中</span>
                        </div>
                        
                        <div class="service-switch-item">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="switchWechatCallback" checked>
                                <label class="form-check-label" for="switchWechatCallback">
                                    <i class="fab fa-weixin me-2"></i>企微回调
                                </label>
                            </div>
                            <small class="text-muted">企业微信机器人 HTTP 回调对话</small>
                            <span class="badge bg-success ms-2" id="statusWechatCallback">运行中</span>
                        </div>
                        
                        <div class="service-switch-item">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="switchFeishuBot">
                                <label class="form-check-label" for="switchFeishuBot">
                                    <i class="fas fa-feishu me-2"></i>飞书对话
                                </label>
                            </div>
                            <small class="text-muted">飞书开放平台双向对话</small>
                            <span class="badge bg-secondary ms-2" id="statusFeishuBot">已关闭</span>
                        </div>
                        
                        <div class="service-switch-item">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="switchWebhookPush" checked>
                                <label class="form-check-label" for="switchWebhookPush">
                                    <i class="fas fa-paper-plane me-2"></i>Webhook推送
                                </label>
                            </div>
                            <small class="text-muted">定时任务和手动消息推送</small>
                            <span class="badge bg-success ms-2" id="statusWebhookPush">运行中</span>
                        </div>
                    </div>
                    
                    <div class="col-md-6">
                        <div class="service-switch-item">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="switchSmsPush" checked>
                                <label class="form-check-label" for="switchSmsPush">
                                    <i class="fas fa-send me-2"></i>短信推送
                                </label>
                            </div>
                            <small class="text-muted">发送短信通知</small>
                            <span class="badge bg-success ms-2" id="statusSmsPush">运行中</span>
                        </div>
                        
                        <div class="service-switch-item">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="switchTaskScheduler" checked>
                                <label class="form-check-label" for="switchTaskScheduler">
                                    <i class="fas fa-clock me-2"></i>定时任务
                                </label>
                            </div>
                            <small class="text-muted">自动执行配置的任务</small>
                            <span class="badge bg-success ms-2" id="statusTaskScheduler">运行中</span>
                        </div>
                        
                        <div class="service-switch-item">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="switchIotControl">
                                <label class="form-check-label" for="switchIotControl">
                                    <i class="fas fa-plug me-2"></i>IoT控制
                                </label>
                            </div>
                            <small class="text-muted">控制照明、空调、插座等设备</small>
                            <span class="badge bg-secondary ms-2" id="statusIotControl">已关闭</span>
                        </div>
                        
                        <div class="service-switch-item">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="switchAIChatbot" checked>
                                <label class="form-check-label" for="switchAIChatbot">
                                    <i class="fas fa-robot me-2"></i>AI对话
                                </label>
                            </div>
                            <small class="text-muted">AIoT智能对话服务</small>
                            <span class="badge bg-success ms-2" id="statusAIChatbot">运行中</span>
                        </div>
                        
                        <div class="service-switch-item">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="switchSmartBroadcast">
                                <label class="form-check-label" for="switchSmartBroadcast">
                                    <i class="fas fa-broadcast-tower me-2"></i>智能广播
                                </label>
                            </div>
                            <small class="text-muted">百度音箱语音播报</small>
                            <span class="badge bg-secondary ms-2" id="statusSmartBroadcast">已关闭</span>
                        </div>
                    </div>
                </div>
                
                <div class="mt-4">
                    <button class="btn btn-primary" onclick="saveServiceConfig()">
                        <i class="fas fa-save me-1"></i> 保存配置
                    </button>
                    <button class="btn btn-warning" onclick="restartServices()">
                        <i class="fas fa-redo me-1"></i> 重启服务
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE = window.location.origin;
        
        // 服务开关列表
        const serviceSwitches = [
            'switchWebService', 'switchSmsDialog', 'switchWechatCallback', 'switchFeishuBot',
            'switchWebhookPush', 'switchSmsPush', 'switchTaskScheduler', 'switchIotControl',
            'switchAIChatbot', 'switchSmartBroadcast'
        ];
        
        // 加载服务配置
        async function loadServiceConfig() {
            try {
                const response = await fetch(`${API_BASE}/api/aiot/services`);
                const data = await response.json();
                
                if (data.success) {
                    const services = data.services || {};
                    updateSwitch('switchWebService', services.web_service !== false, 'Web服务');
                    updateSwitch('switchSmsDialog', services.sms_dialog !== false, '短信对话');
                    updateSwitch('switchWechatCallback', services.wechat_callback !== false, '企微回调');
                    updateSwitch('switchFeishuBot', services.feishu_bot === true, '飞书对话');
                    updateSwitch('switchWebhookPush', services.webhook_push !== false, 'Webhook推送');
                    updateSwitch('switchSmsPush', services.sms_push !== false, '短信推送');
                    updateSwitch('switchTaskScheduler', services.task_scheduler !== false, '定时任务');
                    updateSwitch('switchIotControl', services.iot_control === true, 'IoT控制');
                    updateSwitch('switchAIChatbot', services.ai_chatbot !== false, 'AI对话');
                    updateSwitch('switchSmartBroadcast', services.smart_broadcast === true, '智能广播');
                }
            } catch (error) {
                console.error('加载服务配置失败:', error);
            }
        }
        
        function updateSwitch(switchId, enabled, name) {
            const switchEl = document.getElementById(switchId);
            const statusEl = document.getElementById('status' + switchId.replace('switch', ''));
            
            if (switchEl && statusEl) {
                switchEl.checked = enabled;
                statusEl.textContent = enabled ? '运行中' : '已关闭';
                statusEl.className = 'badge ' + (enabled ? 'bg-success ms-2' : 'bg-secondary ms-2');
            }
        }
        
        // 保存配置
        async function saveServiceConfig() {
            const config = {};
            serviceSwitches.forEach(id => {
                const key = id.replace('switch', '').toLowerCase();
                config[key] = document.getElementById(id).checked;
            });
            
            try {
                const response = await fetch(`${API_BASE}/api/aiot/services`, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({services: config})
                });
                const result = await response.json();
                
                if (result.success) {
                    alert('配置已保存！需要重启服务才能生效。');
                    loadServiceConfig();
                } else {
                    alert('保存失败：' + result.message);
                }
            } catch (error) {
                alert('保存失败：' + error.message);
            }
        }
        
        // 重启服务
        async function restartServices() {
            if (!confirm('确定要重启所有服务吗？服务将在 3 秒后重启...')) {
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/aiot/restart`, {method: 'POST'});
                const result = await response.json();
                
                if (result.success) {
                    alert('服务重启命令已发送！请等待 5-10 秒后刷新页面查看状态。');
                    setTimeout(loadServiceConfig, 5000);
                } else {
                    alert('重启失败：' + result.message);
                }
            } catch (error) {
                alert('重启失败：' + error.message);
            }
        }
        
        // 检查登录
        function checkAuth() {
            const userStr = localStorage.getItem('teacherUser');
            if (!userStr) {
                window.location.href = 'login.html';
                return null;
            }
            return JSON.parse(userStr);
        }

        // 加载统计数据
        async function loadStats() {
            try {
                const response = await fetch(`${API_BASE}/api/aiot/tasks`);
                const data = await response.json();
                
                if (data.success) {
                    const tasks = data.tasks || [];
                    const enabledTasks = tasks.filter(t => t.enabled).length;
                    document.getElementById('statTasks').textContent = enabledTasks;
                }
            } catch (error) {
                console.error('加载统计失败:', error);
            }
        }

        // 退出登录
        function logout() {
            if (confirm('确定要退出登录吗？')) {
                localStorage.clear();
                window.location.href = 'login.html';
            }
        }

        // 快捷操作
        async function quickAction(action) {
            switch(action) {
                case 'test_wechat':
                    await testWechatPush();
                    break;
                case 'test_sms':
                    await testSmsNotification();
                    break;
                case 'test_tuya':
                    await testTuyaControl();
                    break;
                case 'capture_test':
                    window.open('aiot_chat.html', '_blank');
                    break;
                case 'run_task6':
                    await runTask6();
                    break;
            }
        }

        // 测试企业微信推送
        async function testWechatPush() {
            const message = prompt('请输入测试消息内容：', '【测试消息】AIoT 系统运行正常！');
            if (!message) return;
            
            try {
                const response = await fetch(`${API_BASE}/api/aiot/push/wechat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert('✅ 推送成功！\n\n' + JSON.stringify(result.result, null, 2));
                } else {
                    alert('❌ 推送失败：' + result.message);
                }
            } catch (error) {
                alert('❌ 推送失败：' + error.message);
            }
        }

        // 测试短信通知
        async function testSmsNotification() {
            const phone = prompt('请输入接收短信的手机号：', '13815120911');
            if (!phone) return;
            
            const message = prompt('请输入短信内容：', '【AIoT 测试】这是一条测试短信，系统运行正常！');
            if (!message) return;
            
            try {
                const response = await fetch(`${API_BASE}/api/aiot/push/sms`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        phone: phone,
                        message: message
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert('✅ 短信发送成功！\n\n接收手机：' + phone);
                } else {
                    alert('❌ 短信发送失败：' + result.message);
                }
            } catch (error) {
                alert('❌ 短信发送失败：' + error.message);
            }
        }

        // 测试涂鸦开关控制
        async function testTuyaControl() {
            const classroom = prompt('请输入教室名称（如：高一 13 班）：', '高一 13 班');
            if (!classroom) return;
            
            // 从配置文件获取设备 ID
            try {
                const response = await fetch(`${API_BASE}/api/aiot/classrooms`);
                const data = await response.json();
                
                if (!data.success) {
                    alert('❌ 获取教室数据失败');
                    return;
                }
                
                const classroomData = data.all.find(c => c.classroom === classroom);
                if (!classroomData) {
                    alert('❌ 未找到教室：' + classroom);
                    return;
                }
                
                const deviceId = classroomData.DEVICE_ID || classroomData.device_id;
                const action = confirm(`控制 ${classroom} 的灯光\n\n设备 ID: ${deviceId}\n\n点击"确定"开启，点击"取消"关闭`) ? '开启' : '关闭';
                const state = action === '开启';
                
                const controlResponse = await fetch(`${API_BASE}/api/aiot/iot/control`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        classroom: classroom,
                        device_id: deviceId,
                        device_type: 'lighting',
                        state: state
                    })
                });
                
                const result = await controlResponse.json();
                
                if (result.success) {
                    alert('✅ 控制成功！\n\n' + result.message);
                } else {
                    alert('❌ 控制失败：' + result.message);
                }
            } catch (error) {
                alert('❌ 控制失败：' + error.message);
            }
        }

        // 立即执行无人灯检测任务
        async function runTask6() {
            if (!confirm('⚠️ 立即执行无人灯检测任务？\n\n任务 ID: 6\n任务名称：无人灯检测\n\n这将抓取所有教室画面并进行 AI 分析，确认要执行吗？')) {
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/aiot/task/6/run`, {
                    method: 'POST'
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert('✅ 任务已启动！\n\n' + result.message + '\n\n请稍后在日志查看页面查看执行结果。');
                } else {
                    alert('❌ 任务启动失败：' + result.message);
                }
            } catch (error) {
                alert('❌ 任务启动失败：' + error.message);
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            const user = checkAuth();
            if (user) {
                console.log('欢迎，', user.username);
                loadStats();
            }
        });
    </script>
</body>
</html>
