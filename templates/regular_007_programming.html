<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编程练习</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Courier New', monospace; line-height: 1.6; color: #333; background-color: #1e1e1e; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #569cd6; text-align: center; margin-bottom: 20px; }
        .code-area { display: flex; gap: 20px; height: calc(100vh - 200px); }
        .editor { flex: 2; background: #2d2d2d; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; }
        .output { flex: 1; background: #252526; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; }
        .panel-header { background: #3c3c3c; color: white; padding: 10px 15px; font-weight: bold; }
        .code-input { flex: 1; background: #1e1e1e; color: #d4d4d4; border: none; padding: 15px; resize: none; font-size: 14px; font-family: 'Consolas', monospace; outline: none; }
        .output-content { flex: 1; padding: 15px; color: #ce9178; overflow-y: auto; }
        .controls { padding: 15px; background: #3c3c3c; display: flex; gap: 10px; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: all 0.3s; }
        .btn-run { background: #4caf50; color: white; }
        .btn-run:hover { background: #45a049; }
        .btn-submit { background: #2196f3; color: white; }
        .btn-submit:hover { background: #1e88e5; }
        .message { padding: 15px; border-radius: 5px; margin-top: 15px; display: none; }
        .message.success { background: #d4edda; color: #155724; }
        .message.error { background: #f8d7da; color: #721c24; }
        .loading { background: #fff3cd; color: #856404; padding: 15px; border-radius: 5px; text-align: center; display: none; }
        footer { text-align: center; margin-top: 20px; color: #808080; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>💻 Python 编程练习</h1>
        
        <div class="code-area">
            <div class="editor">
                <div class="panel-header">代码编辑器 (Python)</div>
                <textarea id="codeInput" class="code-input" placeholder="# 在这里编写你的 Python 代码&#10;def fibonacci(n):&#10;    # 实现斐波那契数列函数&#10;    pass"></textarea>
            </div>
            <div class="output">
                <div class="panel-header">运行结果</div>
                <div id="outputContent" class="output-content"># 点击"运行"查看代码执行结果...</div>
            </div>
        </div>
        
        <div class="controls">
            <button onclick="runCode()" class="btn btn-run">▶️ 运行代码</button>
            <button onclick="submitCode()" class="btn btn-submit">✅ 提交答案</button>
            <button onclick="clearOutput()" class="btn" style="background:#ff9800;color:white">🗑️ 清空输出</button>
        </div>
        
        <div id="loading" class="loading">正在提交...</div>
        <div id="message" class="message"></div>
        
        <footer><p>© 2026 QuickForge 课堂教学系统</p></footer>
    </div>

    <script>
        // 代码运行功能（无后端依赖）
        function runCode() {
            const code = document.getElementById('codeInput').value;
            const outputDiv = document.getElementById('outputContent');
            
            outputDiv.textContent = '# 执行中...\n';
            
            try {
                // 简单的模拟执行（实际应由后端执行）
                if (code.trim()) {
                    outputDiv.textContent = '# 代码已接收\n';
                    outputDiv.textContent += '# 提示：实际执行将由系统自动完成\n';
                    outputDiv.textContent += '\n# 预览输出:\nprint("代码运行成功！")';
                } else {
                    outputDiv.textContent = '# 请输入代码后再运行';
                }
            } catch (error) {
                outputDiv.textContent = '# 错误：' + error.message;
            }
        }
        
        // 提交代码
        function submitCode() {
            const code = document.getElementById('codeInput').value;
            const loadingDiv = document.getElementById('loading');
            const messageDiv = document.getElementById('message');
            
            if (!code.trim()) {
                alert('⚠️ 请输入代码后再提交！');
                return;
            }
            
            loadingDiv.style.display = 'block';
            
            setTimeout(() => {
                loadingDiv.style.display = 'none';
                messageDiv.textContent = '✅ 代码已提交！感谢您的参与';
                messageDiv.className = 'message success';
                messageDiv.style.display = 'block';
                
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 5000);
            }, 1000);
        }
        
        // 清空输出
        function clearOutput() {
            document.getElementById('outputContent').textContent = '# 输出已清空';
        }
    </script>
</body>
</html>
