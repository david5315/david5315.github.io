<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>不定项选择练习</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; background-color: #f5f7fa; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.1); padding: 30px; }
        h1 { text-align: center; color: #8e44ad; margin-bottom: 10px; }
        .description { text-align: center; color: #7f8c8d; margin-bottom: 30px; }
        .question { margin-bottom: 25px; padding: 20px; background: #f8fafc; border-radius: 8px; border-left: 4px solid #8e44ad; }
        .question-number { font-weight: bold; color: #8e44ad; margin-bottom: 10px; }
        .warning { background: #fff3cd; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-size: 0.9rem; color: #856404; }
        .options { margin-top: 10px; }
        .option-item { display: flex; align-items: center; margin-bottom: 10px; padding: 12px; background: white; border-radius: 5px; cursor: pointer; transition: all 0.2s; border: 2px solid transparent; }
        .option-item:hover { background: #f3e5f5; }
        .option-item.selected { background: #e8daef; border-color: #8e44ad; }
        .option-item input[type="checkbox"] { margin-right: 10px; width: 18px; height: 18px; }
        .btn { background: #8e44ad; color: white; border: none; padding: 12px 25px; font-size: 1rem; border-radius: 5px; cursor: pointer; transition: background 0.3s; width: 100%; font-weight: 600; margin-top: 20px; }
        .btn:hover { background: #732d91; }
        .message { margin-top: 20px; padding: 15px; border-radius: 5px; text-align: center; display: none; }
        .message.success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; display: block; }
        .message.error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; display: block; }
        .loading { background-color: #fff3cd; color: #856404; padding: 15px; border-radius: 5px; text-align: center; display: none; }
        footer { text-align: center; margin-top: 30px; color: #718096; font-size: 0.9rem; }
        hr { border: none; border-top: 1px solid #e2e8f0; margin: 20px 0; }
        .score-display { font-size: 1.5rem; color: #27ae60; text-align: center; margin: 20px 0; padding: 15px; background: #d4edda; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 不定项选择练习</h1>
        <p class="description">包含 5 道题目，正确答案个数不确定（可能 1-4 个），请仔细思考</p>
        
        <form id="quizForm">
            <div style="margin-bottom:20px;padding:15px;background:#e8f4fd;border-radius:8px;border-left:4px solid #3498db;">
                <strong>⚠️ 重要提示：</strong>不定项选择题的答案可能是 1 个、2 个或多个选项，请根据知识判断，不要多选也不要漏选！
            </div>
            
            <div id="questions"></div>
            <button type="submit" class="btn">✅ 提交答案</button>
        </form>
        
        <div id="loading" class="loading">正在提交...</div>
        <div id="message" class="message"></div>
        <div id="scoreDisplay" class="score-display" style="display:none;"></div>
        
        <footer><hr><p>© 2026 QuickForge 课堂教学系统</p></footer>
    </div>
        <script>
        document.getElementById("mainForm")?.addEventListener("submit", function(e) {
            e.preventDefault();
            
            let valid = true;
            this.querySelectorAll("[required]").forEach(input => {
                if (!input.value.trim()) {
                    valid = false;
                    input.style.borderColor = "#ef4444";
                } else {
                    input.style.borderColor = "#e2e8f0";
                }
            });
            
            if (!valid) {
                alert("璇峰～鍐欐墍鏈夊繀濉」锛?);
                return;
            }
            
            alert("鉁?鎻愪氦鎴愬姛锛佹劅璋㈡偍鐨勫弬涓?);
            this.reset();
        });
    </script>
</body>
</html>
